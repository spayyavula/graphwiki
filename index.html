the PermID dataset on a weekly cadence. The bulk files:\n\n- Cover all entity types in a single download\n- Are serialized in [[RDF]]/XML and Turtle formats\n- Can be loaded directly into triple stores for [[SPARQL]] querying\n- Are suitable for bootstrapping a financial [[Knowledge Graph]] with millions of pre-identified entities\n\n### FIBO Alignment\n\nPermID's Organization type hierarchy reuses [[FIBO]]'s Business Entities module. This means:\n\n- PermID `Organization` individuals conform to FIBO's `LegalEntity` axioms\n- [[Inference and Reasoning|OWL reasoners]] applied to a combined PermID + FIBO graph can infer FIBO class memberships for PermID entities\n- FIBO-aligned tools (including [[FinKario]]'s entity normalization) can directly accept PermID URIs as entity identifiers\n\n## Integration Patterns\n\n### Using PermID as Graph Node Identifiers\n\nThe recommended pattern for a financial [[Knowledge Graph]] is to use PermID URIs as the primary identifiers for Organization and Instrument nodes:\n\n```turtle\n<https://permid.org/1-4295905573> a fibo-be-le-lp:PubliclyHeldCompany ;\n    rdfs:label \"Apple Inc.\" ;\n    fibo-fbc-fct-ra:hasRegistrationIdentifier \"US0378331005\" ; # ISIN\n    gleif-L1:hasLEI \"HWUPKR0MPOU8FGXBT394\" .\n```\n\nThis pattern connects PermID to [[XBRL]] filings (via ISIN), [[GLEIF]] LEI data, and [[SemanticXBRL]] facts in a single graph.\n\n### Bootstrapping with Bulk Data\n\nThe weekly bulk [[RDF]] files serve as a practical seed for initial graph population. The process:\n\n1. Download the weekly PermID bulk file\n2. Load into a triple store (Apache Jena, Stardog, GraphDB)\n3. Query via [[SPARQL]] to retrieve all entities of a target type\n4. Join against domain-specific data (filings, market data, news)\n\n## Comparison to Other Financial Identifiers\n\nSee [[Financial Identifier Comparison]] for a full comparison of ISIN, CUSIP, SEDOL, FIGI, LEI, and MIC. PermID complements these identifiers by serving as a stable, dereferenceable linked data URI rather than a bare code string.\n\n## Key URLs\n\n- Service: https://permid.org/\n- Bulk data: Available via PermID service registration\n- License: CC-BY 4.0\n\n## Sources\n\n- `sources/web-clips/lseg-permid-linked-data.md`\n\n## See Also\n\n- [[Linked Data]], [[RDF]], [[FIBO]], [[URI and IRI]], [[Financial Identifier]]\n- [[Legal Entity]], [[Financial Instrument]], [[SPARQL]]\n- [[GLEIF]], [[SemanticXBRL]], [[FinKario]]\n- [[Financial Identifier Comparison]]\n" },
    { id: "Protege", category: "entities", definition: "", content: "# Protege\n\n**Type:** Ontology editor tool\n**Developer:** Stanford Center for Biomedical Informatics Research\n**License:** Open-source (BSD)\n**Platform:** Java (desktop), Web (WebProtege)\n\n## Overview\n\nProtege is the most widely used open-source ontology editor in the world, developed and maintained by Stanford University. It provides a graphical environment for building, editing, and managing [[Ontology|ontologies]] expressed in [[OWL]] and [[RDFS]]. Researchers, engineers, and knowledge architects across biomedical informatics, enterprise knowledge management, and academic [[Semantic Web]] projects rely on Protege as their primary authoring tool.\n\nProtege operates on a plugin architecture, allowing the community to extend it with reasoners, visualization tools, query interfaces, and custom views. It natively understands the layered structure of [[OWL]] ontologies — [[Class and Property|classes, properties]], individuals, and axioms — and exposes them through dedicated editing panels.\n\n## Key Features\n\n- **Class hierarchy editor** — Visual tree view for navigating and editing the [[Class and Property|class]] hierarchy, supporting multiple inheritance as defined in [[OWL]] and [[RDFS]]\n- **Property editor** — Panels for defining object properties, data properties, and annotation properties, along with their domains, ranges, and characteristics (transitivity, symmetry, etc.)\n- **Reasoner integration** — Plugins for reasoners such as HermiT, Pellet, and FaCT++ enable [[Inference and Reasoning|automated classification and consistency checking]] grounded in [[Description Logic]]\n- **SPARQL tab** — Built-in query interface for running [[SPARQL]] queries directly against the loaded ontology\n- **OntoGraf / visualization** — Graph-based visualization of class relationships and [[Triple|property assertions]]\n- **Manchester Syntax editor** — Human-readable syntax for authoring complex [[OWL]] class expressions and restrictions\n- **OWL axiom view** — Low-level inspection of every axiom in the ontology, useful for debugging logical definitions\n\n## Working with OWL\n\nProtege exposes all three OWL profiles (OWL Lite, OWL DL, OWL Full) and enforces the constraints of [[Description Logic]] when operating in OWL DL mode. This tight coupling with [[Inference and Reasoning|reasoning]] makes it possible to detect unsatisfiable classes, infer implicit subclass relationships, and validate whether an [[Ontology]] is consistent before deployment. The reasoner feedback loop is one of Protege's most valuable features for ontology authors learning [[Description Logic]] constraints.\n\n## See Also\n\n- [[OWL]]\n- [[Ontology]]\n- [[Class and Property]]\n- [[RDFS]]\n- [[Description Logic]]\n- [[Inference and Reasoning]]\n- [[SPARQL]]\n- [[W3C]]\n" },
    { id: "Schema Org Financial", category: "entities", definition: "The financial product and service extensions to Schema.org — the dominant structured data vocabulary for the web — defining types such as `FinancialProduct`, `LoanOrCredit`, `BankAccount`, and `PaymentCard` with properties including `leiCode` linking to [[GLEIF]], serializable as [[RDF]]a, Microdata, and JSON-LD.", content: "# Schema.org Financial\n\n**Type:** Ontology Extension / Vocabulary\n\n**Definition:** The financial product and service extensions to Schema.org — the dominant structured data vocabulary for the web — defining types such as `FinancialProduct`, `LoanOrCredit`, `BankAccount`, and `PaymentCard` with properties including `leiCode` linking to [[GLEIF]], serializable as [[RDF]]a, Microdata, and JSON-LD.\n\n## Overview\n\nSchema.org is the dominant structured data vocabulary for the web, maintained by a steering group including Google, Microsoft, Yahoo, and Yandex. Its financial extensions, introduced in Schema.org v3.0 (2016) and refined in v3.2 (2017), define machine-readable types for financial products and services used to embed metadata in web pages for search engine indexing, rich result display, and data integration. The W3C FIBO Community Group coordinates ongoing alignment between Schema.org financial types and [[FIBO]], making Schema.org a web-scale bridge from consumer-facing financial product descriptions into the formal ontology ecosystem.\n\nThe type hierarchy is rooted at `FinancialProduct`, extending `Service` under `Intangible`. Key subtypes include `BankAccount` (with `DepositAccount`), `PaymentCard` (with `CreditCard`), `LoanOrCredit` (with `MortgageLoan` and `StudentLoan`), `InvestmentOrDeposit` (with `BrokerageAccount`), `PaymentService`, and `CurrencyConversionService`. The distinct `FinancialService` type covers organizations — banks, insurance agencies, accounting firms — rather than products. Key properties include `leiCode` (Text, linking an `Organization` to its [[GLEIF]] ISO 17442 LEI for machine-readable entity disambiguation), `interestRate` and `annualPercentageRate` (`QuantitativeValue` or Number), `feesAndCommissionsSpecification`, `currency` (ISO 4217 codes), `amount` (`MonetaryAmount`), `provider`, and `offers` — the last inheriting the [[GoodRelations]] `Offer` pattern integrated into Schema.org in 2012.\n\nThe alignment with [[FIBO]] is semantic rather than formal: Schema.org does not import [[FIBO]] via `owl:imports`, but the W3C FIBO Community Group manages voluntary harmonization. `BankAccount` aligns with FIBO's deposit account classes; `LoanOrCredit` maps to FIBO loan and credit facility concepts; `PaymentCard` corresponds to FIBO payment card instrument types; and `leiCode` directly references the [[GLEIF]] LEI standard central to FIBO party identification. JSON-LD contexts can be constructed to map Schema.org property IRIs to [[FIBO]] [[URI and IRI|IRIs]] for integration purposes. Schema.org supports three serializations: JSON-LD (preferred for separation from markup), Microdata (inline HTML), and [[RDF]]a (for full RDF graph integration with [[OWL]] tooling).\n\n## Key Components\n\n- **`FinancialProduct`:** Root type extending `Service`; subtypes: `BankAccount`, `PaymentCard`, `LoanOrCredit`, `InvestmentOrDeposit`, `PaymentService`\n- **`FinancialService`:** Organization type (banks, insurance agencies, accounting firms)\n- **`leiCode`:** Links `Organization` to [[GLEIF]] ISO 17442 LEI — primary entity resolution property\n- **`interestRate` / `annualPercentageRate`:** Rate properties for loan and deposit products\n- **`offers` / `Offer`:** [[GoodRelations]]-derived offering pattern for pricing and availability\n- **`currency`:** ISO 4217 currency codes for product denomination\n- **Serializations:** JSON-LD (primary), Microdata, [[RDF]]a\n\n## OWL/RDF Availability\n\nSchema.org vocabulary is available as RDF/OWL:\n\n- Full schema RDF/OWL: https://schema.org/version/latest/schemaorg-current-https.jsonld\n- Financial types: https://schema.org/docs/financial.html\n- W3C FIBO Community Group: https://www.w3.org/community/fibo/\n\n## Relationships\n\n- **Maintained by:** Schema.org Steering Group (Google, Microsoft, Yahoo, Yandex)\n- **Aligned with:** [[FIBO]] (W3C Community Group; semantic, not formal import)\n- **Integrates:** [[GoodRelations]] (Offer/pricing vocabulary absorbed 2012)\n- **References:** [[GLEIF]] (via `leiCode` property), ISO 4217 (currency), ISO 3166 (country)\n- **Serializable as:** JSON-LD, [[RDF]]a, Microdata\n\n## Key URLs\n\n- Financial types: https://schema.org/docs/financial.html\n- Full schema RDF: https://schema.org/version/latest/schemaorg-current-https.jsonld\n- W3C FIBO Community Group: https://www.w3.org/community/fibo/\n\n## Sources\n\n- `sources/articles/schema-org-financial-extensions.md`\n\n## See Also\n\n- [[RDF]], [[OWL]], [[Linked Data]], [[Ontology]]\n- [[FIBO]], [[GoodRelations]], [[GLEIF]], [[W3C]]\n" },
    { id: "Semantic Xbrl", category: "entities", definition: "SemanticXBRL is a large-scale conversion of ~30,000 SEC EDGAR financial filings from [[XBRL]] format into [[RDF]] triples, producing 125 million+ triples and one of the largest publicly available open semantic financial datasets.", content: "# SemanticXBRL\n\n**Type:** Dataset / Methodology\n**Paper:** https://www.semantic-web-journal.net/system/files/swj869.pdf\n\n**Definition:** SemanticXBRL is a large-scale conversion of ~30,000 SEC EDGAR financial filings from [[XBRL]] format into [[RDF]] triples, producing 125 million+ triples and one of the largest publicly available open semantic financial datasets.\n\n## Overview\n\n[[XBRL]] (eXtensible Business Reporting Language) is the structured reporting standard mandated by the SEC for US public company financial filings. Every income statement, balance sheet, and cash flow statement filed with the SEC since 2009 carries XBRL tags that map each reported figure to a concept in the US GAAP taxonomy. SemanticXBRL converts this existing machine-readable structure into the [[RDF]] data model, making it directly queryable via [[SPARQL]] and linkable to other [[Linked Data]] sources.\n\nThe significance of SemanticXBRL lies in its scale and its reuse of existing regulatory infrastructure. Rather than building a new extraction pipeline from unstructured text — as [[FinReflectKG]] does for narrative 10-K sections — SemanticXBRL works with the already-structured XBRL layer that companies are legally required to file. The result is high-precision financial data: revenue, net income, total assets, debt, and hundreds of other concepts, all with explicit period annotations (annual, quarterly) and company identifiers.\n\nAt 125 million+ [[Triple|triples]] across ~30,000 filings, SemanticXBRL represents one of the largest open [[RDF]] datasets in the financial domain — larger than most academic [[Knowledge Graph|knowledge graphs]] by an order of magnitude.\n\n## Scale\n\n| Dimension | Value |\n|---|---|\n| Filings converted | ~30,000 SEC EDGAR filings |\n| Output triples | 125 million+ |\n| Source format | [[XBRL]] (US GAAP taxonomy) |\n| Output format | [[RDF]] triples |\n| Coverage | US public companies (10-K, 10-Q, and related forms) |\n| Access | Open (Semantic Web Journal paper) |\n\n## Data Characteristics\n\n### Source: XBRL Filings\n\n[[XBRL]] uses an XML-based tagging system where each financial fact is associated with:\n\n- A **concept** from the GAAP taxonomy (e.g., `us-gaap:Revenues`, `us-gaap:Assets`)\n- A **context** specifying the reporting entity and period (e.g., Apple Inc., fiscal year 2023)\n- A **unit** (currency, shares, etc.)\n- A **value** (the reported number)\n\nThis dimensional structure — (company × period × concept) — is the organizing axis of XBRL. SemanticXBRL preserves this structure in [[RDF]], mapping each dimension to an appropriate predicate.\n\n### Output: RDF Triples\n\nThe conversion maps XBRL structure to [[RDF]] as follows:\n\n- Each filing becomes a named graph or set of triples identified by the filer's CIK (SEC company identifier)\n- XBRL concepts become [[RDF]] predicates or objects\n- Period annotations become literal values or linked time individuals\n- Company identifiers link to [[Legal Entity]] and [[Financial Identifier]] resources\n\n### Financial Concepts Covered\n\nSemanticXBRL captures all concepts reported under the US GAAP XBRL taxonomy, including:\n\n- **Income statement:** Revenue, gross profit, operating income, net income, EPS\n- **Balance sheet:** Total assets, total liabilities, stockholders' equity, cash and equivalents\n- **Cash flow:** Operating, investing, and financing cash flows\n- **Segment data:** Revenue and profit by reportable segment\n\n## Relationship to XBRL and Linked Data\n\nSemanticXBRL demonstrates that [[XBRL]] is not merely a compliance format — it is a latent [[Linked Data]] layer waiting to be activated. The US GAAP XBRL taxonomy is itself a structured vocabulary, analogous to an [[OWL]] ontology, with concept hierarchies and definitions. By converting XBRL facts to [[RDF]], SemanticXBRL makes this vocabulary machine-traversable and joinable with [[FIBO]] class definitions and [[LSEG PermID]] entity identifiers.\n\nThe [[SPARQL]] queryability of the resulting dataset enables cross-company, cross-period financial analysis that would require complex database joins in a traditional relational model. For example, a [[SPARQL]] query can retrieve the revenue trend for all S&P 500 companies over ten years in a single graph traversal.\n\n## Relationship to FinReflectKG\n\n[[FinReflectKG]] and SemanticXBRL are complementary approaches to the same source documents (SEC filings):\n\n- **SemanticXBRL** converts the structured XBRL layer — quantitative financial facts with precise taxonomy tags\n- **[[FinReflectKG]]** extracts the narrative text layer — qualitative facts about subsidiaries, risk factors, and business operations\n\nA complete financial [[Knowledge Graph]] built from SEC filings would integrate both layers: SemanticXBRL provides the numerical backbone; [[FinReflectKG]] provides the relational context.\n\n## Use Cases\n\n- **Fundamental analysis at scale:** Query revenue, earnings, and balance sheet trends across thousands of companies via [[SPARQL]]\n- **Anomaly detection:** Identify outlier financial ratios that may indicate reporting irregularities\n- **Ontology alignment:** Map US GAAP XBRL taxonomy concepts to [[FIBO]] [[Securities]] and financial instrument classes\n- **Benchmark dataset:** 125M+ triples provide a large-scale test bed for financial [[Knowledge Graph]] tools and reasoners\n\n## Key URLs\n\n- Paper: https://www.semantic-web-journal.net/system/files/swj869.pdf\n\n## Sources\n\n- `sources/web-clips/semantic-xbrl-dataset.md`\n\n## See Also\n\n- [[RDF]], [[Triple]], [[XBRL]], [[SPARQL]], [[Linked Data]]\n- [[Financial Knowledge Graph]], [[FIBO]], [[Legal Entity]]\n- [[FinReflectKG]], [[LSEG PermID]], [[Financial Identifier]]\n" },
    { id: "W3C", category: "entities", definition: "", content: "# W3C (World Wide Web Consortium)\n\n**Type:** Standards organization\n**Founded:** 1994\n**Director:** Tim Berners-Lee (founder)\n\n## Overview\n\nThe World Wide Web Consortium is the principal international standards body responsible for developing and maintaining the open standards that underpin the modern web. Founded by Tim Berners-Lee, W3C operates through a member-driven process where industry, academia, and government stakeholders collaborate to produce technical specifications. In the context of [[Semantic Web]] and [[Knowledge Graph]] technologies, W3C's role is foundational — virtually every key standard in the space originates from a W3C working group.\n\nW3C standards are published as Recommendations, progressing through Working Draft, Candidate Recommendation, and Proposed Recommendation stages before reaching finality. This deliberate process ensures broad consensus and interoperability across implementations.\n\n## Key Standards\n\nW3C has produced the core stack of semantic technologies:\n\n- **[[RDF]]** (Resource Description Framework) — the data model for expressing facts as [[Triple|triples]], forming the bedrock of the [[Semantic Web]]\n- **[[RDFS]]** (RDF Schema) — extends RDF with vocabulary for class hierarchies and property definitions\n- **[[OWL]]** (Web Ontology Language) — a rich language for authoring [[Ontology|ontologies]] grounded in [[Description Logic]]\n- **[[SPARQL]]** — the query language for RDF data, analogous to SQL for relational databases\n- **[[SHACL]]** (Shapes Constraint Language) — a language for validating RDF graphs against declared constraints\n- **[[Linked Data]]** principles — best practices for publishing interconnected data on the web using [[URI and IRI|URIs]]\n\nThese standards form a layered architecture sometimes called the \"Semantic Web stack,\" where each layer builds on the one below.\n\n## Role in Ontologies\n\nW3C's standardization work transformed ontology engineering from an academic discipline into an interoperable engineering practice. Before OWL and RDF, ontologies existed in proprietary formats with no guaranteed exchange mechanism. W3C's standards gave the community a common syntax ([[Turtle]], RDF/XML, JSON-LD), shared semantics grounded in formal logic, and queryable access via [[SPARQL]]. Tools like [[Protege]] were built explicitly around W3C's OWL standard, and public knowledge bases like [[Wikidata]] and [[DBpedia]] publish their data in W3C-compliant RDF.\n\n## See Also\n\n- [[Semantic Web]]\n- [[Linked Data]]\n- [[OWL]]\n- [[RDF]]\n- [[SPARQL]]\n- [[SHACL]]\n- [[Ontology]]\n" },
    { id: "Wikidata", category: "entities", definition: "", content: "# Wikidata\n\n**Type:** Knowledge base / Knowledge graph\n**Operator:** Wikimedia Foundation\n**Launched:** 2012\n**License:** Creative Commons CC0 (public domain)\n\n## Overview\n\nWikidata is a free, collaborative, multilingual [[Knowledge Graph]] maintained by the Wikimedia Foundation. It serves as the central structured data repository for all Wikimedia projects, including Wikipedia, Wikivoyage, and Wikisource. Anyone can edit Wikidata, and its contents are released into the public domain under the CC0 license, making it one of the most freely reusable large-scale knowledge bases in existence.\n\nAt its core, Wikidata stores facts as [[Triple|statements]] that follow a subject–predicate–object pattern consistent with the [[RDF]] data model. Each statement can be enriched with qualifiers (contextual details like time periods or locations) and references (citations supporting the claim). The entire database is queryable via [[SPARQL]] through the Wikidata Query Service, and bulk dumps are available in [[RDF]] and JSON formats.\n\nWikidata plays a central role in the [[Linked Data]] ecosystem because its items are assigned globally unique [[URI and IRI|URIs]], allowing external datasets like [[DBpedia]] and domain-specific knowledge graphs to link directly to Wikidata entities.\n\n## Structure\n\nWikidata's data model has several key components:\n\n- **Items** — The primary entities, identified by Q-numbers (e.g., Q42 for Douglas Adams). Each item represents a real-world concept, person, place, or thing.\n- **Properties** — The predicates linking items to values, identified by P-numbers (e.g., P31 for \"instance of\", P569 for \"date of birth\"). Properties define the schema of what can be stated.\n- **Statements** — A (item, property, value) [[Triple]] that asserts a fact. Values can be other items, strings, quantities, dates, or coordinates.\n- **Qualifiers** — Additional property–value pairs scoped to a single statement, expressing when, where, or under what conditions a fact holds.\n- **References** — Citations attached to statements to indicate the source of a claim, supporting verifiability.\n- **Sitelinks** — Connections from a Wikidata item to the corresponding article in a Wikimedia project.\n\n## Querying with SPARQL\n\nThe Wikidata Query Service exposes the full graph via [[SPARQL]], allowing users to answer complex questions by joining across millions of items and properties. Results can be returned as tables, maps, timelines, or graphs, making Wikidata a powerful resource for data journalism, research, and machine learning.\n\n## See Also\n\n- [[Knowledge Graph]]\n- [[RDF]]\n- [[SPARQL]]\n- [[Linked Data]]\n- [[Triple]]\n- [[URI and IRI]]\n- [[DBpedia]]\n- [[Ontology]]\n" },
    { id: "Xbrl", category: "entities", definition: "eXtensible Business Reporting Language — an XML-based open standard for structured financial reporting, mandated in over 60 countries, with 15,000+ taxonomy elements and bridge projects linking it to [[OWL]], [[RDF]], and [[SPARQL]] environments.", content: "# XBRL\n\n**Type:** Standard / Reporting Language\n\n**Definition:** eXtensible Business Reporting Language — an XML-based open standard for structured financial reporting, mandated in over 60 countries, with 15,000+ taxonomy elements and bridge projects linking it to [[OWL]], [[RDF]], and [[SPARQL]] environments.\n\n## Overview\n\nXBRL is the global standard for machine-readable financial disclosure, enabling financial data to be tagged with metadata drawn from standardized taxonomies so regulators, investors, and analysts can consume and compare statements programmatically. Rather than rekeying numbers from PDF filings, XBRL-tagged data flows directly into analytical systems. The standard is mandated in over 60 countries across more than 220 regulatory implementations, with the US SEC, EU ESMA, and EU EBA among the largest mandate authorities. The 2025 US GAAP taxonomy (effective March 17, 2025) contains over 15,000 elements spanning income statements, balance sheets, cash flow statements, notes disclosures, and segment reporting.\n\nXBRL uses its own XML-based taxonomy format — distinct from [[OWL]] — with concepts defined in XSD and relationships expressed in custom XML linkbases (label, reference, calculation, definition, presentation). The core XBRL 2.1 specification is extended by Inline XBRL (iXBRL, which embeds tags in human-readable HTML), XBRL Formula (rule-based validation), and XBRL Taxonomy Packages. The SEC's EDGAR system validates submissions and exposes structured data via EDGAR Data APIs. Despite not being natively RDF, several significant bridge projects exist: [[FinRegOnt]] provides the only known open-source [[OWL]] ontology with complete coverage of all XBRL specifications, and the SemanticXBRL project converted approximately 30,000 SEC filings into [[RDF]], producing over 125 million triples queryable via [[SPARQL]].\n\n[[FIBO]] financial instrument and market classes can be cross-referenced with XBRL taxonomy elements to enrich SEC filing data with [[Ontology]]-level semantics. LEI codes from [[GLEIF]] appear in XBRL filings as entity identifiers, supplementing SEC CIK numbers. [[FIGI]] identifiers can supplement N-PORT portfolio XBRL filings with unambiguous cross-exchange instrument references. SEC EDGAR — the primary XBRL submission portal — holds decades of structured filing data now increasingly accessible via APIs and [[Linked Data]] initiatives.\n\n## Key Components\n\n- **Concept:** Named, typed financial data point defined in a taxonomy (analogous to an [[OWL]] class)\n- **Context:** Entity, period, and scenario to which a reported value applies\n- **Fact:** Single tagged value associating a concept with a context and unit\n- **Linkbase:** XML file defining concept relationships (labels, references, calculations, definitions, presentations)\n- **Dimension:** Structured axis for disaggregating facts (segment, geography, product line)\n- **Inline XBRL (iXBRL):** XBRL tags embedded in HTML — one document for humans and machines\n- **XBRL Formula:** Rule-based validation and calculation expressions\n- **Key taxonomies:** US GAAP (FASB, 15,000+ elements), IFRS (IFRS Foundation), COREP/FINREP (EBA), ESEF (ESMA)\n\n## OWL/RDF Availability\n\nXBRL is not natively OWL/RDF, but is bridged via:\n\n- **[[FinRegOnt]] XBRL Ontology:** Complete OWL coverage of all XBRL specifications — https://finregont.com/\n- **SemanticXBRL:** 30,000 SEC filings → 125M+ RDF triples — http://semanticxbrl.org/\n- **XBRL.org RDF Working Group:** Exploring normative XBRL Dimensions ↔ OWL class hierarchy mappings\n- SEC EDGAR: https://www.sec.gov/structureddata/osd_edgar_vfiler.htm\n\n## Relationships\n\n- **Aligned with:** [[FIBO]] (instrument/securities cross-reference), [[GLEIF]] (LEI entity identification), [[FIGI]] (instrument identification in N-PORT)\n- **Bridged to OWL/RDF by:** [[FinRegOnt]], SemanticXBRL project\n- **Queryable via:** [[SPARQL]] (via SemanticXBRL RDF dataset)\n- **Mandate authority:** SEC EDGAR (US), ESMA ESEF (EU), EBA COREP/FINREP (banking)\n\n## Key URLs\n\n- Homepage: https://www.xbrl.org/\n- FASB Taxonomies: https://fasb.org/projects/fasb-taxonomies\n- IFRS Taxonomy: https://www.ifrs.org/issued-standards/ifrs-taxonomy/\n- SemanticXBRL: http://semanticxbrl.org/\n- FinRegOnt: https://finregont.com/\n\n## Sources\n\n- `sources/articles/xbrl-business-reporting.md`\n\n## See Also\n\n- [[Ontology]], [[OWL]], [[RDF]], [[SPARQL]], [[Linked Data]]\n- [[FIBO]], [[FinRegOnt]], [[GLEIF]], [[FIGI]], [[Financial Instrument]], [[SEC EDGAR]]\n" },

    { id: "Fibo vs Schema Org Financial", category: "comparisons", definition: "", content: "# FIBO vs. Schema.org Financial\n\nTwo major ontology frameworks cover financial concepts: [[FIBO]], the industry-grade formal ontology maintained by the EDM Council, and [[Schema.org Financial]], the lightweight consumer-facing vocabulary published by the Schema.org community. They serve different audiences, operate at different levels of formalism, and are rarely in direct competition — but understanding when to use each is essential for financial knowledge engineering.\n\n## Comparison Table\n\n| Dimension | [[FIBO]] | [[Schema.org Financial]] |\n|---|---|---|\n| **Class count** | 2,436 classes (Q4 2025 production) | ~30 financial types |\n| **Domain scope** | Full financial industry — instruments, entities, markets, contracts, derivatives, regulatory | Consumer-facing — price specs, offers, loans, currencies |\n| **Logic layer** | [[OWL]] 2 DL — full description logic with restrictions, disjointness, cardinality | [[RDF]]Schema + [[OWL]] annotations — no DL axioms |\n| **Serialization** | RDF/XML, Turtle, JSON-LD, N-Triples, [[SKOS]], CSV | JSON-LD (primary), Microdata, RDFa |\n| **Reasoning support** | Full — HermiT, Pellet, FaCT++ | Minimal — no meaningful inference |\n| **Governance** | EDM Council + OMG — financial industry experts | Schema.org community — web/search engine focus |\n| **Primary adopters** | Banks, regulators, financial data vendors, research KGs | E-commerce sites, price comparison, web search |\n| **Identifier integration** | [[FIGI]], [[GLEIF]] LEI, [[ISIN]], [[MIC]] | schema:identifier (generic) |\n| **License** | MIT (content) | CC-BY 4.0 |\n| **Maturity model** | Provisional → Production levels | Stable / draft labels |\n| **Learning curve** | High — requires [[OWL]] and DL background | Low — familiar to web developers |\n| **Linked with** | [[LSEG PermID]], [[GLEIF]], [[ISO 20022]], [[ISDA CDM]], [[FinRegOnt]] | [[GoodRelations]], open graph, structured data markup |\n\n## What FIBO Covers\n\n[[FIBO]] is organized into 10 domain modules, each independently importable:\n\n- **FND (Foundations):** Dates, quantities, relations, measurement units\n- **BE (Business Entities):** Corporations, partnerships, trusts — aligned with [[GLEIF]] L1/L2 ontologies\n- **SEC (Securities):** Equities, debt, funds, structured products — maps to [[XBRL]] taxonomy concepts\n- **DER (Derivatives):** Options, futures, swaps — reference layer for [[ISDA CDM]] and [[FpML]]\n- **FBC (Financial Business and Commerce):** Accounts, trading, clearing, settlement\n- **MD (Market Data):** Pricing, quotes, reference data\n- **IND (Indices and Indicators):** Benchmarks (S&P 500, LIBOR successors)\n- **LOAN:** Mortgages, consumer credit, loan facilities\n- **BP (Business Process):** Workflows, lifecycle events\n- **CAE (Corporate Actions and Events):** Dividends, splits, rights issues\n\nEach module is a full [[OWL]] 2 DL ontology. The `FinancialInstrument` hierarchy alone spans dozens of subclasses with formal axioms distinguishing equities from debt by structural properties, not just labels.\n\n## What Schema.org Financial Covers\n\n[[Schema.org Financial]] focuses on the types useful for marking up web content about financial products:\n\n- `LoanOrCredit` — personal and business loans, mortgages\n- `InvestmentOrDeposit` — bank deposits, investment accounts\n- `MoneyTransfer` — payment and wire transfer services\n- `CurrencyConversionService` — FX services\n- `PriceSpecification` — structured price data for offers\n- `MonetaryAmount` — currency-qualified numeric values\n\nThese types are designed for JSON-LD embedding in web pages so that search engines can display rich results for financial product queries. They carry no formal logical constraints — a `LoanOrCredit` individual is not formally disjoint from an `InvestmentOrDeposit`; the vocabulary relies on human judgment for correct usage.\n\nThe connection to [[GoodRelations]] is notable: Schema.org absorbed the GoodRelations e-commerce ontology, and its `PriceSpecification` and `Offer` types directly derive from GoodRelations, giving it solid coverage for pricing and product offers even if financial instrument semantics are thin.\n\n## When to Use FIBO\n\nUse [[FIBO]] when:\n\n- You are building a **financial [[Knowledge Graph]]** for industry, regulatory, or research purposes\n- You need **[[Inference and Reasoning|automated reasoning]]** to classify instruments, validate data, or infer relationships\n- Your graph must **interoperate** with other FIBO-aligned systems (GLEIF, PermID, ISDA CDM)\n- You are modeling **[[Financial Instrument|financial instruments]]** with precision — the difference between an American call option and a European put option matters in your domain\n- You need **[[SPARQL]] queries** to answer complex financial questions across multiple entity types\n- You are consuming or publishing **[[XBRL]]** data and need to map GAAP concepts to formal ontology classes\n- Regulatory compliance requires **formally grounded** definitions with governance provenance\n\nFIBO is the right choice for any project where semantic precision, interoperability, and reasoning are requirements. Its high learning curve is the cost of its expressiveness.\n\n## When to Use Schema.org Financial\n\nUse [[Schema.org Financial]] when:\n\n- You are **marking up web pages** about financial products for search engine rich results\n- Your primary goal is **SEO** and structured data discoverability, not knowledge graph inference\n- Your team is familiar with **JSON-LD and web development** but not OWL ontology engineering\n- The financial domain is **peripheral** to your application and you need a quick, widely-supported vocabulary\n- You are building a **consumer-facing** product comparison or price aggregation site\n\nSchema.org Financial is the right choice when you need something that works today with minimal setup and your audience is search engines and web crawlers, not OWL reasoners.\n\n## Hybrid Approaches\n\nIn practice, the two can coexist. A financial [[Knowledge Graph]] might:\n\n1. Use [[FIBO]] as the backbone ontology for internal knowledge representation and reasoning\n2. Generate [[Schema.org Financial]] JSON-LD annotations for public-facing web pages, mapping internal FIBO individuals to Schema.org types for SEO purposes\n\nThis mirrors how [[XBRL]] and [[RDF]] coexist: XBRL handles the regulatory reporting layer; RDF enables semantic integration. Similarly, [[Schema.org Financial]] handles the web discoverability layer; [[FIBO]] handles the knowledge engineering layer.\n\n## See Also\n\n- [[FIBO]], [[Schema.org Financial]], [[OWL]], [[RDF]], [[Linked Data]]\n- [[Financial Ontology]], [[GoodRelations]], [[Financial Instrument]]\n- [[XBRL]], [[GLEIF]], [[ISDA CDM]], [[FpML]]\n- [[Inference and Reasoning]], [[SPARQL]], [[Financial Knowledge Graph]]\n" },
    { id: "Financial Identifier Comparison", category: "comparisons", definition: "", content: "# Financial Identifier Comparison\n\n[[Financial Identifier|Financial identifiers]] are the keys that allow different data sources, systems, and [[Knowledge Graph|knowledge graphs]] to refer to the same financial entity or instrument unambiguously. Six identifiers dominate the industry: ISIN, CUSIP, SEDOL, [[FIGI]], LEI, and MIC. Each has a different scope, format, governance model, and degree of openness — understanding the differences is essential for [[Linked Data]] integration and [[Financial Knowledge Graph]] design.\n\n## Comparison Table\n\n| Dimension | ISIN | CUSIP | SEDOL | [[FIGI]] | LEI | MIC |\n|---|---|---|---|---|---|---|\n| **Full name** | International Securities Identification Number | Committee on Uniform Securities Identification Procedures | Stock Exchange Daily Official List | Financial Instrument Global Identifier | Legal Entity Identifier | Market Identifier Code |\n| **Scope** | Securities instruments (global) | Securities instruments (North America) | Securities instruments (UK/global) | Financial instruments (global) | Legal entities (organizations) | Trading venues / exchanges |\n| **Format** | 2-char country code + 9-char NSIN + 1 check digit (12 chars total) | 9 alphanumeric characters | 7 alphanumeric characters | 12 alphanumeric characters (BBG prefix) | 20 alphanumeric characters (ISO 17442) | 4-char alphanumeric (ISO 10383) |\n| **Example** | `US0378331005` (Apple) | `037833100` (Apple) | `2046251` (Apple) | `BBG000B9XRY4` (Apple) | `HWUPKR0MPOU8FGXBT394` (Apple) | `XNAS` (NASDAQ) |\n| **Openness** | Restricted — issued by national numbering agencies, license required for bulk use | Restricted — CUSIP Global Services, licensed | Restricted — London Stock Exchange, licensed | Open — CC-BY 4.0, free bulk download | Open — [[GLEIF]] publishes full LEI registry under CC-0 | Open — ISO 10383 list free |\n| **Governance** | ANNA (Association of National Numbering Agencies) / ISO 6166 | CUSIP Global Services (CGS) / ABA | LSEG (formerly London Stock Exchange) | Object Management Group (OMG) | [[GLEIF]] (Global Legal Entity Identifier Foundation) / ISO 17442 | ISO TC68 / [[SWIFT]] |\n| **[[Ontology]] representation** | [[FIBO]] SEC module (`hasISIN` property) | [[FIBO]] SEC module (`hasCUSIP` property) | [[FIBO]] SEC module (`hasSEDOL` property) | [[FIBO]] MD module; OMG FIGI ontology | [[GLEIF]] L1 OWL ontology (`hasLEI`); [[FIBO]] BE module | [[FIBO]] FBC module (`hasMarketIdentifierCode`) |\n| **Entity type** | Instrument | Instrument | Instrument | Instrument | Organization / Legal entity | Market / Exchange |\n| **Coverage** | Global (212 countries via ANNA) | Primarily North America | Global (UK-origin, global expansion) | Global (all asset classes) | Global (any legal entity) | Global (all trading venues) |\n| **[[Linked Data]] use** | Via [[FIBO]] and [[LSEG PermID]] cross-links | Via [[FIBO]] properties | Via [[FIBO]] properties | Open [[URI and IRI\\|URI]] pattern: `https://www.openfigi.com/id/<figi>` | [[GLEIF]] publishes LEI data as [[RDF]] | Via [[FIBO]] FBC properties |\n\n## ISIN\n\nThe International Securities Identification Number (ISO 6166) is the global standard for identifying a security. An ISIN uniquely identifies the instrument across markets — Apple common stock has ISIN `US0378331005` regardless of whether it trades on NASDAQ, the Frankfurt Stock Exchange, or a dark pool.\n\nStructure: `CC-NNNNNNNNN-D` where CC is the ISO 3166-1 alpha-2 country code of the issuing national numbering agency, NNNNNNNNN is the 9-character national instrument number, and D is a Luhn check digit.\n\n**Limitation:** ISIN identifies the instrument, not the trading venue or quote. Two listings of the same instrument on different exchanges share an ISIN but have different [[FIGI]] values.\n\n**[[Ontology]] use:** [[FIBO]]'s SEC module defines `hasISIN` as a data property on `ListedSecurity`. [[LSEG PermID]] includes ISIN in its Instrument records as a cross-identifier link.\n\n## CUSIP\n\nCUSIP is the North American instrument identifier, used primarily for US and Canadian securities. It predates ISIN and remains deeply embedded in US financial infrastructure. Most US financial systems store CUSIP natively; ISIN is derived by prepending the country code and appending a check digit.\n\nCUSIP is licensed, making bulk use in open [[Knowledge Graph]] projects legally complex. [[FIBO]] represents it as a property on instrument individuals, but open datasets typically omit CUSIP due to licensing constraints.\n\n## SEDOL\n\nThe Stock Exchange Daily Official List identifier originated with the London Stock Exchange and is now administered by LSEG. It covers UK and international securities and is commonly used in European financial systems alongside ISIN. Like CUSIP, SEDOL is licensed.\n\n## FIGI\n\nThe Financial Instrument Global Identifier is the newest and most open of the instrument identifiers. Developed by Bloomberg and donated to the OMG (Object Management Group), [[FIGI]] is issued under CC-BY 4.0, making it freely usable in open [[Knowledge Graph]] projects.\n\n**Key distinction from ISIN:** [[FIGI]] is venue-specific. The same Apple common stock has a different [[FIGI]] on NASDAQ (`BBG000B9XRY4`) than on the Frankfurt Stock Exchange. This granularity makes [[FIGI]] the preferred identifier for market data and execution-level [[Knowledge Graph]] nodes, while ISIN is preferred for instrument-level nodes.\n\n**[[Linked Data]] pattern:**\n```turtle\n<https://www.openfigi.com/id/BBG000B9XRY4> a fibo-sec-lst-ls:ListedSecurity ;\n    fibo-fbc-fi-fi:hasFIGI \"BBG000B9XRY4\" ;\n    fibo-fbc-fi-fi:hasISIN \"US0378331005\" .\n```\n\n[[FIBO]]'s MD (Market Data) module defines [[FIGI]]-aligned properties. The OMG also publishes a dedicated [[FIGI]] OWL ontology.\n\n## LEI\n\nThe Legal Entity Identifier (ISO 17442) identifies legal entities — organizations, not instruments. [[GLEIF]] (Global Legal Entity Identifier Foundation) issues and maintains the LEI registry, which is published as open data under CC-0.\n\n**LEI structure:** 20 characters. The first 4 identify the LOU (Local Operating Unit) that issued the LEI; the next 14 are entity-specific; the last 2 are check digits.\n\n**[[Linked Data]] significance:** [[GLEIF]] publishes the full LEI registry as [[RDF]] via 7 OWL ontologies aligned with [[FIBO]]'s LegalEntity hierarchy. This makes LEI the most semantically rich open financial identifier — each LEI entry resolves to a machine-readable description of the legal entity including its jurisdiction, registration status, and L2 (ultimate parent) relationships.\n\n**[[FIBO]] relationship:** [[FIBO]]'s BE module defines `hasLEI` as a property. The [[GLEIF]] ontologies extend FIBO's `LegalEntity` with LEI-specific axioms.\n\n[[LSEG PermID]] includes LEI as a cross-reference in its Organization records, bridging the PermID and GLEIF identity systems.\n\n## MIC\n\nThe Market Identifier Code (ISO 10383) identifies trading venues — stock exchanges, multilateral trading facilities (MTFs), and systematic internalisers. The ISO 10383 code list is freely available, making MIC the most open of the instrument-adjacent identifiers.\n\nMIC is a 4-character code: `XNAS` for NASDAQ, `XLON` for the London Stock Exchange, `XETR` for Deutsche Börse XETRA. [[FIBO]]'s FBC module defines `hasMarketIdentifierCode` as a property on `TradingVenue`.\n\nMICs are essential for resolving the ambiguity that ISINs create: when the same ISIN trades on multiple venues, the MIC distinguishes which venue's price and liquidity data is referenced.\n\n## Choosing Identifiers for a Financial Knowledge Graph\n\nA production financial [[Knowledge Graph]] typically uses multiple identifiers in combination:\n\n| Node type | Recommended identifier(s) |\n|---|---|\n| Legal entity (company, bank) | LEI (open) + [[LSEG PermID]] URI |\n| Instrument (equity, bond) | ISIN + [[FIGI]] (open) |\n| Listing / quote | [[FIGI]] (venue-specific) |\n| Trading venue | MIC |\n\nThe guide [[Building a Financial Knowledge Graph]] covers this selection process in the context of a full construction workflow.\n\nFor [[Linked Data]] publication, [[URI and IRI|URI]] selection is equally important: use dereferenceable URIs (PermID URIs for organizations, OpenFIGI URIs for instruments) as canonical node identifiers rather than bare code strings, which are not [[Linked Data]]-compatible.\n\n## Ontology Representation Summary\n\nAll six identifiers are represented in [[FIBO]] as data properties on the appropriate entity class:\n\n- ISIN, CUSIP, SEDOL, [[FIGI]] → properties on `FinancialInstrument` / `ListedSecurity`\n- LEI → property on `LegalEntity` (also in [[GLEIF]] OWL ontologies)\n- MIC → property on `TradingVenue` / `FinancialMarket`\n\n[[SPARQL]] queries against a FIBO-aligned graph can retrieve any of these identifier values as literals, enabling joins across datasets that use different primary identifiers.\n\n## See Also\n\n- [[Financial Identifier]], [[FIGI]], [[GLEIF]], [[URI and IRI]]\n- [[FIBO]], [[Linked Data]], [[RDF]], [[SPARQL]]\n- [[Financial Instrument]], [[Legal Entity]], [[Securities]]\n- [[LSEG PermID]], [[SemanticXBRL]]\n- [[Building a Financial Knowledge Graph]]\n" },
    { id: "Fpml vs Fix vs Iso20022", category: "comparisons", definition: "", content: "# FpML vs. FIX Protocol vs. ISO 20022\n\nFinancial messaging standards define how market participants communicate trade details, orders, payments, and reference data. Three standards dominate different segments of the financial industry: [[FpML]] for OTC derivatives, [[FIX Protocol]] for electronic trading, and [[ISO 20022]] for payments and securities settlement. All three have relevance to financial [[Ontology]] and [[Knowledge Graph]] construction.\n\n## Comparison Table\n\n| Dimension | [[FpML]] | [[FIX Protocol]] | [[ISO 20022]] |\n|---|---|---|---|\n| **Full name** | Financial products Markup Language | Financial Information eXchange | ISO 20022 Universal Financial Industry Message Scheme |\n| **Domain** | OTC derivatives — swaps, options, forwards, structured products | Electronic order routing and trade execution — equities, futures, FX | Payments, securities, FX, trade services — all asset classes |\n| **Format** | XML (primary), JSON (FpML 6.x) | Tag-value pairs (FIX native), FIXML (XML variant) | XML (canonical), JSON (ISO 20022 JSON) |\n| **Governance** | ISDA / ISDA FpML Working Group | FIX Trading Community (industry consortium) | ISO TC68 / SWIFT / national standards bodies |\n| **OWL availability** | Partial — [[ISDA CDM]] formalizes FpML semantics in OWL | None official — community efforts only | Active — [[FIBO]] maps ISO 20022 `reda` messages |\n| **[[Ontology]] alignment** | [[ISDA CDM]], [[FIBO]] DER/FBC modules | [[FIBO]] FBC (partial) | [[FIBO]] BE, FBC, IND, SEC modules |\n| **Scope** | Trade confirmation, lifecycle events, reference data | Order management, execution reports, market data | Payment instructions, settlement, corporate actions, regulatory reporting |\n| **Adoption** | Global derivatives dealers, CCPs, trade repositories | Equities, futures, FX brokers, electronic trading venues | Central banks, CSDs, payments networks (SWIFT, TARGET2, Fedwire) |\n| **Latency profile** | Low-latency not a goal — complex structured messages | Ultra-low-latency capable — binary FIX (FAST/SBE) | Batch and near-real-time — not optimized for sub-millisecond |\n| **Message complexity** | Very high — full trade economics in a single message | Low to medium — optimized for speed over richness | Medium to high — rich structured data with extensibility |\n| **Versioning** | FpML 5.x (stable), FpML 6.x (JSON) | FIX 4.x (legacy), FIX 5.x, FIXT 1.1 | ISO 20022 (rolling updates via SWIFT catalogue) |\n\n## FpML in Detail\n\n[[FpML]] is the dominant standard for representing OTC (over-the-counter) derivative contracts. A single FpML document can encode the complete economic terms of an interest rate swap, credit default swap, equity option, or commodity forward — including notional, fixing schedules, payment dates, and counterparty details.\n\nFpML's semantic richness makes it a natural target for [[Ontology]] formalization. The [[ISDA CDM]] (Common Domain Model) is essentially a formal ontology — written in the Rosetta DSL and available in Java, Python, and [[OWL]] — that captures the semantics of FpML trade structures. [[FIBO]]'s DER (Derivatives) and FBC (Financial Business and Commerce) modules overlap with FpML's scope and provide the formal OWL 2 DL axioms that FpML's XML schema lacks.\n\nFor [[Financial Knowledge Graph]] construction, FpML is relevant as a source schema: the relation types and [[Financial Instrument]] classes in an OTC derivatives graph should align with FpML's product taxonomy.\n\n## FIX Protocol in Detail\n\n[[FIX Protocol]] was designed for speed: it emerged in 1992 as a bilateral message format between Fidelity and Salomon Brothers for equity order routing, and it now handles trillions of dollars of electronic order flow daily. FIX's native tag-value format (e.g., `55=AAPL|54=1|38=100`) is compact and fast to parse, critical for high-frequency trading infrastructure.\n\nFIX is less semantically rich than FpML or ISO 20022. Its primary concern is the lifecycle of an order (new, partially filled, cancelled, rejected) rather than the full economics of a financial product. FIXML is the XML variant that adds structure but trades some of the performance advantage.\n\nFrom an [[Ontology]] perspective, FIX is the hardest of the three to formalize because its semantics live primarily in community conventions and usage guides rather than formally defined schemas. [[FIBO]]'s FBC module covers some of the same concepts (orders, executions, clearing) but from a reference data rather than messaging perspective.\n\nFIX is directly relevant to [[Financial Knowledge Graph]] construction for market microstructure graphs: order flow, execution quality, and trading venue analysis all require FIX-level event data.\n\n## ISO 20022 in Detail\n\n[[ISO 20022]] is the most ambitious of the three — it aims to cover all financial industry messages under a single meta-model. Its scope extends far beyond trading to include:\n\n- **Payment initiation and settlement** (pacs, pain message families)\n- **Securities post-trade** (sese, semt, setr)\n- **Corporate actions** (seev)\n- **Reference data** (reda — instrument and party reference data)\n- **Regulatory reporting** (auth)\n- **FX** (fxtr)\n\nThe `reda` (Reference Data) message family is the most relevant for [[Knowledge Graph]] construction. ISO 20022 `reda` messages describe [[Financial Instrument|financial instruments]], parties, and markets in structured XML that overlaps substantially with [[FIBO]] SEC and BE module content. [[FIBO]] actively maps `reda` message elements to FIBO classes, making ISO 20022 one of the few messaging standards with a formal [[OWL]] bridge.\n\nThe migration of global payment systems (SWIFT, TARGET2, Fedwire) to ISO 20022 by 2025 makes this standard increasingly important as the lingua franca of financial messaging. [[XBRL]] taxonomies and ISO 20022 `reda` share some vocabulary with US GAAP concepts, creating cross-standard alignment opportunities.\n\n## Ontology and Knowledge Graph Implications\n\n| Standard | KG Relevance | [[Ontology]] Bridge |\n|---|---|---|\n| [[FpML]] | OTC derivative trade graph — product taxonomy, lifecycle events | [[ISDA CDM]] (OWL), [[FIBO]] DER |\n| [[FIX Protocol]] | Market microstructure graph — orders, executions, venues | [[FIBO]] FBC (partial) |\n| [[ISO 20022]] | Payment and settlement graph — parties, accounts, instruments | [[FIBO]] BE/FBC/SEC, active `reda` mapping |\n\nAll three standards benefit from [[FIBO]] alignment because FIBO provides the shared semantic layer that bridges message-level concepts to formal ontology definitions. A production financial [[Knowledge Graph]] that ingests from multiple sources — FpML trade confirmations, FIX execution reports, ISO 20022 payment messages — can use [[FIBO]] as the normalization target, mapping each message format's fields to the corresponding FIBO class or property.\n\n## See Also\n\n- [[FpML]], [[FIX Protocol]], [[ISO 20022]], [[FIBO]], [[ISDA CDM]]\n- [[Financial Instrument]], [[Ontology]], [[OWL]]\n- [[Financial Knowledge Graph]], [[SPARQL]], [[RDF]]\n- [[Securities]], [[Derivatives]]\n" },
    { id: "Ontology vs Taxonomy", category: "comparisons", definition: "", content: "# Ontology vs. Taxonomy\n\nA common source of confusion in knowledge representation is the distinction between an [[Ontology]] and a [[Taxonomy]]. Both organize concepts into hierarchies, but they differ substantially in expressiveness, formality, and intended use.\n\n## Comparison Table\n\n| Dimension | [[Taxonomy]] | [[Ontology]] |\n|---|---|---|\n| Primary structure | Strict tree (single parent) | Graph (multiple parents, complex relations) |\n| Relation types | `is-a` only | `is-a`, `part-of`, custom [[Class and Property\\|properties]], restrictions |\n| Formal logic | None or minimal | [[Description Logic]] (in [[OWL]]) |\n| [[Inference and Reasoning\\|Reasoning]] support | No | Yes — reasoners can infer new facts |\n| Standards | Often proprietary or SKOS | [[OWL]], [[RDFS]], [[RDF]] via [[W3C]] |\n| Expressiveness | Low | High |\n| Typical size | Hundreds to thousands of terms | Hundreds to millions of axioms |\n| Learning curve | Low | Medium to high |\n\n## What is a Taxonomy?\n\nA [[Taxonomy]] is a hierarchical classification scheme where every concept has exactly one parent (except the root). Biological classification (Kingdom → Phylum → Class → Order → Family → Genus → Species) is the canonical example. Taxonomies are easy to build, easy to navigate, and sufficient when all you need is a browsable category structure.\n\nIn semantic technologies, taxonomies are often expressed using SKOS (Simple Knowledge Organization System), a [[W3C]] standard that sits between a flat controlled vocabulary and a full [[Ontology]]. SKOS uses [[RDFS]] and [[RDF]] but does not require [[OWL]] expressiveness.\n\n## What is an Ontology?\n\nAn [[Ontology]] goes further by defining not just a class hierarchy but also the [[Class and Property|properties]] that relate classes to one another, the constraints those properties must satisfy, and the logical axioms that govern membership in a class. An [[OWL]] ontology can express that a `Vegetarian` is a `Person` who eats only food that is not `MeatProduct`, and a reasoner applying [[Description Logic]] can automatically classify individuals accordingly.\n\n[[OWL]] and [[RDFS]] provide the standard languages for ontologies endorsed by [[W3C]]. [[RDFS]] offers a lightweight ontology layer (subclass, domain, range), while [[OWL]] adds disjointness, cardinality restrictions, property characteristics, and more.\n\n## When to Use Which\n\n**Use a taxonomy when:**\n- You need a simple browsable hierarchy for navigation or faceted search\n- Your team lacks ontology engineering expertise\n- The domain changes rapidly and formal axioms would be brittle\n- Integration with other knowledge bases is not required\n\n**Use an ontology when:**\n- You need [[Inference and Reasoning|automated reasoning]] to derive implicit facts\n- Multiple inheritance and complex relationships are necessary\n- You want to publish data as part of the [[Linked Data]] ecosystem\n- Data from multiple sources must be formally aligned\n\n## See Also\n\n- [[Ontology]]\n- [[Taxonomy]]\n- [[OWL]]\n- [[RDFS]]\n- [[Class and Property]]\n- [[Inference and Reasoning]]\n- [[Description Logic]]\n- [[W3C]]\n" },
    { id: "OWL vs RDFS", category: "comparisons", definition: "", content: "# OWL vs. RDFS\n\nBoth [[OWL]] and [[RDFS]] are [[W3C]] standards for defining vocabularies and schemas over [[RDF]] data. They occupy different positions on the expressiveness spectrum, and choosing between them shapes everything from reasoning complexity to tooling requirements.\n\n## Comparison Table\n\n| Dimension | [[RDFS]] | [[OWL]] DL |\n|---|---|---|\n| Full name | RDF Schema | Web Ontology Language |\n| W3C standard year | 2004 (rev. 2014) | 2004 (OWL 2 in 2009) |\n| Logical foundation | Subset of first-order logic | [[Description Logic]] (SROIQ) |\n| Class hierarchy | `rdfs:subClassOf` | `rdfs:subClassOf` + equivalence, disjointness |\n| Property hierarchy | `rdfs:subPropertyOf` | Richer: inverse, transitive, symmetric, functional |\n| Restrictions | Domain and range only | Cardinality, existential, universal, hasValue |\n| [[Inference and Reasoning\\|Reasoning]] complexity | Polynomial (low cost) | Decidable but ExpTime-complete (high cost) |\n| Open World Assumption | Yes | Yes |\n| Typical reasoners | Any RDFS-aware triple store | HermiT, Pellet, FaCT++, ELK |\n| Tooling (e.g. [[Protege]]) | Supported | Fully supported |\n\n## RDFS: Lightweight Schema Layer\n\n[[RDFS]] extends [[RDF]] with a small set of vocabulary terms for describing classes and [[Class and Property|properties]]. The core constructs are `rdfs:subClassOf`, `rdfs:subPropertyOf`, `rdfs:domain`, and `rdfs:range`. An RDFS reasoner can infer that if `Dog rdfs:subClassOf Animal`, then any instance of `Dog` is also an instance of `Animal`.\n\nRDFS reasoning is fast and scales to very large datasets. Most triple stores and graph databases implement RDFS inference natively. Its simplicity makes it a good choice for lightweight data integration tasks where you need a shared vocabulary without the overhead of full [[Description Logic]] reasoning.\n\n## OWL: Full Ontology Language\n\n[[OWL]] builds on [[RDFS]] and [[RDF]] to provide a much richer language grounded in [[Description Logic]]. OWL adds the ability to declare classes as equivalent or disjoint, define properties as inverse or transitive, assert cardinality restrictions (e.g., \"every Person has exactly two biological parents\"), and construct complex class expressions using set operators (union, intersection, complement).\n\nOWL 2 introduced three tractable profiles — OWL EL, OWL QL, and OWL RL — that trade some expressiveness for dramatically better reasoning performance. This makes [[OWL]] applicable even to very large biomedical ontologies like SNOMED CT and Gene Ontology.\n\n[[Protege]] is the standard tool for authoring OWL ontologies. It integrates directly with reasoners like HermiT and Pellet to provide real-time [[Inference and Reasoning|consistency checking and classification]].\n\n## When to Use Which\n\n**Use [[RDFS]] when:**\n- You need a simple shared vocabulary for a dataset\n- Reasoning speed and scalability are priorities\n- The domain does not require complex constraints or disjointness\n\n**Use [[OWL]] when:**\n- You need to express complex domain constraints formally\n- [[Inference and Reasoning|Automated reasoning]] is a core requirement (e.g., classifying individuals, detecting inconsistencies)\n- You are building a reusable [[Ontology]] for a specific domain\n\n## See Also\n\n- [[OWL]]\n- [[RDFS]]\n- [[RDF]]\n- [[Description Logic]]\n- [[Class and Property]]\n- [[Inference and Reasoning]]\n- [[Protege]]\n- [[W3C]]\n- [[Triple]]\n" },
    { id: "Property Graph vs RDF", category: "comparisons", definition: "", content: "# Property Graph vs. RDF\n\nTwo dominant paradigms exist for modeling and storing graph data: the **property graph** model (used by Neo4j, Amazon Neptune, and others) and the **[[RDF]]** model standardized by [[W3C]]. They share the intuition of representing knowledge as a graph, but differ fundamentally in data model, query language, and ecosystem philosophy.\n\n## Comparison Table\n\n| Dimension | Property Graph | [[RDF]] Graph |\n|---|---|---|\n| Core unit | Nodes and edges with key-value properties | [[Triple]] (subject, predicate, object) |\n| Edge properties | Yes — edges are first-class with properties | No — edges are predicates; reification needed for edge metadata |\n| Node identity | Internal IDs (not globally unique) | [[URI and IRI\\|URIs]] (globally unique, dereferenceable) |\n| Schema | Optional labels and constraints | [[RDFS]] / [[OWL]] ontology (optional but standard) |\n| Query language | Cypher (Neo4j), Gremlin | [[SPARQL]] |\n| [[Inference and Reasoning\\|Reasoning]] | None built-in | Yes — via [[RDFS]] / [[OWL]] + reasoners |\n| Interoperability | Proprietary formats | Open [[W3C]] standards; links to [[Linked Data]] |\n| Standards body | Vendor-driven (openCypher, GQL) | [[W3C]] |\n| [[Knowledge Graph]] examples | Neo4j enterprise graphs | [[Wikidata]], [[DBpedia]], schema.org |\n\n## Property Graphs\n\nA property graph represents data as nodes (vertices) and relationships (edges), where both nodes and edges can carry arbitrary key-value properties. For example, an edge representing `KNOWS` between two person nodes can itself carry a `since` property recording when the relationship began. This makes property graphs highly intuitive for developers and easy to map onto application domain objects.\n\nNeo4j's **Cypher** query language is the most widely used property graph query language. A typical Cypher query reads like a pattern match: `MATCH (a:Person)-[:KNOWS]->(b:Person) RETURN a, b`. Cypher is expressive and approachable but proprietary — though the openCypher and GQL standards aim to address this.\n\nProperty graphs excel in operational settings: recommendation engines, fraud detection, network analysis, and application-level knowledge graphs where schema flexibility and query performance matter most.\n\n## RDF Graphs\n\n[[RDF]] represents everything as [[Triple|triples]], giving each resource a [[URI and IRI|URI]] that is globally unique and dereferenceable on the web. This design decision makes [[RDF]] graphs inherently interoperable: any two datasets that use the same URIs for the same concepts can be merged without ambiguity. [[SPARQL]] is the standard query language, supporting graph pattern matching, aggregation, federation across remote endpoints, and updates.\n\nThe trade-off is that attaching metadata to a relationship (e.g., a confidence score on a triple) requires verbose reification or the use of named graphs, which is less natural than property graph edge properties.\n\n[[RDF]] graphs integrate naturally with [[OWL]] ontologies and [[RDFS]] schemas, enabling [[Inference and Reasoning|automated reasoning]] over the data. This is a capability property graphs do not offer natively.\n\n## When to Use Which\n\n**Use a property graph when:**\n- You need fast, low-latency traversals in an operational application\n- Edge metadata (properties on relationships) is important\n- Your team is more comfortable with object-oriented thinking than formal semantics\n\n**Use [[RDF]] when:**\n- Global interoperability and [[Linked Data]] publishing are goals\n- You need to integrate data from multiple sources using shared vocabularies\n- [[Inference and Reasoning|Reasoning]] and ontology-driven data validation ([[SHACL]]) are required\n\n## See Also\n\n- [[Knowledge Graph]]\n- [[RDF]]\n- [[Triple]]\n- [[SPARQL]]\n- [[URI and IRI]]\n- [[OWL]]\n- [[RDFS]]\n- [[Wikidata]]\n- [[DBpedia]]\n" },
