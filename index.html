    { id: "Building a Financial Knowledge Graph", category: "guides", definition: "", content: "# Building a Financial Knowledge Graph\n\nThis guide walks through a structured, six-step process for constructing a stock-market-oriented [[Financial Knowledge Graph]] from scratch. Each step builds on the previous one, and each links to the ontologies, identifiers, datasets, and tools covered elsewhere in this wiki.\n\n## Prerequisites\n\nYou should be comfortable with the basics of [[RDF]] and [[Triple|triples]] before starting. Familiarity with [[OWL]] will help when working with [[FIBO]] in Step 1. If you are new to these concepts, start with [[Getting Started with Ontologies]] and [[Your First RDF Graph]].\n\n---\n\n## Step 1: Choose Your Ontology\n\nThe ontology defines what kinds of things your graph knows about and what relationships are valid between them. For a financial [[Knowledge Graph]], [[FIBO]] is the recommended backbone.\n\n**Why FIBO?** [[FIBO]] provides 2,436 formally-defined classes covering every major area of finance — instruments, entities, markets, contracts, indices, and regulatory concepts. Its [[OWL]] 2 DL formalization means you can apply automated [[Inference and Reasoning|reasoning]] to classify instruments and validate data integrity. Its alignment with [[GLEIF]], [[ISO 20022]], [[XBRL]], and [[LSEG PermID]] means your graph will interoperate with external data sources out of the box.\n\nStart by selecting the [[FIBO]] modules relevant to your scope:\n\n- **BE (Business Entities):** Companies, legal entities — always needed\n- **SEC (Securities):** Equities, bonds, funds — needed for instrument nodes\n- **MD (Market Data):** Prices, quotes, exchange listings — needed for market data edges\n- **IND (Indices and Indicators):** Benchmarks, sector indices\n\nLoad only the modules you need. [[FIBO]]'s modular design lets you import SEC without pulling in LOAN or DER unless your scope requires them.\n\nIf your graph also needs fraud detection or compliance layers, [[OntoFiC]] and the market surveillance ontology provide complementary class hierarchies for suspicious patterns and regulatory events.\n\n---\n\n## Step 2: Select Your Identifiers\n\nBefore ingesting a single data point, decide which [[Financial Identifier|financial identifiers]] will serve as canonical node keys. Identifier choice determines whether your graph can be joined with external datasets.\n\nThe recommended combination for a stock market graph:\n\n| Node type | Identifier | Why |\n|---|---|---|\n| Company / legal entity | LEI ([[GLEIF]]) | Open, globally unique, [[RDF]]-native, [[FIBO]]-aligned |\n| Instrument | [[FIGI]] | Open (CC-BY 4.0), venue-specific precision, OMG OWL ontology |\n| Exchange / venue | MIC (ISO 10383) | Free, standard, [[FIBO]] FBC property |\n\nUse [[LSEG PermID]] URIs as dereferenceable [[URI and IRI|URIs]] for Organization and Instrument nodes where possible — PermID provides stable HTTP URIs that resolve to [[RDF]] descriptions, fulfilling the [[Linked Data]] four-star requirement.\n\nStore ISIN, CUSIP, and SEDOL as additional properties on instrument nodes — they are needed for joins with licensed data sources — but avoid using them as primary node identifiers due to licensing constraints. See [[Financial Identifier Comparison]] for a full breakdown.\n\n---\n\n## Step 3: Model Your Entities\n\nWith an ontology and identifier scheme in place, define the concrete node and edge types for your graph. Map each to a [[FIBO]] class:\n\n**Core node types:**\n- `fibo-be-le-lp:PubliclyHeldCompany` — public companies (identified by LEI)\n- `fibo-sec-eq-eq:CommonShare` — common equity instruments (identified by FIGI + ISIN)\n- `fibo-fbc-fi-fi:ListedSecurity` — exchange listing (identified by FIGI, MIC pair)\n- `fibo-ind-mkt-bas:MarketIndex` — indices like S&P 500, KOSPI\n- `fibo-fbc-fct-mkt:Exchange` — trading venues (identified by MIC)\n\n**Core edge types:**\n- `fibo-be-oac-cctl:isIssuedBy` — instrument to issuing company\n- `fibo-fbc-fi-fi:isListedOn` — listing to exchange\n- `fibo-be-le-lp:hasSubsidiary` — parent to subsidiary company\n- `fibo-ind-mkt-bas:isMemberOf` — company to index\n\nReference real-world financial [[Knowledge Graph]] schemas for guidance. [[FinKario]]'s 19 relation types and dual attribute/event subgraph design are a strong structural reference. [[FinDKG]]'s 12 entity types and 15 relation types offer a news-derived schema. [[FinReflectKG]]'s S&P 100 extraction provides a validated schema for SEC filing entities.\n\n---\n\n## Step 4: Ingest Your Data\n\nWith the schema defined, populate the graph from multiple source types:\n\n### XBRL Filings (Structured Financial Data)\n[[XBRL]] filings from SEC EDGAR provide machine-readable income statements, balance sheets, and cash flows for all US public companies. [[SemanticXBRL]] demonstrates how to convert these to [[RDF]] at scale — 30,000 filings yield 125M+ triples. Use the US GAAP taxonomy concepts as additional properties on Company nodes, mapped to [[FIBO]] SEC classes where equivalences are defined.\n\n### Market Reference Data (Identifiers and Listings)\nLoad [[LSEG PermID]] weekly bulk [[RDF]] files as the initial population of Organization and Instrument nodes. These files are CC-BY 4.0 and cover millions of entities pre-aligned with [[FIBO]]. Augment with [[GLEIF]] LEI data for legal entity hierarchy (L1/L2 parent relationships).\n\n### News and Research Text (Event Data)\nFor dynamic event edges, NLP extraction pipelines over financial news (as in [[FinDKG]]) or equity research reports (as in [[FinKario]]) produce timestamped triples. Use schema-guided LLM extraction — as demonstrated by [[FinReflectKG]] — to constrain the extraction to your defined relation vocabulary and reduce hallucination. The [[Structure First Reason Next]] approach shows that extracting graph structure before reasoning over it improves downstream accuracy by 12% on financial QA tasks.\n\n### Market Data Feeds\nPrice, volume, and quote data can be modeled as time-series edges on ListedSecurity nodes, using [[FIBO]] MD module properties. Attach timestamps to each price triple to enable temporal queries.\n\n---\n\n## Step 5: Query with SPARQL\n\nOnce the graph is loaded into a triple store (Apache Jena/Fuseki, Stardog, GraphDB, or Oxigraph), query it with [[SPARQL]].\n\nExample: retrieve all equities listed on NASDAQ with their ISINs:\n\n```sparql\nPREFIX fibo-be: <https://spec.edmcouncil.org/fibo/ontology/BE/>\nPREFIX fibo-fbc: <https://spec.edmcouncil.org/fibo/ontology/FBC/>\n\nSELECT ?company ?instrument ?isin WHERE {\n  ?instrument a fibo-fbc:ListedSecurity ;\n              fibo-fbc:isListedOn <https://permid.org/1-exchange-XNAS> ;\n              fibo-fbc:hasISIN ?isin ;\n              fibo-fbc:isIssuedBy ?company .\n}\n```\n\n[[SPARQL]] 1.1 supports federation (`SERVICE` clause), allowing you to query your local graph and [[LSEG PermID]] or [[GLEIF]]'s public [[SPARQL]] endpoints in a single query, joining across datasets without local data duplication.\n\n---\n\n## Step 6: Reason and Infer\n\nThe full value of an [[OWL]]-backed [[Financial Knowledge Graph]] is unlocked through [[Inference and Reasoning|automated reasoning]]. Load your graph plus the relevant [[FIBO]] modules into an OWL reasoner (HermiT, Pellet, or FaCT++):\n\n- **Classification:** The reasoner automatically classifies instrument individuals into the correct [[FIBO]] subclass based on their properties — a node with `hasCouponRate` and `hasMaturityDate` is inferred to be a `DebtInstrument`\n- **Consistency checking:** Violations of FIBO axioms (e.g., an instrument with two incompatible asset class designations) are surfaced as logical inconsistencies\n- **Inheritance:** Properties defined on parent classes propagate to subclass instances without explicit assertion\n- **Rule-based detection:** Add [[SWRL]] rules (as [[OntoFiC]] demonstrates) for domain-specific inference such as fraud pattern detection or risk classification\n\nFor compliance and surveillance use cases, [[SPARQL]] queries over the inferred graph retrieve all entities matching complex multi-hop patterns — a capability that relational databases cannot match without complex joins.\n\n---\n\n## Summary\n\nA financial [[Knowledge Graph]] is built in layers: ontology → identifiers → schema → ingestion → query → reasoning. Each layer depends on the one below it. [[FIBO]] provides the semantic foundation; [[FIGI]] and LEI provide the identifier backbone; [[SemanticXBRL]], [[LSEG PermID]], and LLM extraction pipelines populate the graph; [[SPARQL]] and OWL reasoning unlock the analytical value.\n\nThe academic projects documented in this wiki — [[FinDKG]], [[FinKario]], [[FinReflectKG]], and [[SemanticXBRL]] — each demonstrate a different combination of these layers. A production graph will draw on all of them.\n\n## See Also\n\n- [[Financial Knowledge Graph]], [[FIBO]], [[OWL]], [[RDF]], [[Triple]]\n- [[SPARQL]], [[Inference and Reasoning]], [[Linked Data]]\n- [[Financial Identifier]], [[FIGI]], [[GLEIF]], [[LSEG PermID]]\n- [[XBRL]], [[SemanticXBRL]], [[Legal Entity]], [[Financial Instrument]]\n- [[FinDKG]], [[FinKario]], [[FinReflectKG]], [[OntoFiC]]\n- [[Financial Identifier Comparison]], [[Exploring FIBO]]\n- [[Structure First Reason Next]]\n" },
    { id: "Exploring Fibo", category: "guides", definition: "", content: "# Exploring FIBO\n\n[[FIBO]] (Financial Industry Business Ontology) is large — 2,436 classes across 10 domain modules — which makes knowing where to start essential. This guide walks through four practical entry points: downloading and browsing FIBO, loading it in [[Protege]], exploring key modules, and running [[SPARQL]] queries against the ontology.\n\n## Before You Start\n\nFIBO is a [[OWL]] 2 DL ontology serialized in [[RDF]]. If you are new to these technologies, read [[Getting Started with Ontologies]] and the [[OWL]] concept page before continuing. You will also want a passing familiarity with [[Class and Property|classes and properties]] to navigate FIBO's hierarchy meaningfully.\n\n---\n\n## Step 1: Download FIBO from GitHub\n\nThe canonical source for FIBO is the EDM Council GitHub repository.\n\n**Repository:** https://github.com/edmcouncil/fibo\n\nThe repository is organized by domain module. Each module lives in its own directory (e.g., `/FBC/`, `/SEC/`, `/BE/`) and contains individual [[OWL]] files (`.rdf` extension, serialized as RDF/XML) covering specific sub-topics.\n\n**For a first exploration, download the production release bundle:**\n\n1. Go to https://github.com/edmcouncil/fibo/releases\n2. Download the latest production release ZIP (not the \"Dev\" or \"Provisional\" tag)\n3. Unzip to a local directory\n\nThe release bundle includes all production-maturity modules in multiple serialization formats: RDF/XML, Turtle (`.ttl`), JSON-LD, N-Triples, and CSV. The Turtle files are the most readable in a text editor.\n\n**Online browsing without downloading:** The EDM Council provides an online viewer at https://spec.edmcouncil.org/fibo/ontology. You can browse the class hierarchy, read definitions, and explore property ranges without installing anything. This is the fastest way to look up a specific class.\n\n---\n\n## Step 2: Load FIBO in Protege\n\n[[Protege]] is the standard desktop tool for [[OWL]] ontology exploration. Loading FIBO in Protege gives you a navigable class tree, property listings, and access to built-in reasoners.\n\n**Loading a single module (recommended for beginners):**\n\n1. Open [[Protege]] (download from https://protege.stanford.edu/ if needed)\n2. Choose File → Open → navigate to the FIBO release directory\n3. Open a single module file, e.g., `SEC/Securities/Securities.rdf`\n4. Protege will prompt to load imported ontologies — click \"Yes\" to load the full import chain\n\nFIBO uses `owl:imports` extensively, so opening the SEC module will automatically pull in FND (Foundations) and BE (Business Entities) dependencies. This is correct behavior.\n\n**Navigating the class tree:**\n\n- The **Classes** tab shows the full [[OWL]] class hierarchy in a tree view\n- Click any class to see its definition, axioms, superclasses, and subclasses in the right panel\n- The `FinancialInstrument` class under the SEC module is a good starting point — expand it to see the full instrument taxonomy: `Equity`, `DebtInstrument`, `Derivative`, `Fund`, and their subclasses\n\n**Running a built-in reasoner:**\n\n1. In [[Protege]], go to Reasoner → HermiT (or Pellet)\n2. Click Start Reasoner\n3. The class hierarchy updates to show inferred subclass relationships in yellow\n4. The reasoner also flags inconsistencies — any red classes indicate axiom violations\n\n[[Inference and Reasoning|Reasoning]] over the full FIBO ontology can be slow (several minutes) due to its size. For interactive exploration, load a single module rather than the full release bundle.\n\n---\n\n## Step 3: Explore Key Modules\n\nRather than trying to absorb all of FIBO at once, navigate by use case. Here are the modules most relevant to a stock market [[Financial Knowledge Graph]] and what to look for in each.\n\n### BE — Business Entities\n**Path:** `/BE/LegalEntities/`\n**Key classes:** `LegalEntity`, `PubliclyHeldCompany`, `Corporation`, `Partnership`\n\nBE is where companies live. The `LegalEntity` class is FIBO's anchor for [[GLEIF]] LEI alignment — the GLEIF OWL ontologies extend this class with LEI-specific properties. Look at the axioms on `PubliclyHeldCompany` to see how FIBO formally distinguishes a public company from a private one.\n\n### SEC — Securities\n**Path:** `/SEC/Securities/`, `/SEC/Equities/`, `/SEC/Debt/`\n**Key classes:** `Security`, `ListedSecurity`, `CommonShare`, `CorporateBond`, `Fund`\n\nSEC is the instrument taxonomy. Explore the `ListedSecurity` class to see how FIBO links an instrument to an exchange listing. The `CommonShare` class carries properties for dividend rights and voting rights that distinguish it from `PreferredShare`. The [[XBRL]] taxonomy's `us-gaap:CommonStockSharesOutstanding` concept aligns with properties in this module.\n\n### MD — Market Data\n**Path:** `/MD/`\n**Key classes:** `SecurityPrice`, `MarketIdentifierCode`, `PriceQuote`\n\nMD is where pricing lives. Look at `PriceQuote` and its properties — `hasAskPrice`, `hasBidPrice`, `hasMidPrice` — to understand how FIBO models market data as structured [[RDF]] rather than raw numbers. The `MarketIdentifierCode` class is where MIC codes are formally defined.\n\n### FBC — Financial Business and Commerce\n**Path:** `/FBC/FinancialInstruments/`, `/FBC/FunctionalEntities/`\n**Key classes:** `FinancialInstrumentIdentifier`, `FIGI`, `ISIN`\n\nFBC is where [[Financial Identifier|financial identifiers]] are formally defined. Look at the `FIGI` class to see how [[FIBO]] represents open identifier types as OWL classes with properties specifying format and governance.\n\n---\n\n## Step 4: Run SPARQL Queries Against FIBO\n\nYou can query [[FIBO]] content via [[SPARQL]] by loading the ontology into a local triple store. Apache Jena's command-line tools provide the simplest path:\n\n**Load FIBO into Jena's TDB store:**\n```bash\ntdbloader2 --loc /path/to/fibo-tdb /path/to/fibo-release/*.ttl\n```\n\n**Start a local SPARQL endpoint with Fuseki:**\n```bash\nfuseki-server --loc=/path/to/fibo-tdb --update /fibo\n```\n\n**Example query — list all subclasses of FinancialInstrument:**\n```sparql\nPREFIX fibo-fbc: <https://spec.edmcouncil.org/fibo/ontology/FBC/FinancialInstruments/FinancialInstruments/>\nPREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>\nPREFIX owl: <http://www.w3.org/2002/07/owl#>\n\nSELECT ?class ?label WHERE {\n  ?class rdfs:subClassOf* fibo-fbc:FinancialInstrument ;\n         rdfs:label ?label .\n}\nORDER BY ?label\n```\n\n**Example query — find all properties with domain on LegalEntity:**\n```sparql\nPREFIX fibo-be: <https://spec.edmcouncil.org/fibo/ontology/BE/LegalEntities/LegalPersons/>\nPREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>\n\nSELECT ?property ?label WHERE {\n  ?property rdfs:domain fibo-be:LegalEntity ;\n            rdfs:label ?label .\n}\n```\n\nThese queries run against FIBO's [[OWL]] axioms rather than instance data. To query instance data, load your [[Financial Knowledge Graph]] into the same triple store alongside the FIBO ontology modules — then the reasoner's inferences over your data become queryable via [[SPARQL]] as well. This is the pattern used by [[FinKario]] for entity normalization and by [[SemanticXBRL]] for XBRL-to-FIBO concept alignment.\n\n---\n\n## Going Further\n\nOnce you are comfortable navigating [[FIBO]] in [[Protege]] and querying it via [[SPARQL]], the natural next step is building your own [[Financial Knowledge Graph]] on top of it. The guide [[Building a Financial Knowledge Graph]] covers the full pipeline: identifier selection, entity modeling, data ingestion from [[XBRL]] and [[LSEG PermID]] sources, and automated reasoning.\n\nThe [[FIBO vs. Schema.org Financial]] comparison page clarifies when FIBO's expressiveness is warranted versus when a lighter vocabulary suffices.\n\n## See Also\n\n- [[FIBO]], [[Protege]], [[OWL]], [[SPARQL]], [[RDF]]\n- [[Financial Ontology]], [[Class and Property]], [[Inference and Reasoning]]\n- [[Financial Instrument]], [[Legal Entity]], [[Securities]]\n- [[Financial Knowledge Graph]], [[Building a Financial Knowledge Graph]]\n- [[FIBO vs. Schema.org Financial]], [[Financial Identifier Comparison]]\n- [[GLEIF]], [[XBRL]], [[LSEG PermID]]\n" },
    { id: "Getting Started with Ontologies", category: "guides", definition: "", content: "# Getting Started with Ontologies\n\nA beginner's learning path for ontology engineering, from foundational concepts to hands-on tooling.\n\n## Why Learn Ontologies?\n\n[[Ontology|Ontologies]] are the formal backbone of [[Knowledge Graph|knowledge graphs]], [[Semantic Web]] applications, and increasingly of AI systems that need structured world knowledge. Whether you are building a domain [[Ontology]] for a healthcare system, integrating heterogeneous enterprise data, or contributing to open [[Linked Data]] projects like [[Wikidata]] or [[DBpedia]], ontology skills are the differentiator between ad-hoc data models and principled, reusable knowledge representations.\n\n## Learning Path\n\nFollow these stages in order. Each stage builds on the previous.\n\n### Stage 1 — Core Data Model (Week 1)\n\nStart with [[RDF]]. Understand what a [[Triple]] is: a subject, predicate, and object where each term is either a [[URI and IRI|URI]] or a literal. Practice writing triples by hand in Turtle syntax. Understand why [[URI and IRI|URIs]] matter for global uniqueness and [[Linked Data]] interoperability.\n\nKey concepts to study:\n- [[Triple]] — the atomic unit of RDF knowledge\n- [[URI and IRI]] — how resources are named\n- [[RDF]] — the data model itself\n- Turtle, N-Triples, JSON-LD — serialization formats\n\n### Stage 2 — Schema and Vocabulary (Week 2)\n\nMove to [[RDFS]]. Learn how `rdfs:subClassOf` and `rdfs:subPropertyOf` create class hierarchies. Understand how domain and range declarations constrain [[Class and Property|properties]]. Experiment with [[Inference and Reasoning|basic inference]]: what does an RDFS reasoner derive automatically?\n\nKey concepts:\n- [[RDFS]] — lightweight schema layer over RDF\n- [[Class and Property]] — the building blocks of any ontology\n- [[Inference and Reasoning]] — how reasoners derive implicit knowledge\n\n### Stage 3 — Full Ontology Language (Weeks 3–4)\n\nStudy [[OWL]]. Understand how it extends [[RDFS]] with [[Description Logic]] constructs: class restrictions, disjointness, cardinality, property characteristics. Read about the difference between OWL Lite, OWL DL, and OWL Full. Compare [[OWL]] and [[RDFS]] side by side — see [[owl-vs-rdfs]] for a structured comparison.\n\nKey concepts:\n- [[OWL]] — the full ontology language\n- [[Description Logic]] — the formal underpinning of OWL DL\n- [[Inference and Reasoning]] — consistency checking, classification\n- [[Ontology vs Taxonomy]] — clarify what an ontology adds over a simple hierarchy\n\n### Stage 4 — Tooling (Week 5)\n\nInstall [[Protege]] (free, open-source). Open the Protege Pizza Tutorial ontology — it is the canonical beginner exercise. Build your first ontology using the class hierarchy editor. Run the HermiT reasoner inside Protege and observe what it classifies automatically.\n\nKey tools:\n- [[Protege]] — the standard ontology editor\n- HermiT, Pellet — OWL reasoners integrated into Protege\n\n### Stage 5 — Querying (Week 6)\n\nLearn [[SPARQL]]. Write SELECT queries against public endpoints like the [[Wikidata]] Query Service. Progress to CONSTRUCT queries that produce new RDF graphs from existing data. Run the SPARQL tab inside [[Protege]] against your own ontology.\n\nKey concept:\n- [[SPARQL]] — the query language for RDF data\n\n### Stage 6 — Real-World Knowledge Graphs (Week 7+)\n\nExplore [[Wikidata]] and [[DBpedia]] as examples of large-scale [[Knowledge Graph|knowledge graphs]] built on [[RDF]]. Study how they use [[OWL]] and [[RDFS]] for their schemas. Read about [[SHACL]] for data validation.\n\n## First Exercise: Model a University Domain\n\nA classic starter exercise is modeling a university. Try to represent:\n\n- **Classes:** `University`, `Department`, `Course`, `Student`, `Professor`\n- **Properties:** `enrolledIn` (Student → Course), `taughtBy` (Course → Professor), `partOf` (Department → University)\n- **Restrictions:** Every `Course` must be `taughtBy` at least one `Professor`\n- **Individuals:** Add specific instances and run a reasoner in [[Protege]] to classify them\n\nThis exercise touches [[Class and Property]], [[Inference and Reasoning]], and the full [[OWL]] authoring workflow in one compact domain.\n\n## Recommended Resources\n\n- W3C RDF Primer (official, free) — [[W3C]]\n- Protege Getting Started Guide — [[Protege]]\n- Wikidata Query Service (live SPARQL practice) — [[Wikidata]]\n- Your First RDF Graph (hands-on guide in this wiki) — [[your-first-rdf-graph]]\n\n## See Also\n\n- [[RDF]]\n- [[OWL]]\n- [[RDFS]]\n- [[SPARQL]]\n- [[Triple]]\n- [[URI and IRI]]\n- [[Class and Property]]\n- [[Inference and Reasoning]]\n- [[Description Logic]]\n- [[Ontology]]\n- [[Knowledge Graph]]\n- [[Protege]]\n- [[Wikidata]]\n- [[DBpedia]]\n- [[W3C]]\n" },
    { id: "Your First RDF Graph", category: "guides", definition: "", content: "# Your First RDF Graph\n\nA hands-on guide to creating and querying an [[RDF]] graph from scratch using Turtle syntax and [[SPARQL]].\n\n## What You Will Build\n\nBy the end of this guide you will have a small [[RDF]] graph describing a fictional university — three courses, two professors, and one department — serialized in Turtle, and you will run [[SPARQL]] queries against it to retrieve and filter data.\n\n## Prerequisites\n\nBasic familiarity with the [[Triple]] model (subject, predicate, object) and [[URI and IRI|URIs]]. If you need that background first, read [[getting-started-with-ontologies]] Stages 1 and 2.\n\n## Step 1 — Declare Prefixes\n\nTurtle lets you abbreviate long [[URI and IRI|URIs]] with prefix declarations. This keeps the file readable.\n\n```turtle\n@prefix rdf:  <http://www.w3.org/1999/02/22-rdf-syntax-ns#> .\n@prefix rdfs: <http://www.w3.org/2000/01/rdf-schema#> .\n@prefix owl:  <http://www.w3.org/2002/07/owl#> .\n@prefix xsd:  <http://www.w3.org/2001/XMLSchema#> .\n@prefix uni:  <http://example.org/university#> .\n```\n\nThe `uni:` prefix is your own namespace — a [[URI and IRI|URI]] you control. Using a unique namespace prevents collisions when your data is merged with other [[RDF]] datasets in the [[Linked Data]] cloud.\n\n## Step 2 — Define Classes with RDFS\n\nUse [[RDFS]] to declare your class hierarchy. This is the schema layer sitting above raw [[RDF]].\n\n```turtle\nuni:Person      a rdfs:Class .\nuni:Professor   a rdfs:Class ;\n                rdfs:subClassOf uni:Person .\nuni:Course      a rdfs:Class .\nuni:Department  a rdfs:Class .\n```\n\nEach `a rdfs:Class` [[Triple]] asserts that the resource is a class. The `rdfs:subClassOf` statement means any [[Inference and Reasoning|reasoner]] will automatically classify `Professor` instances as `Person` instances too.\n\n## Step 3 — Define Properties\n\n```turtle\nuni:taughtBy  a rdf:Property ;\n              rdfs:domain uni:Course ;\n              rdfs:range  uni:Professor ;\n              rdfs:label  \"taught by\"@en .\n\nuni:worksIn   a rdf:Property ;\n              rdfs:domain uni:Professor ;\n              rdfs:range  uni:Department .\n\nuni:credits   a rdf:Property ;\n              rdfs:domain uni:Course ;\n              rdfs:range  xsd:integer .\n```\n\nDomain and range declarations on [[Class and Property|properties]] allow [[RDFS]]-aware systems to infer types. If something is the object of `uni:taughtBy`, a reasoner can infer it is a `uni:Professor` even without an explicit `rdf:type` statement.\n\n## Step 4 — Add Individuals\n\nNow populate the graph with actual data — concrete individuals described by the schema above.\n\n```turtle\nuni:dept_cs  a uni:Department ;\n             rdfs:label \"Computer Science Department\"@en .\n\nuni:prof_alice  a uni:Professor ;\n                rdfs:label \"Alice Nakamura\"@en ;\n                uni:worksIn uni:dept_cs .\n\nuni:prof_bob    a uni:Professor ;\n                rdfs:label \"Bob Osei\"@en ;\n                uni:worksIn uni:dept_cs .\n\nuni:course_101  a uni:Course ;\n                rdfs:label \"Introduction to Logic\"@en ;\n                uni:taughtBy uni:prof_alice ;\n                uni:credits  3 .\n\nuni:course_202  a uni:Course ;\n                rdfs:label \"Knowledge Representation\"@en ;\n                uni:taughtBy uni:prof_alice ;\n                uni:credits  4 .\n\nuni:course_303  a uni:Course ;\n                rdfs:label \"Graph Databases\"@en ;\n                uni:taughtBy uni:prof_bob ;\n                uni:credits  3 .\n```\n\nEach block adds multiple [[Triple|triples]] using Turtle's semicolon shorthand (same subject, different predicate-object pairs).\n\n## Step 5 — Save and Load\n\nSave the file as `university.ttl`. To load it into a local triplestore, options include:\n\n- **Apache Jena Fuseki** — open-source [[SPARQL]] server; load via the web UI and query immediately\n- **GraphDB Free** — GUI-based triplestore with RDFS/OWL reasoning\n- **Blazegraph** — lightweight embedded option\n- **Protege** — load as an [[OWL]] file and explore with the class hierarchy editor ([[Protege]])\n\n## Step 6 — Query with SPARQL\n\nWith the graph loaded, run [[SPARQL]] queries against it.\n\n**List all courses and their instructors:**\n\n```sparql\nPREFIX uni: <http://example.org/university#>\nPREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>\n\nSELECT ?courseLabel ?profLabel\nWHERE {\n  ?course  a           uni:Course ;\n           rdfs:label  ?courseLabel ;\n           uni:taughtBy ?prof .\n  ?prof    rdfs:label  ?profLabel .\n}\nORDER BY ?courseLabel\n```\n\n**Find courses worth more than 3 credits:**\n\n```sparql\nPREFIX uni: <http://example.org/university#>\nPREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>\n\nSELECT ?label ?credits\nWHERE {\n  ?course  a           uni:Course ;\n           rdfs:label  ?label ;\n           uni:credits ?credits .\n  FILTER (?credits > 3)\n}\n```\n\n**Count courses per professor:**\n\n```sparql\nPREFIX uni: <http://example.org/university#>\nPREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>\n\nSELECT ?profLabel (COUNT(?course) AS ?courseCount)\nWHERE {\n  ?course uni:taughtBy ?prof .\n  ?prof   rdfs:label   ?profLabel .\n}\nGROUP BY ?prof ?profLabel\nORDER BY DESC(?courseCount)\n```\n\n## Next Steps\n\n- Add [[OWL]] axioms: declare `uni:taughtBy` as an inverse of `uni:teaches`, or assert that `uni:Professor` and `uni:Student` are disjoint classes\n- Validate your graph with [[SHACL]] shapes to enforce that every course must have at least one instructor\n- Publish your graph following [[Linked Data]] principles — assign dereferenceable [[URI and IRI|URIs]] and add `owl:sameAs` links to matching entities in [[Wikidata]] or [[DBpedia]]\n\n## See Also\n\n- [[RDF]]\n- [[Triple]]\n- [[URI and IRI]]\n- [[RDFS]]\n- [[OWL]]\n- [[SPARQL]]\n- [[Class and Property]]\n- [[Inference and Reasoning]]\n- [[Protege]]\n- [[Linked Data]]\n- [[Wikidata]]\n- [[DBpedia]]\n- [[getting-started-with-ontologies]]\n" },

// ═══════════════════════════════════════════════════════════════════
// COLOUR + HELPERS
// ═══════════════════════════════════════════════════════════════════
const CAT_COLOR = {
  concepts:    "#58a6ff",
  entities:    "#3fb950",
  comparisons: "#d29922",
  guides:      "#f78166",
};
const CAT_DIM = {
  concepts:    "rgba(88,166,255,0.12)",
  entities:    "rgba(63,185,80,0.12)",
  comparisons: "rgba(210,153,34,0.12)",
  guides:      "rgba(247,129,102,0.12)",
};
const CAT_LABEL = {
  concepts:    "Concept",
  entities:    "Entity",
  comparisons: "Comparison",
  guides:      "Guide",
};

function nodeColor(d)   { return CAT_COLOR[d.category] || "#8b949e"; }
function nodeRadius(d)  { return Math.max(6, Math.min(22, 6 + d.degree * 1.6)); }
function labelSize(d)   { return Math.max(9, Math.min(13, 8 + d.degree * 0.6)); }

// ═══════════════════════════════════════════════════════════════════
// BUILD ADJACENCY / DEGREE
// ═══════════════════════════════════════════════════════════════════
const nodeMap = {};
GRAPH_DATA.nodes.forEach(n => {
  n.degree = 0;
  n.neighbors = new Set();
  nodeMap[n.id] = n;
});

// Deduplicate edges (undirected for counting)
const edgeSet = new Set();
const cleanEdges = [];
GRAPH_DATA.edges.forEach(e => {
  const a = e.source < e.target ? e.source : e.target;
  const b = e.source < e.target ? e.target : e.source;
  const key = a + "|||" + b;
  if (!edgeSet.has(key) && nodeMap[e.source] && nodeMap[e.target]) {
    edgeSet.add(key);
    cleanEdges.push({ source: e.source, target: e.target });
  }
});

cleanEdges.forEach(e => {
  if (nodeMap[e.source]) { nodeMap[e.source].degree++; nodeMap[e.source].neighbors.add(e.target); }
  if (nodeMap[e.target]) { nodeMap[e.target].degree++; nodeMap[e.target].neighbors.add(e.source); }
});

// ═══════════════════════════════════════════════════════════════════
// STATS
// ═══════════════════════════════════════════════════════════════════
const totalNodes = GRAPH_DATA.nodes.length;
const totalEdges = cleanEdges.length;
const avgConn = (cleanEdges.length * 2 / totalNodes).toFixed(1);
document.getElementById("stat-nodes").textContent = totalNodes;
document.getElementById("stat-edges").textContent = totalEdges;
document.getElementById("stat-avg").textContent = avgConn;

// ═══════════════════════════════════════════════════════════════════
// D3 SETUP
// ═══════════════════════════════════════════════════════════════════
const svg = d3.select("#graph-canvas");
const W = window.innerWidth, H = window.innerHeight;
svg.attr("viewBox", `0 0 ${W} ${H}`);

// Defs: glow filter
const defs = svg.append("defs");
const filter = defs.append("filter").attr("id", "glow").attr("x", "-50%").attr("y", "-50%").attr("width", "200%").attr("height", "200%");
filter.append("feGaussianBlur").attr("in", "SourceGraphic").attr("stdDeviation", "4").attr("result", "blur");
const feMerge = filter.append("feMerge");
feMerge.append("feMergeNode").attr("in", "blur");
feMerge.append("feMergeNode").attr("in", "SourceGraphic");

// Arrow markers per category
Object.entries(CAT_COLOR).forEach(([cat, color]) => {
  defs.append("marker")
    .attr("id", `arrow-${cat}`)
    .attr("viewBox", "0 -4 8 8")
    .attr("refX", 8).attr("refY", 0)
    .attr("markerWidth", 5).attr("markerHeight", 5)
    .attr("orient", "auto")
    .append("path")
    .attr("d", "M0,-4L8,0L0,4")
    .attr("fill", color)
    .attr("opacity", 0.5);
});

const g = svg.append("g").attr("class", "graph-root");

// ── zoom ──
const zoom = d3.zoom()
  .scaleExtent([0.08, 4])
  .on("zoom", ev => g.attr("transform", ev.transform));
svg.call(zoom).on("dblclick.zoom", null);

// ═══════════════════════════════════════════════════════════════════
// SIMULATION
// ═══════════════════════════════════════════════════════════════════
const nodes = GRAPH_DATA.nodes;
const links = cleanEdges;

const sim = d3.forceSimulation(nodes)
  .force("link", d3.forceLink(links).id(d => d.id).distance(d => {
    // longer links for high-degree nodes to spread them out
    const r1 = nodeRadius(d.source), r2 = nodeRadius(d.target);
    return 80 + r1 + r2 + Math.random() * 20;
  }).strength(0.35))
  .force("charge", d3.forceManyBody().strength(d => -320 - d.degree * 20).distanceMax(500))
  .force("center", d3.forceCenter(W / 2, H / 2))
  .force("collision", d3.forceCollide(d => nodeRadius(d) + 20))
  .force("x", d3.forceX(W / 2).strength(0.04))
  .force("y", d3.forceY(H / 2).strength(0.04))
  .alphaDecay(0.018)
  .velocityDecay(0.45);

// ── Link elements ──
const linkG = g.append("g").attr("class", "links");
const linkEl = linkG.selectAll("line")
  .data(links)
  .join("line")
  .attr("class", "link")
  .attr("stroke", d => {
    const src = typeof d.source === "object" ? d.source : nodeMap[d.source];
    return nodeColor(src);
  })
  .attr("stroke-opacity", 0.45)
  .attr("stroke-width", 1.5);

// ── Node groups ──
const nodeG = g.append("g").attr("class", "nodes");
const nodeEl = nodeG.selectAll("g")
  .data(nodes)
  .join("g")
  .attr("class", "node-group")
  .style("cursor", "pointer")
  .call(d3.drag()
    .on("start", dragStart)
    .on("drag",  dragged)
    .on("end",   dragEnd));

// outer glow ring (dim by default)
nodeEl.append("circle")
  .attr("class", "node-ring")
  .attr("r", d => nodeRadius(d) + 5)
  .attr("fill", "none")
  .attr("stroke", d => nodeColor(d))
  .attr("stroke-width", 1.5)
  .attr("stroke-opacity", 0.0);

// main circle
nodeEl.append("circle")
  .attr("class", "node-circle")
  .attr("r", d => nodeRadius(d))
  .attr("fill", d => nodeColor(d))
  .attr("fill-opacity", 0.18)
  .attr("stroke", d => nodeColor(d))
  .attr("stroke-width", 1.8);

// label
nodeEl.append("text")
  .attr("class", "node-label")
  .attr("x", d => nodeRadius(d) + 6)
  .attr("y", 0)
  .attr("font-size", d => labelSize(d) + "px")
  .text(d => d.id);

// ── Tooltip ──
const tooltip = document.getElementById("tooltip");
const ttName  = document.getElementById("tt-name");
const ttInfo  = document.getElementById("tt-info");

nodeEl
  .on("mouseover", (ev, d) => {
    highlightNode(d);
    ttName.textContent = d.id;
    ttInfo.textContent = `${d.degree} connection${d.degree !== 1 ? "s" : ""} · ${CAT_LABEL[d.category]}`;
    tooltip.classList.add("visible");
  })
  .on("mousemove", ev => {
    tooltip.style.left = (ev.clientX + 14) + "px";
    tooltip.style.top  = (ev.clientY - 10) + "px";
  })
  .on("mouseout", () => {
    resetHighlight();
    tooltip.classList.remove("visible");
  })
  .on("click", (ev, d) => {
    ev.stopPropagation();
    openSidebar(d);
  });

// ── Simulation tick ──
sim.on("tick", () => {
  linkEl
    .attr("x1", d => d.source.x)
    .attr("y1", d => d.source.y)
    .attr("x2", d => d.target.x)
    .attr("y2", d => d.target.y);

  nodeEl.attr("transform", d => `translate(${d.x},${d.y})`);
});

// ── Auto-fit after settle ──
sim.on("end", fitGraph);
setTimeout(fitGraph, 3500);

// ═══════════════════════════════════════════════════════════════════
// HIGHLIGHT / RESET
// ═══════════════════════════════════════════════════════════════════
let highlighted = null;

function highlightNode(d) {
  highlighted = d.id;
  const neighbors = d.neighbors;

  nodeEl.each(function(n) {
    const isCenter = n.id === d.id;
    const isNeighbor = neighbors.has(n.id);
    const dim = !isCenter && !isNeighbor;
    d3.select(this).select(".node-circle")
      .transition().duration(180)
      .attr("fill-opacity", dim ? 0.05 : isCenter ? 0.35 : 0.2)
      .attr("stroke-opacity", dim ? 0.15 : 1);
    d3.select(this).select(".node-ring")
      .transition().duration(180)
      .attr("stroke-opacity", isCenter ? 0.55 : 0);
    d3.select(this).select(".node-label")
      .transition().duration(180)
      .attr("opacity", dim ? 0.12 : 1);
  });

  linkEl.transition().duration(180)
    .attr("stroke-opacity", l => {
      const s = typeof l.source === "object" ? l.source.id : l.source;
      const t = typeof l.target === "object" ? l.target.id : l.target;
      const connected = s === d.id || t === d.id;
      return connected ? 0.75 : 0.04;
    })
    .attr("stroke-width", l => {
      const s = typeof l.source === "object" ? l.source.id : l.source;
      const t = typeof l.target === "object" ? l.target.id : l.target;
      return (s === d.id || t === d.id) ? 2 : 1;
    });
}

function resetHighlight() {
  highlighted = null;
  nodeEl.each(function() {
    d3.select(this).select(".node-circle")
      .transition().duration(250)
      .attr("fill-opacity", 0.18)
      .attr("stroke-opacity", 1);
    d3.select(this).select(".node-ring")
      .transition().duration(250)
      .attr("stroke-opacity", 0);
    d3.select(this).select(".node-label")
      .transition().duration(250)
      .attr("opacity", 1);
  });
  linkEl.transition().duration(250)
    .attr("stroke-opacity", 0.28)
    .attr("stroke-width", 1.2);
}

// ═══════════════════════════════════════════════════════════════════
// DRAG
// ═══════════════════════════════════════════════════════════════════
function dragStart(ev, d) {
  if (!ev.active) sim.alphaTarget(0.2).restart();
  d.fx = d.x; d.fy = d.y;
}
function dragged(ev, d) {
  d.fx = ev.x; d.fy = ev.y;
}
function dragEnd(ev, d) {
  if (!ev.active) sim.alphaTarget(0);
  d.fx = null; d.fy = null;
}

// ═══════════════════════════════════════════════════════════════════
// MARKDOWN RENDERER
// ═══════════════════════════════════════════════════════════════════
function renderMarkdown(md) {
  // Remove the title (first # heading) since we show it as sidebar-title
  md = md.replace(/^#\s+.+\n+/, '');

  let html = md
    // Code blocks (must come before inline code)
    .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
    // Headers
    .replace(/^####\s+(.+)$/gm, '<h6>$1</h6>')
    .replace(/^###\s+(.+)$/gm, '<h5>$1</h5>')
    .replace(/^##\s+(.+)$/gm, '<h4 class="md-h2">$1</h4>')
    // Bold
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    // Italic
    .replace(/\*([^*]+)\*/g, '<em>$1</em>')
    // Wikilinks - make them clickable (navigate to node)
    .replace(/\[\[([^\]|]+)\|([^\]]+)\]\]/g, '<a class="wiki-link" data-target="$1" href="#">$2</a>')
    .replace(/\[\[([^\]]+)\]\]/g, '<a class="wiki-link" data-target="$1" href="#">$1</a>')
    // Inline code
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    // Horizontal rules
    .replace(/^---+$/gm, '<hr>')
    // Bullet lists
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    // Wrap consecutive <li> in <ul>
    .replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>')
    // Tables (basic support)
    .replace(/^\|(.+)\|$/gm, (match) => {
      const cells = match.split('|').filter(c => c.trim()).map(c => c.trim());
      if (cells.every(c => /^[-:]+$/.test(c))) return ''; // separator row
      return '<tr>' + cells.map(c => `<td>${c}</td>`).join('') + '</tr>';
    })
    // Wrap consecutive <tr> in <table>
    .replace(/((?:<tr>.*<\/tr>\n?)+)/g, '<table>$1</table>')
    // Paragraphs - wrap lines that aren't already wrapped
    .replace(/^(?!<[hupltaod]|<\/|$)(.+)$/gm, '<p>$1</p>')
    // Clean up empty lines
    .replace(/\n{3,}/g, '\n\n');

  return html;
}

// ═══════════════════════════════════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════════════════════════════════
function openSidebar(d) {
  document.getElementById("sidebar-title").textContent = d.id;
  const color = nodeColor(d);
  const dimColor = CAT_DIM[d.category];

  const connList = [...d.neighbors].sort().map(nid => {
    const n = nodeMap[nid];
    if (!n) return "";
    const c = nodeColor(n);
    return `<span class="conn-chip" onclick="navigateToNode('${nid.replace(/'/g, "\\'")}')" style="cursor:pointer"><span class="chip-dot" style="background:${c}"></span>${nid}</span>`;
  }).join("");

  const renderedContent = d.content ? renderMarkdown(d.content) : '<p style="color:var(--muted)">No content available</p>';

  document.getElementById("sidebar-body").innerHTML = `
    <span class="sidebar-category" style="background:${dimColor};color:${color}">
      ${CAT_LABEL[d.category]}
    </span>
    <div class="sidebar-content">
      ${renderedContent}
    </div>
    <div class="sidebar-section" style="margin-top:20px; border-top: 1px solid var(--border); padding-top: 16px;">
      <h4>Connections (${d.degree})</h4>
      <div>${connList || '<span style="color:var(--muted);font-size:12px">No connections</span>'}</div>
    </div>
  `;

  // Make wikilinks clickable - navigate to the target node
  document.querySelectorAll('.wiki-link').forEach(link => {
    link.addEventListener('click', (e) => {
      e.preventDefault();
      const target = e.currentTarget.dataset.target;
      navigateToNode(target);
    });
  });

  document.getElementById("sidebar").classList.add("open");
  resetHighlight();
  highlightNode(d);
}

function closeSidebar() {
  document.getElementById("sidebar").classList.remove("open");
  resetHighlight();
}

function navigateToNode(name) {
  const node = nodeMap[name];
  if (!node) return;
  // Center the view on the node
  const scale = 1.5;
  const tx = W / 2 - scale * node.x;
  const ty = H / 2 - scale * node.y;
  svg.transition().duration(500)
    .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
  // Open its sidebar
  openSidebar(node);
}

svg.on("click", () => closeSidebar());

// ═══════════════════════════════════════════════════════════════════
// FIT GRAPH
// ═══════════════════════════════════════════════════════════════════
function fitGraph() {
  const bounds = g.node().getBBox();
  if (!bounds.width || !bounds.height) return;
  const pad = 80;
  const scale = Math.min(
    (W - pad * 2) / bounds.width,
    (H - pad * 2) / bounds.height,
    1.0
  );
  const tx = W / 2 - scale * (bounds.x + bounds.width / 2);
  const ty = H / 2 - scale * (bounds.y + bounds.height / 2);
  svg.transition().duration(800)
    .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
}

// ═══════════════════════════════════════════════════════════════════
// ZOOM BUTTONS
// ═══════════════════════════════════════════════════════════════════
document.getElementById("btn-zoom-in").onclick  = () => svg.transition().duration(300).call(zoom.scaleBy, 1.4);
document.getElementById("btn-zoom-out").onclick = () => svg.transition().duration(300).call(zoom.scaleBy, 0.72);
document.getElementById("btn-zoom-fit").onclick = fitGraph;

// ═══════════════════════════════════════════════════════════════════
// SEARCH
// ═══════════════════════════════════════════════════════════════════
const searchInput = document.getElementById("search");
const searchResults = document.getElementById("search-results");

searchInput.addEventListener("input", () => {
  const q = searchInput.value.trim().toLowerCase();
  if (!q) { searchResults.style.display = "none"; return; }
  const matches = nodes.filter(n => n.id.toLowerCase().includes(q)).slice(0, 8);
  if (!matches.length) { searchResults.style.display = "none"; return; }
  searchResults.innerHTML = matches.map(n => `
    <div class="search-result-item" data-id="${n.id}">
      <span class="cat-dot" style="background:${nodeColor(n)}"></span>
      ${n.id}
    </div>
  `).join("");
  searchResults.style.display = "block";
  searchResults.querySelectorAll(".search-result-item").forEach(el => {
    el.addEventListener("click", () => {
      const nid = el.dataset.id;
      const node = nodeMap[nid];
      if (!node) return;
      searchInput.value = "";
      searchResults.style.display = "none";
      focusNode(node);
    });
  });
});

document.addEventListener("click", ev => {
  if (!ev.target.closest("#search-wrap") && !ev.target.closest("#search-results")) {
    searchResults.style.display = "none";
  }
});

function focusNode(node) {
  if (!node.x) return;
  const currentTransform = d3.zoomTransform(svg.node());
  const targetScale = Math.max(currentTransform.k, 1.2);
  const tx = W / 2 - targetScale * node.x;
  const ty = H / 2 - targetScale * node.y;
  svg.transition().duration(700)
    .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(targetScale))
    .on("end", () => {
      highlightNode(node);
      openSidebar(node);
    });
}

// ═══════════════════════════════════════════════════════════════════
// RESIZE
// ═══════════════════════════════════════════════════════════════════
window.addEventListener("resize", () => {
  const w = window.innerWidth, h = window.innerHeight;
  svg.attr("viewBox", `0 0 ${w} ${h}`);
  sim.force("center", d3.forceCenter(w / 2, h / 2));
  sim.force("x", d3.forceX(w / 2).strength(0.04));
  sim.force("y", d3.forceY(h / 2).strength(0.04));
  sim.alpha(0.15).restart();
});
</script>
