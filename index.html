coded channels and app-specific channels) for real-time context sharing. **Context Data** is the semantic core: 22 standardized JSON Schema types including `fdc3.instrument`, `fdc3.portfolio`, `fdc3.position`, `fdc3.trade`, `fdc3.organization`, `fdc3.order`, and `fdc3.executionVenue`. The `fdc3.instrument` type carries a multi-identifier map supporting [[FIGI]], ISIN (ISO 6166), CUSIP, SEDOL, PERMID, RIC, Bloomberg BBG ticker, and exchange-local ticker with MIC code — allowing applications using different master data sources to resolve instruments without mandating a single canonical [[Financial Identifier]].\n\nFDC3 is not an [[Ontology]] and has no [[OWL]] or [[RDF]] representation; context data types are JSON Schema documents. The standard explicitly references existing identifier schemes rather than defining its own instrument taxonomy, prioritizing pragmatic interoperability over semantic formalism. This makes FDC3 complementary rather than competitive with [[FIBO]], [[FIGI]], and [[GLEIF]]: FDC3 acts as the runtime data transport layer for [[Financial Instrument]] context that those ontologies formally define. FDC3 2.0 introduced a Web Connection Protocol enabling browser-tab-based interop without a native desktop agent, extending the standard to web-only environments.\n\n## Key Components\n\n- **App Directory:** Registry of compliant apps, supported intents, and context types\n- **Intents:** `ViewChart`, `ViewInstrument`, `CreateOrder`, `ViewOrders`, `ViewQuote`\n- **Channels:** System channels (color-coded), app-specific channels for context broadcast\n- **22 context types:** `fdc3.instrument`, `fdc3.portfolio`, `fdc3.position`, `fdc3.trade`, `fdc3.organization`, `fdc3.order`, `fdc3.executionVenue`, `fdc3.valuation`, and more\n- **`fdc3.instrument` identifier map:** [[FIGI]], ISIN, CUSIP, SEDOL, PERMID, RIC, BBG ticker, exchange ticker + MIC\n- **Web Connection Protocol:** Browser-native interop without desktop agent (FDC3 2.0+)\n- **Format:** JSON Schema (Apache 2.0)\n\n## OWL/RDF Availability\n\nFDC3 has no OWL or RDF representation. Context types are defined as JSON Schema documents.\n\n- Homepage: https://fdc3.finos.org/\n- GitHub: https://github.com/finos/FDC3\n- Context type specifications: https://fdc3.finos.org/docs/context/ref/Instrument\n\n## Relationships\n\n- **Maintained by:** FINOS / Linux Foundation\n- **Supports identifiers:** [[FIGI]], ISIN, CUSIP, SEDOL — multi-scheme resolution in `fdc3.instrument`\n- **Entity identification:** `fdc3.organization` carries [[GLEIF]] LEI\n- **Conceptual overlap:** [[FIX Protocol]] (order/execution context types — no formal mapping)\n- **Complements:** [[FIBO]] (FDC3 transports runtime context; FIBO formally defines the semantics)\n- **Instrument classification:** [[ISO 10962 CFI]] not explicitly referenced but classifiable in context metadata\n\n## Key URLs\n\n- Homepage: https://fdc3.finos.org/\n- GitHub: https://github.com/finos/FDC3\n- Current version: FDC3 2.2\n\n## Sources\n\n- `sources/articles/fdc3-financial-desktop-connectivity.md`\n\n## See Also\n\n- [[FIBO]], [[FIGI]], [[GLEIF]]\n- [[Financial Identifier]], [[Financial Instrument]]\n- [[FIX Protocol]], [[ISO 10962 CFI]]\n" },
    { id: "Fibo", category: "entities", definition: "The Financial Industry Business Ontology — a formal [[OWL]] 2 DL ontology providing 2,436 classes across 10 domain modules for the financial services industry, maintained by the EDM Council and [[W3C]]-aligned.", content: "# FIBO\n\n**Type:** Ontology / Standard\n\n**Definition:** The Financial Industry Business Ontology — a formal [[OWL]] 2 DL ontology providing 2,436 classes across 10 domain modules for the financial services industry, maintained by the EDM Council and [[W3C]]-aligned.\n\n## Overview\n\nFIBO is the definitive machine-readable framework for defining [[Financial Instrument]]s, [[Legal Entity|legal entities]], markets, contracts, and processes across the financial industry. Built natively in [[OWL]] 2 DL and serialized in [[RDF]], FIBO establishes shared, unambiguous definitions that enable semantic interoperability across institutions, regulators, and data vendors. Every class and property is grounded in formal [[Ontology]] axioms, making FIBO queryable via [[SPARQL]] and compatible with automated [[Inference and Reasoning]] using standard OWL reasoners.\n\nThe Q4 2025 Production Release contains 2,436 [[Class and Property|classes and properties]] organized into 10 domain modules: Foundations (FND), Business Entities (BE), Business Process (BP), Corporate Actions and Events (CAE), Derivatives (DER), Financial Business and Commerce (FBC), Indices and Indicators (IND), Loans (LOAN), Market Data (MD), and Securities (SEC). Each module is independently importable, allowing downstream consumers to load only the relevant subset. FIBO content passes through a \"provisional\" maturity level before being promoted to production, giving the ecosystem confidence in stability of production-level classes.\n\nFIBO sits at the center of the financial [[Knowledge Graph]] ecosystem. [[GLEIF]] publishes 7 OWL ontologies aligned with FIBO's `LegalEntity` hierarchy. [[ISO 20022]] message semantics overlap with FIBO's instrument and party classes, with active mapping work for regulatory reporting. [[XBRL]] taxonomy elements can be cross-referenced with FIBO [[Securities]] classes for SEC filing contexts. [[FIGI]] instrument identifiers annotate FIBO instrument individuals, and [[ISDA CDM]]'s Reference Data component explicitly references FIBO for counterparty and product identification. [[FinRegOnt]] imports approximately 700 FIBO classes as its core financial vocabulary, extending them with regulatory obligations modeled using the LKIF legal norm ontology.\n\n## Key Components\n\n- **FND (Foundations):** Core ontological primitives — dates, quantities, relations, utilities\n- **BE (Business Entities):** Corporations, partnerships, trusts, government bodies; aligns with [[GLEIF]] L1/L2 ontologies\n- **SEC (Securities):** Equities, debt instruments, funds, structured products; cross-reference with [[XBRL]] taxonomies\n- **DER (Derivatives):** Options, futures, swaps, forwards; reference data layer for [[ISDA CDM]] and [[FpML]]\n- **FBC (Financial Business and Commerce):** Accounts, trading, clearing, settlement\n- **MD (Market Data):** Pricing, quotes, reference data; links to [[FIGI]] and [[ISO 20022]] `reda` messages\n- **IND (Indices and Indicators):** Market indices, benchmarks (S&P 500, LIBOR successors)\n- **Key classes:** `FinancialInstrument`, `Equity`, `DebtInstrument`, `Derivative`, `LegalEntity`, `Contract`, `MarketIdentifierCode`, `ListedSecurity`, `FinancialMarket`\n\n## OWL/RDF Availability\n\nFIBO is natively OWL 2 DL. All content is available in RDF/XML, Turtle, JSON-LD, N-Triples, CSV, Excel, and [[SKOS]] formats.\n\n- Ontology endpoint: https://spec.edmcouncil.org/fibo/ontology\n- GitHub releases: https://github.com/edmcouncil/fibo/releases\n- HuggingFace dataset: https://huggingface.co/datasets/wikipunk/fibo2023Q3\n- OMG specification: https://www.omg.org/spec/EDMC-FIBO\n\n## Relationships\n\n- **Built on:** [[OWL]], [[RDF]], [[W3C]] standards\n- **Imports:** [[Class and Property]], [[Inference and Reasoning]] via OWL 2 DL\n- **Aligned with:** [[GLEIF]] L1/L2, [[ISO 20022]], [[XBRL]], [[FIGI]], [[Schema.org Financial]]\n- **Used by:** [[FinRegOnt]], [[ISDA CDM]], [[FpML]] (reference data layer)\n- **Queryable via:** [[SPARQL]], OWL reasoners (HermiT, Pellet, FaCT++)\n\n## Key URLs\n\n- Homepage: https://spec.edmcouncil.org/fibo/\n- GitHub: https://github.com/edmcouncil/fibo\n- SKOS glossary: https://spec.edmcouncil.org/fibo/glossary\n- HuggingFace: https://huggingface.co/datasets/wikipunk/fibo2023Q3\n\n## Sources\n\n- `sources/articles/fibo-financial-industry-business-ontology.md`\n\n## See Also\n\n- [[OWL]], [[RDF]], [[Ontology]], [[Knowledge Graph]], [[SPARQL]]\n- [[GLEIF]], [[ISO 20022]], [[XBRL]], [[FIGI]], [[FinRegOnt]]\n- [[ISDA CDM]], [[Schema.org Financial]], [[Financial Instrument]], [[Securities]], [[Derivatives]], [[Legal Entity]]\n" },
    { id: "Figi", category: "entities", definition: "Financial Instrument Global Identifier — a free, open, globally unique 12-character alphanumeric identifier for [[Financial Instrument]]s across all asset classes, maintained by OMG and assigned by Bloomberg as Registration Authority, with formal [[OWL]] and [[RDF]] representations.", content: "# FIGI\n\n**Type:** Standard / Identifier System\n\n**Definition:** Financial Instrument Global Identifier — a free, open, globally unique 12-character alphanumeric identifier for [[Financial Instrument]]s across all asset classes, maintained by OMG and assigned by Bloomberg as Registration Authority, with formal [[OWL]] and [[RDF]] representations.\n\n## Overview\n\nFIGI addresses the fragmented landscape of proprietary and jurisdiction-specific instrument identifiers — ISIN, CUSIP, SEDOL, RIC — by providing a single, asset-class-agnostic reference point available to any market participant without licensing fees. It is both an OMG specification and an ANSI standard (X9.145-2021), giving it formal standing in US and international bodies. Following the EDM Council's acquisition of OMG in October 2025, FIGI governance falls under the combined organization alongside [[FIBO]], creating a tightly integrated identifier-and-ontology ecosystem. Bloomberg L.P. serves as Registration Authority (RA), operating the OpenFIGI API and reference database on behalf of the standard.\n\nA FIGI is a 12-character alphanumeric code: two uppercase letter prefix, the letter `G`, eight randomly generated characters (uppercase consonants excluding Y, plus digits), and a modulo-36 check digit. The random generation approach is intentional — no metadata is encoded in the identifier itself; all instrument metadata lives in the OpenFIGI database. This design enables stable, persistent identification across market events without identifier re-use problems. A single underlying instrument may have multiple FIGIs at different granularity levels: a composite FIGI for the instrument globally, and exchange-specific FIGIs for each listing venue. Coverage spans equities, fixed income, exchange-traded derivatives, funds, commodities, currencies, cryptocurrencies, and structured products.\n\nFIGI has formal [[OWL]] and [[RDF]] representations via the OMG specification's RDF/XML serialization and an ODM XMI file consistent with other OMG standards. These allow FIGI to be integrated alongside [[FIBO]], [[GLEIF]], and [[ISO 20022]] in ontology-based financial data platforms. The OpenFIGI API provides free public [[URI and IRI]]-style resolution: look up any FIGI, or map from ISIN, CUSIP, SEDOL, ticker, or exchange code to a FIGI. [[FDC3]]'s `fdc3.instrument` context type lists FIGI as a first-class supported identifier scheme, reflecting its importance in desktop interoperability workflows.\n\n## Key Components\n\n- **Composite FIGI:** Global instrument-level identifier, exchange-agnostic\n- **Exchange-specific FIGI:** Venue-level identifier referencing ISO 10383 MIC codes\n- **OpenFIGI API:** Free REST API for lookup, mapping, search, and bulk conversion (100 identifiers/request)\n- **Identifier mapping:** ISIN → FIGI, CUSIP → FIGI, SEDOL → FIGI, ticker → FIGI\n- **LEI relationship:** FIGI identifies instruments; [[GLEIF]] LEI identifies issuers — complementary\n- **OWL representation:** RDF/XML and ODM XMI from OMG specification\n- **Asset classes:** Equities, fixed income, derivatives, funds, commodities, FX, crypto, structured products\n\n## OWL/RDF Availability\n\n- OMG FIGI Specification (includes RDF/XML OWL): https://www.omg.org/figi/\n- OpenFIGI Portal: https://www.openfigi.com/\n- OpenFIGI API: https://www.openfigi.com/api\n- ANSI X9.145-2021: https://webstore.ansi.org/standards/ascx9/ansix91452021\n\n## Relationships\n\n- **Maintained by:** OMG / EDM Council (governance), Bloomberg L.P. (Registration Authority)\n- **Aligned with:** [[FIBO]] (instrument annotation), [[GLEIF]] (issuer-to-instrument mapping), [[ISO 20022]] (`OtherIdentification` code scheme), [[XBRL]] (N-PORT portfolio identification)\n- **Supported by:** [[FDC3]] `fdc3.instrument` identifier map\n- **Complements:** ISIN (ISO 6166), CUSIP, SEDOL — maps from all three\n- **Represented in:** [[OWL]] RDF/XML, ODM XMI, [[URI and IRI]]\n\n## Key URLs\n\n- OMG FIGI Specification: https://www.omg.org/figi/\n- OpenFIGI Portal: https://www.openfigi.com/\n- OpenFIGI API: https://www.openfigi.com/api\n\n## Sources\n\n- `sources/articles/figi-financial-instrument-identifier.md`\n\n## See Also\n\n- [[OWL]], [[RDF]], [[Linked Data]], [[URI and IRI]]\n- [[FIBO]], [[GLEIF]], [[Financial Instrument]], [[Financial Identifier]]\n- [[FDC3]], [[ISO 20022]], [[XBRL]]\n" },
    { id: "Findkg", category: "entities", definition: "FinDKG is a temporally-resolved [[Financial Knowledge Graph]] constructed from ~400,000 Wall Street Journal articles spanning 1999–2023, capturing how financial entity relationships evolve over time through 12 entity types and 15 relation types encoded as timestamped [[Triple|triples]].", content: "# FinDKG\n\n**Type:** Dataset / Knowledge Graph\n**Year:** 2024\n**License:** GPL-3.0\n**Status:** Open source\n\n**Definition:** FinDKG is a temporally-resolved [[Financial Knowledge Graph]] constructed from ~400,000 Wall Street Journal articles spanning 1999–2023, capturing how financial entity relationships evolve over time through 12 entity types and 15 relation types encoded as timestamped [[Triple|triples]].\n\n## Overview\n\nFinDKG addresses a core limitation of static [[Knowledge Graph|knowledge graphs]]: the inability to represent how relationships change over time. In financial markets, relationships such as supply-chain partnerships, competitive dynamics, and regulatory exposures shift continuously. By attaching a time dimension to each [[Triple]], FinDKG enables temporal link prediction — forecasting which relationships are likely to form or dissolve in a future time window.\n\nThe dataset is built from Wall Street Journal full-text archives, making it one of the longest-spanning open financial news [[Knowledge Graph|knowledge graphs]] available. Its 24-year coverage (1999–2023) spans multiple market cycles including the dot-com collapse, the 2008 financial crisis, and the COVID-19 shock, giving it substantial longitudinal depth for financial [[Inference and Reasoning|reasoning]] tasks.\n\nBecause each triple carries a timestamp or time range, FinDKG can be loaded into temporal [[Knowledge Graph]] stores and queried with time-scoped [[SPARQL]] patterns. The [[RDF]] serialization makes it compatible with standard triple stores, and the GPL-3.0 license permits academic reuse with appropriate attribution.\n\n## Scale\n\n| Dimension | Value |\n|---|---|\n| Source articles | ~400,000 Wall Street Journal articles |\n| Coverage period | 1999–2023 (24 years) |\n| Entity types | 12 |\n| Relation types | 15 |\n| Triple structure | Temporally-resolved (timestamped) |\n| License | GPL-3.0 |\n\n## Entity Types\n\nFinDKG's 12 entity types span the core actors and instruments of financial markets:\n\n- **Companies** — public and private corporations\n- **Persons** — executives, analysts, regulators\n- **Countries** — geopolitical actors in macroeconomic events\n- **Organizations** — non-corporate institutions (central banks, trade bodies)\n- **Financial instruments** — [[Securities]], bonds, derivatives\n- **Economic indicators** — GDP, inflation, interest rate references\n- Plus six additional categories covering commodities, sectors, and market events\n\n## Relation Types\n\nThe 15 relation types capture the primary ways financial entities interact:\n\n- **Corporate actions:** acquisition, merger, spin-off\n- **Market relations:** competition, partnership, supply chain\n- **Capital flows:** investment, financing, underwriting\n- **Regulatory:** regulatory action, enforcement, sanction\n- **Macro linkages:** macroeconomic impact, currency exposure\n\n## Construction Pipeline\n\nFinDKG's pipeline processes Wall Street Journal full-text articles through an NLP extraction stack:\n\n1. Named entity recognition identifies entities across the 12 types\n2. Relation extraction classifies interactions into the 15 relation types\n3. Temporal tagging attaches publication date or inferred time range to each extracted triple\n4. Deduplication and canonicalization merge co-referring entity mentions\n\nThe result is a set of timestamped [[Triple|triples]] of the form `(subject, relation, object, time)` that can be loaded directly into a temporal [[Knowledge Graph]] store or flattened into standard [[RDF]] for [[SPARQL]] querying.\n\n## Use Cases\n\n- **Temporal link prediction:** Given the graph state at time *t*, predict which edges will appear at *t+1*\n- **Event-driven analysis:** Retrieve all [[Securities]]-related triples around a specific [[Market Data]] event date\n- **Longitudinal entity tracking:** Trace how a company's relationships evolve across market cycles\n- **Training data:** Temporal triples serve as supervision signal for graph neural network models\n\n## Relationship to Other Work\n\nFinDKG's temporal triple design complements the dual-structure approach of [[FinKario]], which separates static attribute subgraphs from dynamic event subgraphs. Where FinKario draws on equity research reports, FinDKG draws on news text — the two are complementary sources for a production financial [[Knowledge Graph]]. [[FinReflectKG]] takes a different angle, focusing on structured regulatory filings rather than news.\n\n## Key URLs\n\n- Paper: (2024, open access)\n- License: GPL-3.0 (reuse requires license compliance review)\n\n## Sources\n\n- `sources/papers/findkg-dynamic-knowledge-graph.md`\n\n## See Also\n\n- [[Financial Knowledge Graph]], [[Knowledge Graph]], [[Triple]], [[RDF]], [[SPARQL]]\n- [[Securities]], [[Market Data]], [[Inference and Reasoning]]\n- [[FinKario]], [[FinReflectKG]]\n" },
    { id: "Finkario", category: "entities", definition: "FinKario is a large-scale [[Financial Knowledge Graph]] with 305,000+ entities and 19 relation types, built from equity research reports using a dual-structure design that separates static attribute facts from dynamic event facts, with [[FIBO]] alignment and a [[Inference and Reasoning|RAG]]-based variant that achieves 18.81% improvement on stock prediction tasks.", content: "# FinKario\n\n**Type:** Dataset / Knowledge Graph\n**Year:** 2025\n**ArXiv:** https://arxiv.org/pdf/2508.00961\n\n**Definition:** FinKario is a large-scale [[Financial Knowledge Graph]] with 305,000+ entities and 19 relation types, built from equity research reports using a dual-structure design that separates static attribute facts from dynamic event facts, with [[FIBO]] alignment and a [[Inference and Reasoning|RAG]]-based variant that achieves 18.81% improvement on stock prediction tasks.\n\n## Overview\n\nFinKario's central innovation is the dual-structure design: rather than storing all facts in a single homogeneous graph, FinKario partitions its triples into two semantically distinct subgraphs. The **attribute subgraph** holds time-stable properties — a company's sector, listing exchange, founding date, parent organization. The **event subgraph** holds time-varying events — earnings releases, analyst rating changes, merger announcements — each timestamped to its occurrence.\n\nThis separation matters for downstream reasoning. Queries over stable attributes (e.g., \"what sector is this company in?\") hit the attribute subgraph without touching the much larger event log. Queries over recent market signals hit the event subgraph without loading irrelevant static facts. The design mirrors the distinction [[FIBO]] draws between reference data and market data in its ontology modules.\n\n[[FIBO]] alignment is a key differentiator. FinKario's entity types and relation semantics are normalized against FIBO's class hierarchy, meaning that entity types like `ListedSecurity`, `Equity`, and `LegalEntity` carry the same formal meaning as in the FIBO ontology. This makes FinKario directly interoperable with any FIBO-aligned tool or pipeline, including [[GLEIF]] LEI data and [[LSEG PermID]] linked data.\n\n## Scale\n\n| Dimension | Value |\n|---|---|\n| Entities | 305,000+ |\n| Relation types | 19 |\n| Source | Equity research reports |\n| Ontology alignment | [[FIBO]] |\n| RAG improvement | 18.81% over baseline on stock prediction |\n\n## Dual-Structure Design\n\n### Attribute Subgraph\n\nThe attribute subgraph stores static or slowly-changing properties:\n\n- Company fundamentals (sector, industry, market cap tier)\n- Instrument properties (listing exchange, currency, asset class)\n- Organizational structure (subsidiaries, parent companies)\n- Analyst coverage (which firms cover which companies)\n\nThese facts change rarely and are suited to cache-friendly, read-optimized access patterns.\n\n### Event Subgraph\n\nThe event subgraph stores timestamped financial events extracted from research reports:\n\n- Earnings releases and guidance updates\n- Analyst rating upgrades and downgrades\n- Merger, acquisition, and restructuring announcements\n- Macroeconomic event impacts on specific instruments\n\nEach event triple carries a timestamp and can be linked to relevant [[Securities]] and [[Financial Instrument|financial instruments]].\n\n## Construction Pipeline\n\n1. **Source ingestion:** Equity research reports (PDF and structured text) are ingested\n2. **LLM-assisted extraction:** A large language model extracts entity mentions and relation instances, guided by the [[FIBO]]-aligned schema\n3. **Ontology normalization:** Extracted entity types are mapped to [[FIBO]] classes; ambiguous mentions are resolved against the attribute subgraph\n4. **Subgraph routing:** Each extracted triple is classified as an attribute fact or an event fact and routed to the appropriate subgraph\n5. **Deduplication:** Cross-report entity coreference resolution merges duplicate mentions\n\n## FinKario-RAG\n\nFinKario-RAG is a retrieval-augmented generation variant that treats the [[Knowledge Graph]] as a retrieval corpus for financial language model prompting:\n\n1. A stock prediction query arrives (e.g., \"What is the expected price movement for Company X?\")\n2. Relevant subgraphs are retrieved from both the attribute and event subgraphs\n3. Retrieved triples are serialized into natural language context\n4. A financial LLM generates predictions conditioned on the structured context\n\nThe RAG variant achieves **18.81% improvement** over financial LLM baselines on stock prediction tasks, demonstrating that structured [[Knowledge Graph]] retrieval adds substantial signal beyond raw text retrieval. This result is consistent with the finding from [[Structure First Reason Next]] that graph-structured intermediate representations improve LLM numerical reasoning on financial data.\n\n## FIBO Alignment\n\nThe [[FIBO]] alignment enables several practical benefits:\n\n- Entity types carry formally defined semantics, reducing ambiguity at schema boundaries\n- FinKario instances can be joined with [[LSEG PermID]] linked data, which also reuses FIBO's corporate entity model\n- [[SPARQL]] queries written for FIBO-aligned graphs can be reused against FinKario with minimal adaptation\n- The alignment reduces the gap between FinKario's knowledge and [[Inference and Reasoning|OWL reasoner]] inference, since FIBO axioms apply to aligned instances\n\n## Key URLs\n\n- ArXiv: https://arxiv.org/pdf/2508.00961\n\n## Sources\n\n- `sources/papers/finkario-dual-structure-financial-kg.md`\n\n## See Also\n\n- [[Financial Knowledge Graph]], [[Knowledge Graph]], [[FIBO]], [[Financial Instrument]]\n- [[Inference and Reasoning]], [[SPARQL]], [[Securities]]\n- [[FinDKG]], [[FinReflectKG]], [[LSEG PermID]]\n- [[Structure First Reason Next]]\n" },
    { id: "Finreflectkg", category: "entities", definition: "FinReflectKG is an agentic [[Financial Knowledge Graph]] constructed from SEC 10-K filings for S&P 100 companies using a schema-guided LLM extraction loop with iterative self-correction, demonstrating how agentic pipelines reduce hallucination in regulatory document ingestion.", content: "# FinReflectKG\n\n**Type:** Dataset / Knowledge Graph / Methodology\n**Venue:** ACM ICAIF 2024/2025\n**URL:** https://dl.acm.org/doi/10.1145/3768292.3770363\n\n**Definition:** FinReflectKG is an agentic [[Financial Knowledge Graph]] constructed from SEC 10-K filings for S&P 100 companies using a schema-guided LLM extraction loop with iterative self-correction, demonstrating how agentic pipelines reduce hallucination in regulatory document ingestion.\n\n## Overview\n\nFinReflectKG addresses a fundamental challenge in financial [[Knowledge Graph]] construction: SEC 10-K annual reports are long, dense regulatory documents where relevant facts are scattered across hundreds of pages of legal and financial prose. Naive LLM extraction over such documents produces high rates of hallucination and schema violation. FinReflectKG's contribution is a schema-guided agentic loop that constrains extraction to a predefined ontology schema and iteratively refines output through reflection steps.\n\nThe schema-first approach means that the LLM agent is not asked to invent relation types — it is given a fixed vocabulary of permitted entity types and relation predicates derived from the ontology schema, and tasked only with identifying instances of those types in the source text. This dramatically reduces the space of possible outputs and makes evaluation tractable.\n\nThe dataset covers [[Securities|S&P 100]] companies using their 2024 [[XBRL]]-structured 10-K filings from SEC EDGAR. Because 10-K filings are mandatory annual disclosures, FinReflectKG provides a consistent, annually-refreshable snapshot of the largest US public companies, linked to [[Legal Entity|legal entity]] identifiers and organized around the [[XBRL]] taxonomy that governs financial statement reporting.\n\n## Data Source\n\n| Dimension | Value |\n|---|---|\n| Filing type | SEC 10-K (annual report) |\n| Coverage | S&P 100 companies |\n| Filing year | 2024 |\n| Source format | [[XBRL]]-structured SEC EDGAR filings |\n| Release | Open dataset |\n\n## Construction Method\n\n### Schema-Guided Extraction\n\nBefore any document is processed, FinReflectKG defines its target ontology schema:\n\n- **Entity types:** Companies, executives, subsidiaries, products, markets, risk factors, regulatory bodies\n- **Relation types:** Subsidiary-of, employs, operates-in, subject-to-regulation, filed-with, reports-segment\n\nThe LLM agent receives this schema as a constraint. It may only extract triples whose predicate appears in the permitted relation set. This mirrors the principle behind [[XBRL]] itself — structured financial reporting works precisely because reporters must use a predefined taxonomy of concepts rather than inventing their own labels.\n\n### Agentic Extraction Loop\n\nThe pipeline runs multiple passes over each 10-K document:\n\n1. **Extract:** The agent reads a document section and proposes a set of triples\n2. **Reflect:** A reflection step evaluates each proposed triple against the schema and against previously extracted facts for consistency\n3. **Refine:** Inconsistent or low-confidence triples are revised or discarded\n4. **Consolidate:** Final triples from all document sections are merged and deduplicated\n\nThe reflection step is the key innovation — it operationalizes the \"chain of thought\" reasoning pattern at the extraction level, rather than only at query time. The result is measurably higher precision and consistency compared to single-pass LLM extraction.\n\n### Evaluation\n\nFinReflectKG applies both automated and human evaluation:\n\n- **Automated:** Precision, recall, and F1 against a held-out annotation set\n- **Human:** Expert annotators assess whether extracted triples correctly represent the source filing\n\nThis dual evaluation methodology supports reproducible benchmarking, allowing future work to compare alternative extraction approaches against a fixed reference.\n\n## Relationship to XBRL and Semantic XBRL\n\n10-K filings use [[XBRL]] to tag financial data with machine-readable concept labels. FinReflectKG works at the narrative text level (the qualitative sections of the 10-K) rather than purely at the XBRL tag level. This complements [[SemanticXBRL]], which converts the structured XBRL facts (income statement, balance sheet figures) into [[RDF]] triples. Together, FinReflectKG (narrative knowledge) and [[SemanticXBRL]] (structured financial facts) cover complementary layers of the 10-K document.\n\n## Use Cases\n\n- **Corporate [[Knowledge Graph]] bootstrapping:** S&P 100 triples provide a high-quality seed graph for larger ingestion pipelines\n- **Risk factor analysis:** Extracted risk factor entities and relations support automated surveillance queries\n- **Regulatory compliance mapping:** Subsidiary and regulatory-body triples support [[Legal Entity]] hierarchy analysis\n- **Benchmarking:** Open dataset enables comparison of future extraction methods\n\n## Key URLs\n\n- ACM DL: https://dl.acm.org/doi/10.1145/3768292.3770363\n\n## Sources\n\n- `sources/papers/finreflectkg-sec-10k-knowledge-graph.md`\n\n## See Also\n\n- [[Financial Knowledge Graph]], [[Knowledge Graph]], [[XBRL]], [[Legal Entity]]\n- [[Securities]], [[SPARQL]], [[RDF]]\n- [[SemanticXBRL]], [[FinDKG]], [[FinKario]]\n" },
    { id: "Finregont", category: "entities", definition: "Financial Regulation Ontology — a comprehensive [[OWL]]/[[RDF]] ontology for financial regulatory compliance, importing approximately 700 [[FIBO]] classes and 200 LKIF legal norm classes, organized into modular sub-ontologies covering banking, hedge funds, insurance, and securities regulation.", content: "# FinRegOnt\n\n**Type:** Ontology\n\n**Definition:** Financial Regulation Ontology — a comprehensive [[OWL]]/[[RDF]] ontology for financial regulatory compliance, importing approximately 700 [[FIBO]] classes and 200 LKIF legal norm classes, organized into modular sub-ontologies covering banking, hedge funds, insurance, and securities regulation.\n\n## Overview\n\nFinRegOnt provides a machine-readable, logically consistent model of financial regulatory requirements, enabling organizations to reason over compliance obligations, map reporting requirements, and integrate regulatory knowledge into data governance frameworks. Maintained by Jayzed Data Models Inc. under a dual MIT/GPL open-source license, it bridges the financial domain vocabulary of [[FIBO]] with the legal norm vocabulary of LKIF (Legal Knowledge Interchange Format) to express regulatory obligations as formal [[OWL]] axioms rather than prose documents. A representative axiom might assert: \"a bank holding company subject to CCAR must submit a capital plan containing stress test results meeting specified criteria\" — as description logic that [[Inference and Reasoning|reasoners]] can evaluate against entity data.\n\nThe architecture is a two-foundation import stack. [[FIBO]] contributes approximately 700 finance-domain classes covering instruments, parties, markets, contracts, and processes — the core financial vocabulary. [[LKIF]] contributes approximately 200 legal domain classes covering norms, rules, obligations, permissions, and legal roles — the regulatory semantics layer. FinRegOnt extends this combined foundation with modular sub-ontologies: the XBRL Ontology (the only known open-source [[OWL]] ontology providing complete coverage of all [[XBRL]] specifications, including XBRL 2.1, Dimensions, Generic Links, Formula, and Table Linkbase), the Bank Regulation Ontology at `bankontology.com` (US banking regulation — Call Reports, CCAR, DFAST, Basel III), the Hedge Fund Regulation Ontology at `hedgefundontology.com` (Form PF, AIFMD), the Solvency II/Insurance Ontology at `insuranceontology.com` (EU Solvency II QRTs, SCR calculation, EIOPA taxonomies), and MiFID II coverage.\n\nFinRegOnt is authored in [[OWL]]/Turtle and is [[SPARQL]]-queryable via standard triple stores including Apache Jena, Stardog, and GraphDB. It is compatible with [[OWL]] 2 DL reasoners (HermiT, Pellet, FaCT++) for automated compliance checking — meaning institutions can run reasoners over their entity data to infer which regulatory obligations apply. Imports are managed via `owl:imports` declarations, enabling modular loading of only the relevant sub-ontologies. The [[XBRL]] sub-ontology specifically bridges FinRegOnt concepts to [[XBRL]] taxonomy elements, enabling semantic validation of regulatory filings within a [[Linked Data]] environment. [[GLEIF]] LEI codes serve as the primary entity identifier throughout, consistent with major regulatory mandate requirements.\n\n## Key Components\n\n- **XBRL Ontology:** Complete OWL coverage of all XBRL specifications — only known open-source implementation\n- **Bank Regulation Ontology (bankontology.com):** Call Reports (FFIEC 031/041/051), CCAR, DFAST, Basel III\n- **Hedge Fund Ontology (hedgefundontology.com):** Form PF (SEC/CFTC), AIFMD (EU)\n- **Insurance Ontology (insuranceontology.com):** Solvency II QRTs, SCR calculation, EIOPA taxonomies\n- **MiFID II coverage:** Transaction reporting fields, best execution, product governance\n- **Key classes:** `RegulatoryObligation`, `ReportingEntity`, `ReportTemplate`, `ComplianceRule`\n- **[[SHACL]] compatibility:** Shapes-based constraint validation for regulatory data quality\n\n## OWL/RDF Availability\n\nPrimary format: OWL/Turtle (.ttl). SPARQL-queryable via standard triple stores.\n\n- Homepage: https://finregont.com/\n- Bank Regulation Ontology: https://bankontology.com/\n- Hedge Fund Ontology: https://hedgefundontology.com/\n- Insurance Ontology: https://insuranceontology.com/\n\n## Relationships\n\n- **Imports:** [[FIBO]] (~700 classes), [[LKIF]] (~200 classes) via `owl:imports`\n- **Contains:** [[XBRL]] OWL sub-ontology (complete specification coverage)\n- **Queryable via:** [[SPARQL]], OWL 2 DL reasoners (HermiT, Pellet, FaCT++)\n- **Uses:** [[GLEIF]] LEI for regulated entity identification\n- **Regulatory coverage:** Basel III/BCBS, MiFID II, EMIR, Dodd-Frank, Solvency II\n\n## Key URLs\n\n- Homepage: https://finregont.com/\n- License: MIT / GPL (dual)\n\n## Sources\n\n- `sources/articles/finregont-financial-regulation-ontology.md`\n\n## See Also\n\n- [[OWL]], [[RDF]], [[SPARQL]], [[Ontology]], [[SHACL]]\n- [[FIBO]], [[XBRL]], [[GLEIF]], [[LKIF]]\n- [[Inference and Reasoning]], [[Linked Data]]\n" },
    { id: "Fix Protocol", category: "entities", definition: "Financial Information eXchange — the global messaging standard for real-time electronic communication of securities transactions, covering pre-trade through post-trade across virtually every asset class, currently at FIX 5.0 SP2 with ongoing Extension Packs.", content: "# FIX Protocol\n\n**Type:** Standard / Messaging Protocol\n\n**Definition:** Financial Information eXchange — the global messaging standard for real-time electronic communication of securities transactions, covering pre-trade through post-trade across virtually every asset class, currently at FIX 5.0 SP2 with ongoing Extension Packs.\n\n## Overview\n\nFIX Protocol originated in 1992 as a bilateral agreement between Fidelity Investments and Salomon Brothers for equity order communication. It has since become the dominant pre-trade and trade-execution protocol across equity, listed derivatives, FX spot and forwards, fixed income, commodities, and structured products — with the majority of the world's equity and listed derivatives order flow transmitted via FIX messages. The FIX Trading Community, an industry-led non-profit, maintains the standard through working groups covering algorithmic trading, FX, fixed income, post-trade, and other functional areas. Version updates and Extension Packs (EPs) are published after community review, enabling incremental feature additions to FIX 5.0 SP2 without a full version increment.\n\nFIX supports four encodings: the classic tag-value format (`tag=value` pipe-delimited, compact, low-latency, used in most production connections), FIXML (XML representation for batch processing and back-office integration), FIX JSON (for REST-style integrations), and Simple Binary Encoding (SBE, high-performance binary format co-developed with the FIX community and widely adopted by exchanges and ECNs). Messages are identified by `MsgType` tag (tag 35): `D` (NewOrderSingle), `8` (ExecutionReport), `V/W/X` (MarketData requests and responses), `AE` (TradeCaptureReport). The session layer — logon, heartbeat, sequence number management, resend requests — is transport-independent, separating session concerns from application-layer message semantics.\n\nFIX Protocol does not have a native [[OWL]] or [[RDF]] ontology — the tag-value model is not natively [[Linked Data]]-compatible. Cross-standard semantic mapping is in progress via ISO TC68 SC9 WG1, which is developing an OWL cross-mapping aligning FIX tag semantics with [[FpML]] product definitions and [[ISO 20022]] message elements. FIX tag 461 carries the [[ISO 10962 CFI]] code as a standard field in security definition messages, creating a formal link to the CFI taxonomy in every instrument message. [[FIBO]]'s market and instrument classes correspond conceptually to FIX security definitions and execution reports. FIX Orchestra provides machine-readable rules-of-engagement specifications enabling automated generation of FIX session configurations.\n\n## Key Components\n\n- **Tag-value encoding:** Classic `tag=value` pipe-delimited format for low-latency production\n- **FIXML:** XML representation for batch and back-office integration (XML Schema defined)\n- **SBE (Simple Binary Encoding):** High-performance binary format for market data and order entry\n- **FIX JSON:** REST-style encoding for web integrations\n- **Key message types:** `D` (NewOrderSingle), `8` (ExecutionReport), `F` (OrderCancelRequest), `V/W/X` (MarketData), `AE` (TradeCaptureReport)\n- **Tag 461:** Carries [[ISO 10962 CFI]] code for instrument classification\n- **FIXimate:** Official online tag and field reference — fiximate.org\n- **Orchestra:** Machine-readable rules-of-engagement specification format\n- **Market Data:** `fdc3.instrument` context maps to FIX security definitions\n\n## OWL/RDF Availability\n\nNo native OWL/RDF. ISO TC68 SC9 WG1 OWL cross-mapping with FpML and ISO 20022 is in development.\n\n- Homepage: https://www.fixtrading.org/\n- FIXimate tag reference: https://fiximate.org/\n- Current version: FIX 5.0 SP2 with Extension Packs\n\n## Relationships\n\n- **Maintained by:** FIX Trading Community (non-profit, royalty-free)\n- **Complementary to:** [[FpML]] (FIX handles pre-trade/execution; FpML handles OTC confirmation)\n- **Complementary to:** [[ISO 20022]] (regulatory/settlement; FIX handles execution; translation mappings exist)\n- **Complementary to:** [[ISDA CDM]] (FIX execution reports → CDM trade events)\n- **Uses:** [[ISO 10962 CFI]] codes (tag 461) for instrument classification\n- **Conceptually aligned:** [[FIBO]] market and instrument classes\n- **Regulatory:** MiFID II, Reg NMS reporting fields map to FIX tags\n\n## Key URLs\n\n- Homepage: https://www.fixtrading.org/\n- FIXimate: https://fiximate.org/\n- FIX Orchestra: https://www.fixtrading.org/standards/fix-orchestra/\n\n## Sources\n\n- `sources/articles/fix-protocol-financial-information-exchange.md`\n\n## See Also\n\n- [[Ontology]], [[FIBO]], [[FpML]], [[ISO 20022]], [[ISDA CDM]]\n- [[Securities]], [[Derivatives]], [[Market Data]], [[ISO 10962 CFI]]\n" },
    { id: "Fpml", category: "entities", definition: "Financial Products Markup Language — the open XML standard for representing OTC [[Derivatives]] and structured financial products, maintained by ISDA since 1999, currently at version 5.13, covering the full trade lifecycle from pre-trade through regulatory reporting.", content: "# FpML\n\n**Type:** Standard / XML Schema\n\n**Definition:** Financial Products Markup Language — the open XML standard for representing OTC [[Derivatives]] and structured financial products, maintained by ISDA since 1999, currently at version 5.13, covering the full trade lifecycle from pre-trade through regulatory reporting.\n\n## Overview\n\nFpML is the canonical machine-readable format for communicating complex derivatives transactions across the global financial industry, enabling straight-through processing (STP) between counterparties, trading platforms, clearinghouses, and regulatory reporting systems. Established in 1999 by ISDA, it predates more recent domain models by two decades and remains deeply embedded in production derivatives infrastructure. The standard covers interest rate products (swaps, swaptions, caps, floors, FRAs, inflation swaps), credit derivatives (CDS, CDS indices, basket products, total return swaps), equity derivatives, FX derivatives, commodity derivatives, securities financing (repos, securities lending), and syndicated loan confirmations.\n\nFpML is defined exclusively as XML Schema (XSD), organized into modular namespaces: `FpML-Main` (core message envelope and trade structure), per-asset-class product schemas (IRD, CD, EQD, FX, COM), a Confirmation view (full economic terms for bilateral confirmation), a Reporting view (DTCC, ESMA, CFTC regulatory reporting), and a Pretrade view (RFQ and indicative pricing). The `Trade` element is the central document unit, wrapping product terms, party roles, and dates. `Party` elements identify counterparties using LEI or internal identifiers. `TradeHeader` carries Unique Trade Identifiers (UTIs), timestamps, and version tracking. Workflow messages support confirmation (`requestConfirmation`, `affirmTrade`), novation, and amendment.\n\nFpML has no native [[OWL]] or [[RDF]] representation — it is purely schema-driven with no linked-data publication. However, cross-standard semantic alignment is underway: ISO TC68 SC9 WG1 is developing an OWL proof-of-concept that cross-maps FpML concepts with [[FIX Protocol]] tags and [[ISO 20022]] message elements, aiming to create a unified financial instrument [[Ontology]] bridging three major standards. [[FIBO]]'s DER module provides ontological definitions that correspond conceptually to FpML product types, and [[ISDA CDM]] is explicitly designed as FpML's successor for lifecycle event processing, providing FpML mappings during the transition period. Regulatory mandates like EMIR Refit often require both FpML and [[ISO 20022]] reporting streams in parallel.\n\n## Key Components\n\n- **Trade:** Central document unit — product terms, party roles, dates\n- **Product schemas:** Per-asset-class XSD modules (IRD, CD, EQD, FX, COM)\n- **Confirmation view:** Full economic terms for bilateral trade confirmation\n- **Reporting view:** Regulatory trade reporting (DTCC GTR, ESMA REGIS-TR, CFTC)\n- **Pretrade view:** RFQ messages and indicative pricing\n- **Workflow messages:** `requestConfirmation`, `affirmTrade`, novation, amendment\n- **Party identification:** LEI or internal identifiers; `TradeHeader` with UTIs\n- **Serialization:** XML-only; no official JSON or binary encoding\n\n## OWL/RDF Availability\n\nFpML has no native OWL/RDF representation. Schema documentation is available at:\n\n- FpML Homepage: https://www.fpml.org/\n- Schema browser: https://schemas.liquid-technologies.com/FpML/\n- ISO TC68 SC9 WG1 OWL cross-mapping: in development (not yet published)\n\n## Relationships\n\n- **Maintained by:** ISDA (royalty-free license)\n- **Complementary to:** [[FIX Protocol]] (FIX handles pre-trade/execution; FpML handles OTC post-trade confirmation)\n- **Overlapping with:** [[ISO 20022]] (regulatory reporting; EMIR Refit requires both)\n- **Succeeded by:** [[ISDA CDM]] (for lifecycle event modeling; FpML mappings provided during transition)\n- **Conceptually aligned:** [[FIBO]] DER module (no formal OWL alignment published)\n- **Used by:** DTCC GTR, ESMA REGIS-TR, CFTC swap data repositories\n\n## Key URLs\n\n- Homepage: https://www.fpml.org/\n- Schema browser: https://schemas.liquid-technologies.com/FpML/\n- Current version: FpML 5.13 Recommendation\n\n## Sources\n\n- `sources/articles/fpml-financial-products-markup.md`\n\n## See Also\n\n- [[Ontology]], [[FIBO]], [[ISDA CDM]], [[FIX Protocol]], [[ISO 20022]]\n- [[Derivatives]], [[Financial Instrument]], [[Legal Entity]]\n" },
    { id: "Gleif", category: "entities", definition: "The Global Legal Entity Identifier Foundation — the operational body overseeing the ISO 17442 LEI system, publishing a suite of 7 [[OWL]] ontologies for machine-readable [[Legal Entity]] identification, ownership, and registration data.", content: "# GLEIF\n\n**Type:** Organization / Ontology Suite / Standard\n\n**Definition:** The Global Legal Entity Identifier Foundation — the operational body overseeing the ISO 17442 LEI system, publishing a suite of 7 [[OWL]] ontologies for machine-readable [[Legal Entity]] identification, ownership, and registration data.\n\n## Overview\n\nThe Legal Entity Identifier (LEI) is a 20-character ISO 17442-compliant alphanumeric code assigned to any organization participating in financial transactions. Developed after the 2008 financial crisis — when regulators identified the inability to identify counterparties across jurisdictions as a systemic amplifier — the LEI system was endorsed by the G20 in 2012 and GLEIF was established in 2014 as the global operational body, headquartered in Basel. GLEIF does not issue LEIs directly; it accredits a network of Local Operating Units (LOUs) and maintains the authoritative Global LEI Index.\n\nGLEIF publishes a formal [[Ontology]] suite of 7 [[OWL]] ontologies at `https://www.gleif.org/ontology/v1.0/`, available in JSON-LD, [[RDF]]/XML, N-Triples, and Turtle. The suite covers the complete LEI data model: Base (shared foundational classes), L1 \"Who is Who\" (entity identity, name, address, registration), L2 \"Who Owns Whom\" (direct and ultimate ownership/control relationships), L2Parent (parent relationship definitions), EntityLegalForm (LLC, PLC, GmbH, and other legal form codes), RegistrationAuthority (business registry identifiers), and ReportingException (entities exempt from L2 disclosure). This [[Linked Data]] publication makes GLEIF data directly integrable into RDF triple stores and [[SPARQL]] query environments without transformation.\n\nGLEIF sits at the intersection of entity identification and financial ontology. [[FIBO]]'s `LegalEntity` class hierarchy directly references GLEIF's L1 ontology; FIBO uses LEI as the preferred identifier for legal entities and maps FIBO's L2 for ownership structures. [[Schema.org Financial]]'s `leiCode` property creates a machine-readable web link to GLEIF's registry from any `schema:Organization`. [[FIGI]] and GLEIF have coordinated on LEI-to-FIGI mapping guidance, linking entity identity to the instruments they issue. LEI is mandated by MiFID II/MiFIR, EMIR, Dodd-Frank, and Basel III, making GLEIF data a compliance cornerstone across jurisdictions.\n\n## Key Components\n\n- **L1 Ontology (Who is Who):** `LegalEntity`, `LEIRegistration`, `EntityStatus`, `ValidationSources`\n- **L2 Ontology (Who Owns Whom):** `RelationshipRecord`, direct/ultimate parent relationships\n- **EntityLegalForm:** Legal form classification codes per jurisdiction\n- **RegistrationAuthority:** Business registry identifiers and metadata\n- **LEI structure:** Characters 1–4 (LOU prefix), 5–18 (entity ID), 19–20 (ISO 7064 check digits)\n- **BIC-to-LEI mapping:** SWIFT BIC codes mapped to LEIs via GLEIF mapping files\n- **GLEIO:** Community alternative OWL representation with richer axiomatization\n\n## OWL/RDF Availability\n\nAll ontologies published in JSON-LD, RDF/XML, N-Triples, and Turtle:\n\n- Ontology suite root: https://www.gleif.org/ontology/v1.0/\n- L1 OWL (RDF/XML): https://www.gleif.org/ontology/v1.0/L1/ontology.xml\n- L2 OWL (RDF/XML): https://www.gleif.org/ontology/v1.0/L2/ontology.xml\n- GLEIO (community): https://github.com/LEIdotINFO/GLEIO\n- Global LEI Index: https://search.gleif.org/\n\n## Relationships\n\n- **Provides:** ISO 17442 LEI codes as [[Linked Data]]\n- **Aligned with:** [[FIBO]] `LegalEntity` hierarchy (L1/L2 mapping)\n- **Referenced by:** [[Schema.org Financial]] (`leiCode`), [[ISO 20022]] (party identification), [[FIGI]] (issuer-to-instrument mapping)\n- **Used in:** MiFID II, EMIR, Dodd-Frank, Basel III regulatory reporting\n- **Community tools:** [[GLEIO]] alternative OWL implementation\n\n## Key URLs\n\n- GLEIF Homepage: https://www.gleif.org/\n- Golden Copy data download: https://www.gleif.org/en/lei-data/gleif-golden-copy\n- ISO 17442: https://www.iso.org/standard/78829.html\n\n## Sources\n\n- `sources/articles/gleif-legal-entity-identifier.md`\n\n## See Also\n\n- [[OWL]], [[RDF]], [[Linked Data]], [[Ontology]]\n- [[FIBO]], [[Legal Entity]], [[Schema.org Financial]], [[FIGI]]\n" },
    { id: "Goodrelations", category: "entities", definition: "GoodRelations — The Web Ontology for E-Commerce — a lightweight, stable [[OWL]] DL ontology for describing commercial offerings on the web, providing the foundational vocabulary for business entities, offerings, price specifications, and payment methods, integrated into [[Schema.org Financial]] in 2012.", content: "# GoodRelations\n\n**Type:** Ontology\n\n**Definition:** GoodRelations — The Web Ontology for E-Commerce — a lightweight, stable [[OWL]] DL ontology for describing commercial offerings on the web, providing the foundational vocabulary for business entities, offerings, price specifications, and payment methods, integrated into [[Schema.org Financial]] in 2012.\n\n## Overview\n\nGoodRelations is a lightweight [[OWL]] ontology designed to make commercial offering data machine-readable and semantically rich. Developed by Martin Hepp at Universität der Bundeswehr München and stable since 2008 under a Creative Commons Attribution 3.0 license, it provides a precise model of commercial transactions: a `gr:BusinessEntity` makes a `gr:Offering` for a `gr:ProductOrService` under conditions specified by `gr:PriceSpecification` and accepted `gr:PaymentMethod` values. This pattern applies equally to physical goods, services, and financial products, making GoodRelations a surprisingly powerful vocabulary for describing bank accounts, loans, payment cards, and investment products in [[Linked Data]] and knowledge graph contexts.\n\nThe ontology uses [[OWL]] DL constructs and is compatible with standard [[OWL]] reasoners. The v1 namespace (`http://purl.org/goodrelations/v1#`) has been stable since 2008, making it safe for long-term production use in [[Knowledge Graph]] applications. In 2012, the Schema.org Steering Group formally integrated GoodRelations vocabulary: `gr:BusinessEntity` became `schema:Organization`, `gr:Offering` became `schema:Offer`, `gr:PriceSpecification` became `schema:PriceSpecification`, and `gr:QuantitativeValue` became `schema:QuantitativeValue`. Both the `gr:` namespace and the absorbed `schema:` terms remain valid and usable interchangeably through JSON-LD context mapping, preserving backward compatibility for existing GoodRelations deployments.\n\nFor financial product applications, GoodRelations maps naturally: a bank offering a savings account is a `gr:BusinessEntity` making a `gr:Offering` of a `gr:ProductOrServiceModel` with a `gr:UnitPriceSpecification` carrying the interest rate as a typed literal. Loan terms are expressed via `gr:QuantitativeValue` (duration in months), `gr:UnitPriceSpecification` (APR), and eligible region constraints. Payment card offerings use `gr:PaymentMethod` enumerations and `gr:PaymentChargeSpecification` for annual fees. Rate comparisons across lenders are modeled as multiple `gr:Offering` instances linked to the same `gr:ProductOrServiceModel` — a pattern that influenced [[Schema.org Financial]]'s `FinancialProduct` and `LoanOrCredit` types. [[FIBO]] financial instrument offering structures are conceptually consistent with GoodRelations `gr:Offering` patterns, though no formal OWL alignment has been published.\n\n## Key Components\n\n- **`gr:BusinessEntity`:** Commercial actor (organization or individual); maps to `schema:Organization`\n- **`gr:Offering`:** Central class — a promise to transfer a product/service under conditions; maps to `schema:Offer`\n- **`gr:PriceSpecification`:** Pricing structure; subclasses: `gr:UnitPriceSpecification`, `gr:DeliveryChargeSpecification`, `gr:PaymentChargeSpecification`\n- **`gr:QuantitativeValue`:** Structured numeric value with unit; carries loan terms, interest rates, credit limits\n- **`gr:ProductOrService`:** Anything offerable; `gr:ProductOrServiceModel` for product type definitions\n- **`gr:PaymentMethod`:** Enumeration — `gr:VISA`, `gr:MasterCard`, `gr:Cash`, `gr:DirectDebit`, `gr:Invoice`\n- **`gr:BusinessFunction`:** `gr:Sell`, `gr:Buy`, `gr:LeaseOut`, `gr:ProvideService`, and others\n\n## OWL/RDF Availability\n\nNative [[OWL]] ontology, stable since 2008:\n\n- OWL/RDF XML: http://www.heppnetz.de/ontologies/goodrelations/v1.owl\n- Namespace URI: http://purl.org/goodrelations/v1#\n- Turtle: available via content negotiation at namespace URI\n- RDFS-only version: available for simpler deployments\n\n## Relationships\n\n- **Integrated into:** [[Schema.org Financial]] (2012; `gr:Offering` → `schema:Offer`, etc.)\n- **Conceptually consistent:** [[FIBO]] financial instrument offering structures (no formal OWL alignment)\n- **Supports identifiers:** DUNS, tax IDs, LEI (from [[GLEIF]]) for `gr:BusinessEntity`\n- **Compatible with:** vCard, FOAF (contact enrichment), Dublin Core (provenance)\n- **GS1 / GTIN:** Product identification for physical goods via GoodRelations\n\n## Key URLs\n\n- Homepage: http://www.heppnetz.de/ontologies/goodrelations/v1.html\n- OWL file: http://www.heppnetz.de/ontologies/goodrelations/v1.owl\n- Namespace: http://purl.org/goodrelations/v1#\n\n## Sources\n\n- `sources/articles/goodrelations-ecommerce-ontology.md`\n\n## See Also\n\n- [[OWL]], [[RDF]], [[Ontology]], [[Linked Data]], [[W3C]]\n- [[Schema.org Financial]], [[FIBO]]\n" },
    { id: "Isda Cdm", category: "entities", definition: "The ISDA Common Domain Model — a standardized, machine-readable representation of trade lifecycle events for OTC derivatives, repo, and securities lending, maintained by FINOS with governance from ISDA, ICMA, and ISLA, currently at version 6.0.0.", content: "# ISDA CDM\n\n**Type:** Standard / Domain Model\n\n**Definition:** The ISDA Common Domain Model — a standardized, machine-readable representation of trade lifecycle events for OTC derivatives, repo, and securities lending, maintained by FINOS with governance from ISDA, ICMA, and ISLA, currently at version 6.0.0.\n\n## Overview\n\nThe ISDA Common Domain Model (CDM) provides a single shared data model for how [[Derivatives|financial products are traded]], managed, and processed — replacing the fragmented, institution-specific implementations that create friction in post-trade processing, regulatory reporting, and collateral management. Where legacy systems implement trade lifecycle events in dozens of incompatible formats, CDM defines a canonical representation that any participant can implement using generated code in Java, Scala, TypeScript, Python, JSON Schema, or Daml. The model was originally developed by ISDA before being donated to FINOS (Fintech Open Source Foundation, a Linux Foundation project) to broaden governance; ISDA, ICMA, and ISLA provide subject matter expertise.\n\nCDM is authored in the Rosetta DSL (Domain-Specific Language), a purpose-built language for financial domain modeling developed by REGnosys. Rosetta source files (`.rosetta` extension) are the single source of truth; all language implementations are generated automatically, ensuring no drift between target languages. CDM 6.0.0 covers three asset class domains: OTC Derivatives (interest rate, credit, FX, equity, and commodity derivatives), Cash Securities (bonds, equities, and structured notes), and Repo and Securities Lending (repurchase agreements, securities lending, collateral management). The five model layers are: Product Model (economic terms and payoff structures), Event Model (lifecycle events — new trade, amendment, novation, termination, exercise), Process Model (workflow sequences), Reference Data (counterparty and instrument data aligned with LEI), and Legal Agreements (CSA, GMRA, GMSLA frameworks).\n\nCDM is not an [[OWL]]/[[RDF]] ontology — it uses Rosetta DSL and generates strongly-typed class hierarchies in imperative languages rather than description logic. However, it explicitly positions itself as the successor to [[FpML]] for lifecycle event processing, providing FpML mappings during the transition period. [[FIBO]]'s DER module provides ontological definitions for the derivative product types that CDM's Product Model represents operationally. [[ISO 20022]] `pacs` and `sese` messages can carry CDM payment and settlement event data. Community projects have explored mapping CDM concepts to [[FIBO]] classes, though no normative CDM-to-OWL mapping has been published.\n\n## Key Components\n\n- **Product Model:** Economic terms, payoff structures, underliers, schedules, notionals for all covered instrument types\n- **Event Model:** `NewTrade`, `Amendment`, `Novation`, `Termination`, `Exercise`, `Reset`, `Payment`\n- **Process Model:** Workflow sequences and business process orchestration\n- **Reference Data:** [[GLEIF]] LEI-aligned counterparty and instrument identification\n- **Legal Agreements:** CSA, GMRA, GMSLA contractual frameworks for collateral and margining\n- **Rosetta DSL:** Source authoring format; generates Java, Scala, TypeScript, Python, JSON Schema, Daml\n- **FpML mappings:** Explicit links from CDM product types to [[FpML]] equivalents for legacy interop\n\n## OWL/RDF Availability\n\nCDM has no native OWL or RDF serialization. The canonical format is Rosetta DSL with generated implementations.\n\n- GitHub: https://github.com/finos/common-domain-model\n- Documentation: https://cdm.finos.org/docs/cdm-overview/\n- Rosetta DSL docs: https://docs.rosetta-technology.io/\n- CDM Releases: https://github.com/finos/common-domain-model/releases\n\n## Relationships\n\n- **Built on:** Rosetta DSL (REGnosys), Apache 2.0 license\n- **Governed by:** FINOS, ISDA, ICMA, ISLA\n- **Aligns with:** [[FIBO]] DER module (ontological definitions), [[GLEIF]] LEI (counterparty IDs), [[ISO 20022]] (payment/settlement messaging)\n- **Successor to:** [[FpML]] (for lifecycle event processing, with explicit FpML mappings)\n- **Complements:** [[FIX Protocol]] (execution layer), [[ISO 20022]] (settlement messaging)\n\n## Key URLs\n\n- Homepage: https://cdm.finos.org/docs/cdm-overview/\n- GitHub: https://github.com/finos/common-domain-model\n- FINOS Project: https://www.finos.org/common-domain-model\n- ISDA CDM page: https://www.isda.org/2019/10/14/isda-common-domain-model/\n\n## Sources\n\n- `sources/articles/isda-cdm-common-domain-model.md`\n\n## See Also\n\n- [[Ontology]], [[FIBO]], [[FpML]], [[FIX Protocol]], [[ISO 20022]]\n- [[Derivatives]], [[Financial Instrument]], [[GLEIF]], [[Legal Entity]]\n" },
    { id: "Iso 10962 Cfi", category: "entities", definition: "ISO 10962 Classification of Financial Instruments — a six-character alphabetical code providing a universal, machine-readable [[Taxonomy]] for classifying [[Financial Instrument]]s by asset class and key attributes, published with native [[Linked Data]] representations in JSON-LD, Turtle, and CSV using [[SKOS]].", content: "# ISO 10962 CFI\n\n**Type:** Standard / Classification System\n\n**Definition:** ISO 10962 Classification of Financial Instruments — a six-character alphabetical code providing a universal, machine-readable [[Taxonomy]] for classifying [[Financial Instrument]]s by asset class and key attributes, published with native [[Linked Data]] representations in JSON-LD, Turtle, and CSV using [[SKOS]].\n\n## Overview\n\nThe CFI code (ISO 10962:2021, fourth edition) is a six-character alphabetical code that classifies any financial instrument by its type and key structural attributes, maintained by ISO Technical Committee 68 Subcommittee 4 (Financial Services, Securities) with the Association of National Numbering Agencies (ANNA) as Registration Authority. Where an ISIN (ISO 6166) identifies a specific instrument, and a [[FIGI]] identifies a specific instrument listing, the CFI code answers the structural question: what kind of instrument is this? The first character encodes the asset class category: E (Equities), D (Debt instruments), R (Entitlements/Rights), O (Options), F (Futures), S (Swaps), H (Non-listed and complex listed options), I (Referential instruments), J (Transferable loans), K (Others). Characters 2–6 encode category-specific attribute dimensions — for equities, these are share type, voting rights, ownership restrictions, payment status, and form; for debt, debt type, guarantee type, coupon type, principal repayment structure, and form. An `X` in any attribute position indicates not applicable or not specified.\n\nISO 10962 is one of the few ISO financial standards with native [[Linked Data]] publication. The CFI code list is available in JSON-LD, Turtle (TTL), and CSV. [[SKOS]] (Simple Knowledge Organization System) is the primary [[RDF]] vocabulary: the category/attribute structure maps cleanly to `skos:ConceptScheme`, `skos:Concept`, and `skos:broader`/`skos:narrower` relationships, making CFI codes directly integrable into [[Knowledge Graph]] and [[Ontology]] environments without transformation. This [[SKOS]] representation allows CFI codes to be queried alongside [[FIBO]] instrument classes and [[GLEIF]] entity data in a unified [[SPARQL]] environment.\n\nCFI codes are deeply embedded in trading and regulatory infrastructure. [[FIX Protocol]] tag 461 carries the CFI code as a standard field in all security definition and instrument identification messages — making CFI universal in electronic trading. MiFID II transaction reporting requires CFI codes in ESMA submissions. ANNA maintains CFI codes alongside ISIN codes in the ANNA Database, providing instrument type context for every ISIN. [[FIBO]]'s securities classification hierarchy references CFI categories. [[ISO 20022]] `seev` and `semt` messages include CFI as a standard classification element. Major data vendors including Bloomberg and Refinitiv expose CFI codes as standard instrument attributes.\n\n## Key Components\n\n- **Character 1 (Category):** E (Equities), D (Debt), R (Rights), O (Options), F (Futures), S (Swaps), H (Complex options), I (Referential), J (Transferable loans), K (Others)\n- **Characters 2–6 (Attribute dimensions):** Category-specific encoding; `X` = not applicable\n- **[[SKOS]] representation:** `skos:ConceptScheme`, `skos:Concept`, `skos:broader`/`skos:narrower` hierarchy\n- **[[FIX Protocol]] tag 461:** Primary transport mechanism for CFI codes in execution messages\n- **ANNA DB:** Authoritative registry linking ISIN and CFI for all instruments\n- **MiFID II:** Required in ESMA transaction reports\n- **Fourth edition (2021):** Current authoritative version with expanded coverage\n\n## OWL/RDF Availability\n\nNative [[Linked Data]] publication via [[SKOS]]:\n\n- JSON-LD: available from ANNA / ISO TC68 SC4\n- Turtle (TTL): available from ANNA / ISO TC68 SC4\n- CSV: flat tabular format for bulk processing\n- CFI code browser: https://www.iotafinance.com/en/Classification-of-Financial-Instrument-codes-CFI-ISO-10962-2021.html\n\n## Relationships\n\n- **Maintained by:** ISO TC68 SC4; Registration Authority: ANNA\n- **Aligned with:** [[FIBO]] (securities classification hierarchy references CFI categories)\n- **Carried by:** [[FIX Protocol]] (tag 461), [[ISO 20022]] (`seev`/`semt` messages)\n- **Paired with:** ISIN (ISO 6166) — every ANNA DB ISIN record includes a CFI code\n- **Complements:** [[GLEIF]] LEI (LEI identifies issuers; CFI classifies what they issue), [[FIGI]] (FIGI identifies listings; CFI classifies the instrument type)\n- **Published as:** [[SKOS]] [[Taxonomy]] in [[Linked Data]] formats\n\n## Key URLs\n\n- CFI code browser: https://www.iotafinance.com/en/Classification-of-Financial-Instrument-codes-CFI-ISO-10962-2021.html\n- ANNA (Registration Authority): https://www.anna-web.org/\n- ISO TC68: https://www.iso.org/committee/49650.html\n\n## Sources\n\n- `sources/articles/iso-10962-cfi-classification.md`\n\n## See Also\n\n- [[FIBO]], [[SKOS]], [[Linked Data]], [[Taxonomy]]\n- [[Financial Instrument]], [[Financial Identifier]]\n- [[FIX Protocol]], [[ISO 20022]], [[GLEIF]], [[FIGI]]\n" },
    { id: "Iso 20022", category: "entities", definition: "The international standard for financial industry messaging, providing a common XML-based platform with a formal [[OWL]] DL semantic layer (ISO/TR 22126-2:2025) spanning payments, securities, FX, trade finance, and cards.", content: "# ISO 20022\n\n**Type:** Standard / Ontology\n\n**Definition:** The international standard for financial industry messaging, providing a common XML-based platform with a formal [[OWL]] DL semantic layer (ISO/TR 22126-2:2025) spanning payments, securities, FX, trade finance, and cards.\n\n## Overview\n\nISO 20022 is the global lingua franca for financial messaging, replacing legacy formats such as ISO 15022 and SWIFT MT with a rich, structured data model that carries formal semantic definitions. Unlike earlier tag-based message standards, ISO 20022 messages are built from a shared Business Dictionary and expressed in XML Schema (XSD), with a normative [[OWL]] DL ontology (ISO/TR 22126-2:2025) derived from the UML model via a formal mapping process. The full SWIFT cross-border payments migration to ISO 20022 MX format completed in November 2025, covering all major correspondent banking flows including cover payments, credit transfers, and financial institution transfers.\n\nThe standard spans five financial domains — Payments, Securities, Foreign Exchange, Trade Finance, and Cards — organized into message families identified by four-character business domain codes. Messages are versioned using codes like `pacs.008.001.10` (FI Credit Transfer, version 10). The `pain` family handles payment initiation, `pacs` covers interbank clearing and settlement, `camt` manages cash and account information, `sese` and `seev` handle securities settlement and events, and `reda` carries reference data. An [[RDF]]-based API at `iso20022.plus/api/rdf-2/` enables integration with [[Linked Data]] pipelines, and a community [[OWL]] representation is also available for ontology-based tooling.\n\nISO 20022 intersects with the broader financial [[Ontology]] ecosystem at multiple points. [[FIBO]] legal entity and instrument classes align with ISO 20022 message semantics, enabling mapping for regulatory reporting. [[GLEIF]] LEI codes appear natively in `pacs`, `camt`, and `sese` messages for identifying parties. [[XBRL]] reference data from `reda` messages can populate XBRL entity and instrument metadata. [[FpML]] and ISO 20022 overlap in trade reporting — EMIR Refit regulatory mandates often require both. [[FIX Protocol]] remains dominant for execution while ISO 20022 governs settlement and regulatory messaging, with translation mappings available. [[SPARQL]] queries over the RDF API enable cross-standard semantic analysis.\n\n## Key Components\n\n- **pain (Payment Initiation):** Customer-to-bank payment orders\n- **pacs (Payments Clearing and Settlement):** Interbank credit transfers, including gpi overlay\n- **camt (Cash Management):** Account statements, notifications, balance queries\n- **sese / seev / semt:** Securities settlement instructions, corporate actions, safekeeping\n- **fxtr:** FX trade confirmations and settlements\n- **reda (Reference Data):** Party, security, and account master data\n- **BAH (Business Application Header):** Common envelope for all MX messages\n- **Data Dictionary elements:** `BranchAndFinancialInstitutionIdentification`, `CashAccount`, `FinancialInstrumentIdentification`, `PartyIdentification`, `RemittanceInformation`\n\n## OWL/RDF Availability\n\n- **ISO/TR 22126-2:2025** — normative OWL DL ontology: https://www.iso.org/standard/72483.html\n- Community OWL: https://github.com/taurenshaman/semantic-web/blob/master/data/fadyart.com-finance/iso20022.owl\n- RDF API: https://iso20022.plus/api/rdf-2/\n- Message catalogue: https://www.iso20022.org/iso-20022-message-definitions\n\n## Relationships\n\n- **Built on:** [[OWL]], [[RDF]], [[W3C]] standards; UML source model\n- **Aligned with:** [[FIBO]] (semantic mapping), [[GLEIF]] (LEI party identification), [[XBRL]] (reference data cross-reference)\n- **Complements:** [[FpML]] (OTC derivatives), [[FIX Protocol]] (execution messaging)\n- **Used by:** SWIFT TARGET2, T2S, central bank RTGS systems globally\n\n## Key URLs\n\n- Homepage: https://www.iso20022.org/\n- Data dictionary: https://www.iso20022.org/data-dictionary\n- Registration Authority: https://www.swift.com/standards/iso-20022\n- RDF API: https://iso20022.plus/api/rdf-2/\n\n## Sources\n\n- `sources/articles/iso-20022-universal-financial-messaging.md`\n\n## See Also\n\n- [[RDF]], [[OWL]], [[Ontology]], [[SPARQL]], [[Linked Data]]\n- [[FIBO]], [[FpML]], [[FIX Protocol]], [[XBRL]], [[GLEIF]], [[W3C]], [[Financial Instrument]]\n" },
    { id: "Ontofic", category: "entities", definition: "OntoFiC is an [[OWL]] ontology for financial fraud detection that models transaction types, fraud scenarios, and customer behavioral patterns in banking and payment systems, using [[SWRL]] rules and [[SPARQL]] queries to enable automated detection over transaction data.", content: "# OntoFiC\n\n**Type:** Ontology\n**Venue:** ACM ASONAM 2023\n**URL:** https://dl.acm.org/doi/10.1145/3625007.3631503\n**OWL file:** http://industryportal.enit.fr/ontologies/ONTOFIC\n\n**Definition:** OntoFiC is an [[OWL]] ontology for financial fraud detection that models transaction types, fraud scenarios, and customer behavioral patterns in banking and payment systems, using [[SWRL]] rules and [[SPARQL]] queries to enable automated detection over transaction data.\n\n## Overview\n\nFinancial fraud detection is increasingly a knowledge representation problem. Rule-based systems capture known fraud patterns, but they struggle to generalize when fraudsters combine patterns in novel ways. OntoFiC formalizes fraud knowledge as an [[OWL]] ontology, enabling [[Inference and Reasoning|OWL DL reasoning]] over transaction instances, [[SWRL]] Horn-clause rules for fraud heuristics, and [[SPARQL]] queries that retrieve suspicious transaction subgraphs matching fraud pattern templates.\n\nThe ontology was developed at ACM ASONAM 2023 and is publicly available as an OWL file, making it directly inspectable and extensible. Its class hierarchy covers the full arc from normal transaction behavior through behavioral profiling to named fraud scenario instances. The combination of formal ontology with SWRL rules bridges two traditions in knowledge engineering: the open-world [[OWL]] [[Inference and Reasoning|reasoning]] layer and the closed-world rule layer needed for operational fraud detection.\n\nOntoFiC occupies a different niche from the market surveillance ontology described in the stock market monitoring literature. Where the surveillance ontology focuses on exchange-level market events (wash trading, spoofing), OntoFiC focuses on banking and payment system fraud (money laundering, account takeover) — the two are complementary layers for a comprehensive financial compliance [[Knowledge Graph]].\n\n## Core Classes\n\n| Class | Description |\n|---|---|\n| `SWIFTTransaction` | International wire transfer event modeled as an ontology individual |\n| `FraudScenario` | Named fraud pattern instance (money laundering, account takeover, etc.) |\n| `BehavioralPattern` | Statistical behavioral profile for a customer or account |\n| `LegitimateTransaction` | Baseline normal transaction — the negative class |\n| `FraudulentTransaction` | Transaction classified as fraudulent by rules or reasoning |\n\n## Reasoning Mechanism\n\nOntoFiC's detection logic operates at three layers:\n\n### Layer 1: OWL DL Reasoning\nThe [[OWL]] class hierarchy defines subsumption relationships. `FraudulentTransaction` is disjoint from `LegitimateTransaction`. OWL DL reasoners (HermiT, Pellet) check class consistency and propagate inferences — for example, that any transaction satisfying the axioms of `MoneyLaundering` is automatically classified as `FraudulentTransaction`.\n\n### Layer 2: SWRL Rules\nSWRL (Semantic Web Rule Language) rules encode fraud detection heuristics as Horn clauses. Example pattern:\n\n```\nTransaction(?t) ∧ hasAmount(?t, ?a) ∧ greaterThan(?a, 10000) ∧\nhasCountry(?t, ?c) ∧ isHighRiskCountry(?c, true) →\nFraudScenario(?t)\n```\n\nSWRL rules operate over [[OWL]] individuals, allowing detection logic to cross-reference behavioral profiles, transaction amounts, counterparty jurisdictions, and timing patterns in a single inference step.\n\n### Layer 3: SPARQL Queries\n[[SPARQL]] queries retrieve suspicious transaction subgraphs matching named fraud pattern templates. This allows investigators to pull all transactions matching a specific `FraudScenario` type, ordered by risk score, for review. [[SHACL]] shapes can additionally validate that transaction data conforms to the expected structure before reasoning is applied.\n\n## Comparison to [[FinDKG]] and Market Surveillance\n\n| Dimension | OntoFiC | Market Surveillance Ontology | [[FinDKG]] |\n|---|---|---|---|\n| Domain | Banking / payments | Exchange trading | Financial news |\n| Fraud patterns | Money laundering, account takeover | Wash trading, spoofing, insider trading | N/A (not fraud-focused) |\n| Reasoning | OWL + SWRL | Ontology axioms + rules | Temporal link prediction |\n| Data source | Transaction logs | Trade and order records | News text |\n\n## Extensibility\n\nOntoFiC is designed to be extended. New `FraudScenario` subclasses can be added for emerging patterns without restructuring the core hierarchy. New SWRL rules can encode novel detection heuristics. The behavioral pattern classes can be populated from external statistical models and linked back to ontology individuals, bridging machine learning outputs with formal [[Inference and Reasoning|reasoning]].\n\nThe [[FIBO]] alignment opportunity exists: `SWIFTTransaction` aligns naturally with FIBO's financial transaction classes, and `FraudulentTransaction` could be linked to FIBO's regulatory and compliance modules.\n\n## Key URLs\n\n- ACM DL: https://dl.acm.org/doi/10.1145/3625007.3631503\n- OWL file: http://industryportal.enit.fr/ontologies/ONTOFIC\n\n## Sources\n\n- `sources/papers/ontofic-financial-fraud-ontology.md`\n\n## See Also\n\n- [[OWL]], [[Ontology]], [[SPARQL]], [[Inference and Reasoning]], [[SHACL]]\n- [[Financial Knowledge Graph]], [[FIBO]]\n- [[FinDKG]], [[FinReflectKG]]\n" },
    { id: "Permid", category: "entities", definition: "LSEG PermID is an open financial entity identifier service that assigns stable, dereferenceable [[URI and IRI|URIs]] to organizations, instruments, quotes, funds, persons, and asset classes, publishing weekly [[RDF]] bulk files under CC-BY 4.0 with [[FIBO]] corporate entity alignment.", content: "# LSEG PermID\n\n**Type:** Identifier Service / Linked Data Dataset\n**Operator:** LSEG (London Stock Exchange Group, formerly Refinitiv)\n**License:** CC-BY 4.0\n**Service URL:** https://permid.org/\n\n**Definition:** LSEG PermID is an open financial entity identifier service that assigns stable, dereferenceable [[URI and IRI|URIs]] to organizations, instruments, quotes, funds, persons, and asset classes, publishing weekly [[RDF]] bulk files under CC-BY 4.0 with [[FIBO]] corporate entity alignment.\n\n## Overview\n\nPersistent, globally unique identifiers are a prerequisite for building an interoperable [[Financial Knowledge Graph]]. Without them, \"Apple Inc.\" in one dataset cannot be reliably linked to \"Apple\" in another. PermID solves this problem for financial entities by issuing permanent, HTTP-dereferenceable [[URI and IRI|URIs]] — identifiers that not only uniquely name an entity but also resolve to a machine-readable description when retrieved.\n\nPermID is operated by LSEG (London Stock Exchange Group), which acquired Refinitiv in 2021. The service covers millions of financial entities across seven entity types and is updated weekly via bulk [[RDF]] file releases. The CC-BY 4.0 license permits unrestricted reuse with attribution, making PermID one of the few large-scale, commercially-backed financial [[Linked Data]] datasets available for open use.\n\nThe [[FIBO]] alignment is particularly significant. PermID's corporate entity model reuses FIBO's Business Entities module for its Organization type hierarchy, meaning that PermID organizations can be directly joined with FIBO-aligned data from [[FinKario]], [[FinReflectKG]], and other FIBO-grounded sources without schema translation.\n\n## Entity Types\n\n| Type | Description | Example |\n|---|---|---|\n| Organization | Companies, banks, government bodies, exchanges | Apple Inc., Goldman Sachs, NYSE |\n| Instrument | Securities — equities, bonds, derivatives | Apple common stock (AAPL) |\n| Quote | Exchange-specific trading quote for an instrument | AAPL on NASDAQ |\n| Fund | Investment funds and ETFs | Vanguard S&P 500 ETF |\n| Person | Executives, directors, key personnel | Tim Cook |\n| AssetClass | Equity, fixed income, commodity, currency | Equity, Fixed Income |\n| Currency | ISO 4217 currencies | USD, EUR, JPY |\n\n## Key Characteristics\n\n### Stable URIs\n\nPermID URIs follow the pattern `https://permid.org/1-<identifier>`. These are:\n\n- **Permanent:** Once issued, a PermID URI is never reassigned or deleted\n- **Dereferenceable:** HTTP GET on a PermID URI returns a machine-readable [[RDF]] description (content negotiation supported)\n- **Globally unique:** No two entities share the same PermID, regardless of jurisdiction or asset class\n\nStable URIs enable [[Linked Data]] integration: a [[Financial Knowledge Graph]] that uses PermID URIs as canonical node identifiers can immediately link to any other dataset that references the same PermIDs.\n\n### Cross-Identifier Links\n\nEach Organization record links to:\n\n- **LEI** ([[GLEIF]] Legal Entity Identifier) — the ISO 17442 standard for legal entity identification\n- **ISIN** — International Securities Identification Number for instruments\n- **Ticker symbol** — exchange-specific trading symbol\n- **MIC** — Market Identifier Code for exchange identification\n\nThese cross-links make PermID a hub identifier in the [[Financial Identifier]] ecosystem. A single PermID lookup provides a normalized bridge to ISIN, LEI, and ticker — identifiers that appear in different source systems and data vendors.\n\n### Weekly RDF Bulk Files\n\nLSEG publishes full RDF dumps of
