<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ontology Wiki — Knowledge Graph</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@400;600;700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0d1117;
    --surface:   #161b22;
    --border:    #21262d;
    --border2:   #30363d;
    --text:      #e6edf3;
    --muted:     #8b949e;
    --blue:      #58a6ff;
    --green:     #3fb950;
    --amber:     #d29922;
    --coral:     #f78166;
    --blue-dim:  rgba(88,166,255,0.15);
    --green-dim: rgba(63,185,80,0.15);
    --amber-dim: rgba(210,153,34,0.15);
    --coral-dim: rgba(247,129,102,0.15);
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    overflow: hidden;
  }

  /* ── Title bar ── */
  #title-bar {
    position: fixed;
    top: 0; left: 50%; transform: translateX(-50%);
    z-index: 100;
    padding: 14px 28px;
    display: flex;
    align-items: center;
    gap: 12px;
    pointer-events: none;
  }
  #title-bar h1 {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text);
    opacity: 0.9;
  }
  #title-bar .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--blue);
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.4; transform: scale(0.7); }
  }

  /* ── Search ── */
  #search-wrap {
    position: fixed;
    top: 14px; left: 16px;
    z-index: 200;
    display: flex;
    align-items: center;
    gap: 0;
  }
  #search {
    width: 220px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px 8px 36px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  #search::placeholder { color: var(--muted); }
  #search:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(88,166,255,0.15);
  }
  #search-icon {
    position: absolute;
    left: 10px;
    color: var(--muted);
    font-size: 13px;
    pointer-events: none;
  }
  #search-results {
    position: fixed;
    top: 50px; left: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    min-width: 220px;
    z-index: 300;
    display: none;
    overflow: hidden;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }
  .search-result-item {
    padding: 8px 14px;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text);
    transition: background 0.15s;
  }
  .search-result-item:hover { background: var(--border); }
  .search-result-item .cat-dot {
    width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
  }

  /* ── Stats ── */
  #stats {
    position: fixed;
    top: 14px; right: 16px;
    z-index: 100;
    display: flex;
    gap: 6px;
  }
  .stat-pill {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .stat-pill strong { color: var(--text); font-weight: 600; }

  /* ── Legend ── */
  #legend {
    position: fixed;
    bottom: 16px; right: 16px;
    z-index: 100;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    min-width: 160px;
  }
  #legend h3 {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 9px;
    margin-bottom: 7px;
    font-size: 12px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
  }
  .legend-item:last-child { margin-bottom: 0; }
  .legend-dot {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  }

  /* ── Detail sidebar ── */
  #sidebar {
    position: fixed;
    top: 0; right: 0;
    width: 420px; height: 100%;
    background: var(--surface);
    border-left: 1px solid var(--border);
    z-index: 150;
    transform: translateX(100%);
    transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
    overflow-y: auto;
    padding: 0;
  }
  #sidebar.open { transform: translateX(0); }
  #sidebar-inner { padding: 20px; }
  #sidebar-close {
    position: sticky;
    top: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 1;
  }
  #sidebar-close button {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    transition: color 0.15s, border-color 0.15s;
  }
  #sidebar-close button:hover { color: var(--text); border-color: var(--border2); }
  #sidebar-title {
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
  }
  .sidebar-category {
    display: inline-block;
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 3px;
    margin-bottom: 14px;
    margin-top: 4px;
  }
  .sidebar-section {
    margin-bottom: 18px;
  }
  .sidebar-section h4 {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 6px;
  }
  .sidebar-section p {
    font-size: 13px;
    color: var(--text);
    line-height: 1.65;
    opacity: 0.85;
  }
  .conn-chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 3px 8px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text);
    margin: 3px 3px 3px 0;
  }
  .conn-chip .chip-dot { width: 6px; height: 6px; border-radius: 50%; }

  /* ── Sidebar markdown content ── */
  .sidebar-content { margin-bottom: 16px; }
  .sidebar-content h4.md-h2 {
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    margin: 18px 0 8px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--border);
    text-transform: none;
    letter-spacing: normal;
  }
  .sidebar-content h5 {
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    margin: 14px 0 6px;
  }
  .sidebar-content h6 {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    margin: 10px 0 4px;
  }
  .sidebar-content p {
    font-size: 13px;
    color: var(--text);
    line-height: 1.65;
    opacity: 0.85;
    margin-bottom: 8px;
  }
  .sidebar-content strong { color: var(--text); opacity: 1; }
  .sidebar-content em { font-style: italic; opacity: 0.9; }
  .sidebar-content ul {
    list-style: disc;
    padding-left: 18px;
    margin-bottom: 10px;
  }
  .sidebar-content li {
    font-size: 13px;
    line-height: 1.6;
    color: var(--text);
    opacity: 0.85;
    margin-bottom: 4px;
  }
  .sidebar-content code {
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 1px 5px;
    border-radius: 3px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--blue);
  }
  .sidebar-content pre {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px;
    overflow-x: auto;
    margin-bottom: 10px;
  }
  .sidebar-content pre code {
    border: none;
    padding: 0;
    background: none;
    font-size: 11px;
    color: var(--text);
  }
  .sidebar-content table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 12px;
    font-size: 12px;
  }
  .sidebar-content td {
    border: 1px solid var(--border);
    padding: 5px 8px;
    color: var(--text);
    opacity: 0.85;
  }
  .sidebar-content tr:first-child td {
    font-weight: 600;
    background: var(--bg);
    color: var(--text);
    opacity: 1;
  }
  .sidebar-content hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 16px 0;
  }
  .wiki-link {
    color: var(--blue);
    text-decoration: none;
    border-bottom: 1px dotted var(--blue);
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .wiki-link:hover { opacity: 0.7; }

  /* ── SVG / graph canvas ── */
  #graph-canvas { width: 100%; height: 100%; display: block; }

  .node-label {
    fill: #e6edf3;
    font-family: 'JetBrains Mono', monospace;
    pointer-events: none;
    text-shadow: 0 1px 4px #0d1117, 0 0 8px #0d1117;
    paint-order: stroke fill;
    stroke: #0d1117;
    stroke-width: 3px;
    dominant-baseline: middle;
  }

  .link { stroke-linecap: round; }

  .tooltip {
    position: fixed;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    pointer-events: none;
    z-index: 500;
    opacity: 0;
    transition: opacity 0.15s;
    max-width: 200px;
  }
  .tooltip.visible { opacity: 1; }
  .tooltip strong { display: block; color: var(--text); margin-bottom: 3px; font-size: 13px; }
  .tooltip span { color: var(--muted); }

  /* ── Zoom controls ── */
  #zoom-controls {
    position: fixed;
    bottom: 16px; left: 16px;
    z-index: 100;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .zoom-btn {
    width: 32px; height: 32px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, border-color 0.15s;
    font-family: monospace;
  }
  .zoom-btn:hover { background: var(--border); border-color: var(--border2); }
</style>

<script>
// ═══════════════════════════════════════════════════════════════════
// EMBEDDED GRAPH DATA
// Extracted from wiki/ markdown files — nodes + edges from [[wikilinks]]
// ═══════════════════════════════════════════════════════════════════
const GRAPH_DATA = {
  nodes: [
    // ── concepts ──
    { id: "Class and Property", category: "concepts", definition: "The fundamental building blocks of [[Ontology|ontologies]] — classes define sets of individuals sharing common characteristics, and properties define relationships between those individuals or between individuals and data values.", content: "# Classes and Properties\n\n**Definition:** The fundamental building blocks of [[Ontology|ontologies]] — classes define sets of individuals sharing common characteristics, and properties define relationships between those individuals or between individuals and data values.\n\n**Also known as:** Concepts and roles (in [[Description Logic]] terminology); types and predicates; RDFS classes and properties.\n\n## Overview\n\nEvery [[Ontology]] is ultimately built from two kinds of things: **classes** and **properties**. Classes (also called *concepts* in [[Description Logic]]) define the categories of the domain — `Person`, `Organisation`, `Document`, `Disease`. Properties (called *roles* in DL) define how instances of those classes relate to each other or to literal values — `worksFor`, `hasTitle`, `diagnosedWith`. Together, classes and properties constitute the TBox of a [[Description Logic]] knowledge base: the schema layer that gives meaning to the [[Triple|triples]] in an [[RDF]] graph.\n\nIn [[RDFS]], classes are instances of `rdfs:Class` and properties are instances of `rdf:Property`. [[OWL]] refines this with `owl:Class` and adds two specialised property types: `owl:ObjectProperty` (relating individuals to individuals) and `owl:DatatypeProperty` (relating individuals to data values such as strings, integers, or dates). A third type, `owl:AnnotationProperty`, carries metadata (labels, comments, provenance) without formal semantic consequences. Understanding this distinction is essential when writing [[SPARQL]] queries, because object properties and datatype properties pattern-match differently in [[Triple]] structure.\n\nClass hierarchies, property hierarchies, and the restrictions that connect them are what give an [[Ontology]] its expressive power. A class can be defined *intensionally* — by necessary and sufficient conditions — or *extensionally* — by enumeration of its members. [[OWL]] supports both via equivalence axioms and `owl:oneOf`. Property restrictions (`owl:someValuesFrom`, `owl:allValuesFrom`, `owl:hasValue`, `owl:cardinality`) further constrain what it means to be a member of a class, enabling an [[Inference and Reasoning|inference engine]] to classify individuals automatically based on their asserted facts rather than requiring explicit type declarations.\n\n## Key Properties\n\n- **`owl:Class`** — A set of individuals; defined by axioms in the [[Ontology]] TBox\n- **`owl:ObjectProperty`** — A binary relation between two individuals (nodes in the [[RDF]] graph)\n- **`owl:DatatypeProperty`** — A relation from an individual to a literal value (string, integer, date, etc.)\n- **`owl:AnnotationProperty`** — Metadata carrier; no [[Inference and Reasoning]] consequences\n- **`rdfs:subClassOf`** — Declares a class as a specialisation of another; the basis of [[Taxonomy|taxonomic]] hierarchies\n- **`rdfs:subPropertyOf`** — Declares a property as a specialisation of another\n- **`rdfs:domain`** and **`rdfs:range`** — Constrain the subject and object types of a property\n- **`owl:equivalentClass`** — States two class expressions denote exactly the same set of individuals\n- **`owl:disjointWith`** — States two classes share no instances — a fact no [[Triple]] can assert but a reasoner can exploit\n- **`owl:inverseOf`** — Links two properties as inverses (if `a worksFor b` then `b employs a`)\n- **Class restrictions:** `owl:someValuesFrom`, `owl:allValuesFrom`, `owl:hasValue`, `owl:minCardinality`, `owl:maxCardinality`, `owl:exactCardinality`\n\n## Object Properties vs Datatype Properties\n\n| Aspect | Object Property | Datatype Property |\n|---|---|---|\n| Range | An [[OWL]] class (individuals) | An XML Schema datatype or `rdfs:Literal` |\n| [[Triple]] object | A [[URI and IRI\\|URI]] or blank node | A literal (e.g. `\"Alice\"`, `42`, `2024-01-01`) |\n| Can have inverse | Yes (`owl:inverseOf`) | No |\n| Reasoning | Full role reasoning in [[Description Logic]] | Limited; often treated as annotation |\n| Example | `ex:worksFor ex:Organisation` | `ex:age xsd:integer` |\n\n## Class Hierarchy and Instances\n\nA class hierarchy is a directed acyclic graph of `rdfs:subClassOf` links forming a [[Taxonomy]]-like structure. At the bottom of every hierarchy is `owl:Nothing` (the empty class) and at the top is `owl:Thing` (the class of all individuals). [[Inference and Reasoning]] engines classify newly defined classes into the correct position in this hierarchy automatically via subsumption reasoning — this is called *classification* and is one of the core reasoning services of any [[Description Logic]] reasoner.\n\nInstances (also called *individuals* or *members*) belong to classes via `rdf:type` assertions, expressed in [[RDF]] as `ex:alice rdf:type ex:Person`. A single individual can belong to multiple classes simultaneously — [[OWL]] uses the open-world assumption, so being a `Person` does not prevent also being a `Researcher`. Reasoners can infer additional class memberships from defined class axioms, which is why [[OWL]] ontologies distinguish between *asserted* and *inferred* class memberships.\n\n## Restrictions in OWL Manchester Syntax\n\nManchester syntax is a readable notation for [[OWL]] axioms used in tools like Protégé. It expresses class definitions and [[Description Logic]] concept constructors in a natural-language style.\n\n```manchester\n# Necessary condition (subclass only)\nDog SubClassOf: Animal\n\n# Necessary and sufficient (defined class)\nParent EquivalentTo: Person and (hasChild some Person)\n\n# Universal restriction\nVeganDiet EquivalentTo: Diet and (contains only PlantBasedFood)\n\n# Cardinality restriction\nMonogamousRelationship SubClassOf: hasPartner exactly 1 Person\n\n# Enumeration (nominal)\nPrimaryColour EquivalentTo: {Red, Blue, Yellow}\n\n# Disjointness\nCat DisjointWith: Dog\n\n# Inverse property\nisOwnedBy InverseOf: owns\n```\n\nThese axioms live in the TBox. When an [[Inference and Reasoning]] engine encounters an individual asserted as `hasChild some ex:bob`, it will classify that individual as a `Parent` without requiring an explicit `rdf:type Parent` [[Triple]].\n\n## Relationships in an RDF Triple\n\nEvery [[Triple]] `(subject, predicate, object)` in an [[RDF]] graph uses a property as its predicate. Object properties produce triples where object is a [[URI and IRI|URI]], creating graph edges between nodes. Datatype properties produce triples where object is a literal, creating attribute values on nodes. [[SPARQL]] queries exploit both forms using the same triple pattern syntax.\n\n```turtle\n# Object property triple\nex:alice ex:worksFor ex:AcmeCorp .\n\n# Datatype property triple\nex:alice ex:name \"Alice Smith\"^^xsd:string ;\n         ex:birthYear 1990^^xsd:integer .\n```\n\n[[SHACL]] shapes can constrain both types of property — requiring that an object property points to an instance of a specific class, or that a datatype property has a value in a given range — independently of any [[OWL]] [[Inference and Reasoning]].\n\n## Relationships\n\n- **Is-a:** Core modelling primitives of [[Ontology|ontologies]] and [[Knowledge Graph|knowledge graphs]]\n- **Has-part:** `owl:Class`, `owl:ObjectProperty`, `owl:DatatypeProperty`, class restrictions, property characteristics\n- **Related:** [[Ontology]], [[OWL]], [[RDFS]], [[RDF]], [[Triple]], [[Description Logic]], [[Taxonomy]], [[Inference and Reasoning]], [[SHACL]]\n- **Used-by:** [[SPARQL]] (queries traverse properties and filter by class); [[SHACL]] (validates property values); [[Inference and Reasoning]] engines (classify individuals and compute entailments); ontology editors (Protégé, TopBraid)\n\n## Sources\n\n- [needs-source]\n\n## See Also\n\n- [[Ontology]]\n- [[OWL]]\n- [[RDFS]]\n- [[RDF]]\n- [[Triple]]\n- [[Description Logic]]\n- [[Taxonomy]]\n- [[Inference and Reasoning]]\n- [[SHACL]]\n- [[SPARQL]]\n" },
    { id: "Derivatives", category: "concepts", definition: "[[Financial Instrument]]s whose value derives from an underlying asset, rate, or index, modeled in [[FIBO]]'s DER domain module and formalized through standards such as FpML and ISDA CDM.", content: "# Derivatives\n\n**Definition:** [[Financial Instrument]]s whose value derives from an underlying asset, rate, or index, modeled in [[FIBO]]'s DER domain module and formalized through standards such as FpML and ISDA CDM.\n\n**Also known as:** Derivative instruments, derivative contracts, contingent claims.\n\n## Overview\n\nDerivatives are among the most ontologically complex [[Financial Instrument]]s because their value and behavior are defined relationally — a derivative is only meaningful in reference to its underlying (an equity, bond, commodity, rate, or index) and the contractual terms governing payoff. In [[FIBO]], the DER module captures this through a class hierarchy rooted at `Derivative`, with named subclasses for `Option`, `Future`, `Swap`, and `Forward`, each carrying [[OWL]] restrictions that encode the essential definitional properties: an option must have a strike price and expiry; a swap must specify payment legs and a reference rate.\n\nThe broader standards landscape for derivatives includes two major complementary systems. **FpML** (Financial products Markup Language) is an XML schema for representing over-the-counter derivative trade terms — interest rate swaps, credit default swaps, equity options — and has been the operational standard for OTC confirmation and reporting since the early 2000s. **ISDA CDM** (Common Domain Model) is a more recent initiative by the International Swaps and Derivatives Association that provides a canonical, machine-executable model of derivative trade events and their lifecycle — novation, termination, reset — expressed in a technology-neutral format. [[FIBO]] serves as the reference data layer beneath CDM, providing the [[Legal Entity]], [[Financial Instrument]], and [[Market Data]] definitions that CDM events reference.\n\nFrom a [[Knowledge Graph]] perspective, derivatives require careful attention to temporal structure. An OTC derivative is a bilateral contract whose terms evolve through lifecycle events (amendments, partial terminations, resets). [[FinDKG]] and similar temporal knowledge graphs demonstrate how to represent these evolving relationships as timestamped [[Triple]]s, while [[FIBO]]'s BP (Business Process) module provides the event scaffolding for lifecycle modeling. [[SPARQL]] queries can traverse from a derivative instrument to its underlying, issuing parties, and associated market data — enabling holistic risk and compliance analysis.\n\n## Key Properties\n\n- `hasUnderlying` — links to the underlying [[Financial Instrument]], rate, or index\n- `hasStrikePrice` — for options: the agreed exercise price\n- `hasExpirationDate` — for options and futures: contract termination date\n- `hasPaymentLeg` — for swaps: fixed or floating payment stream definition\n- `isSubjectToMasterAgreement` — links to ISDA master agreement [[Legal Entity]] references\n- `hasCFICode` — [[ISO 10962 CFI]] category O (options), F (futures), S (swaps)\n\n## Relationships\n\n- **Is-a:** [[Financial Instrument]]\n- **Has-part:** Options, futures, swaps, forwards, structured notes\n- **Related:** [[Securities]], FpML, ISDA CDM, [[FIBO]], [[Class and Property]], [[Market Data]]\n- **Used-by:** Risk management systems, trade repositories (DTCC, DTCC), clearinghouses, regulatory reporting (EMIR, Dodd-Frank)\n\n## Examples\n\n- A vanilla interest rate swap modeled in FIBO DER with fixed leg at 3.5% and floating leg referencing SOFR\n- An equity call option: `fibo-der-drc-opt:VanillaOption` with `hasUnderlying` pointing to an Apple stock [[Financial Instrument]] node\n- A credit default swap referencing a corporate bond as the reference obligation, with ISDA CDM lifecycle events for credit event determination\n\n## Sources\n\n- `sources/articles/fibo-financial-industry-business-ontology.md`\n- `sources/articles/iso-10962-cfi-classification.md`\n- `sources/papers/findkg-dynamic-knowledge-graph.md`\n\n## See Also\n\n- [[Financial Instrument]], [[FIBO]], [[FpML]], [[ISDA CDM]], [[Securities]]\n- [[Ontology]], [[Class and Property]], [[Market Data]], [[Financial Ontology]]\n" },
    { id: "Description Logic", category: "concepts", definition: "A family of formal knowledge representation languages used to describe and reason about the concepts, roles, and individuals of a domain, forming the logical foundation of [[OWL]].", content: "# Description Logics\n\n**Definition:** A family of formal knowledge representation languages used to describe and reason about the concepts, roles, and individuals of a domain, forming the logical foundation of [[OWL]].\n\n**Also known as:** DL, Description Logic, Terminological Logics, Concept Languages.\n\n## Overview\n\nDescription Logics (DLs) are a family of decidable fragments of first-order predicate logic designed specifically for representing structured knowledge. They were developed in the 1980s and 1990s as a formal, computationally tractable alternative to full first-order logic for [[Ontology]] modelling. Every major [[OWL]] species maps directly to a DL: [[OWL]] 2 DL corresponds to the logic SROIQ(D), while OWL EL, QL, and RL correspond to simpler DL profiles. Understanding DLs explains *why* [[OWL]] has the expressivity it does and *why* certain constructs are prohibited.\n\nA DL knowledge base has two separable components. The **TBox** (Terminological Box) contains general statements about classes and [[Class and Property|properties]] — axioms like \"every Dog is a Mammal\" or \"the owner of a pet is a Person\". These are the schema-level facts analogous to what [[RDFS]] and [[OWL]] class axioms express. The **ABox** (Assertional Box) contains ground-level facts about named individuals — \"Fido is a Dog\" or \"Fido is owned by Alice\" — corresponding to instance data in an [[RDF]] graph.\n\n[[Inference and Reasoning]] in DLs is performed by a **reasoner** — a software component that checks consistency, computes concept satisfiability, and classifies the [[Ontology]] hierarchy. Reasoners implement algorithms (most notably the **tableau algorithm**) that search for a model satisfying the knowledge base. Because DLs are decidable, reasoners are guaranteed to terminate, which is a key advantage over full first-order logic. The expressivity-tractability trade-off is the central design axis of the DL family: more expressive logics can represent richer knowledge but require more expensive reasoning algorithms.\n\n## Key Properties\n\n- **TBox axioms:** General class inclusions (`C ⊑ D`), equivalences (`C ≡ D`), and disjointness (`C ⊑ ¬D`)\n- **ABox assertions:** Individual membership (`a : C`) and role assertions (`(a, b) : R`)\n- **Constructors (vary by logic):** conjunction (`⊓`), disjunction (`⊔`), negation (`¬`), existential restriction (`∃R.C`), universal restriction (`∀R.C`), number restrictions (`≥ n R`, `≤ n R`)\n- **Reasoning tasks:** concept satisfiability, subsumption (`C ⊑ D?`), consistency, instance checking, realisation\n- **Decidability:** all standard DLs have decision procedures, unlike full FOL\n- **Open-world assumption:** consistent with [[Inference and Reasoning]] in [[OWL]]; absence of a fact does not imply its negation\n\n## DL Language Hierarchy\n\nDLs are named using letter codes that indicate which constructors are available. The hierarchy from least to most expressive:\n\n| Logic | Key Features | [[OWL]] Mapping |\n|---|---|---|\n| **AL** | Atomic negation, universal restriction | Base language |\n| **ALC** | Full negation, disjunction | Roughly OWL Lite core |\n| **SHIQ** | Role hierarchy (S), transitive roles (H), inverse roles (I), qualified number restrictions (Q) | OWL DL predecessor |\n| **SHOIN(D)** | + nominals (O), concrete domains (D) | OWL 1 DL |\n| **SROIQ(D)** | + role chains (R), reflexivity/irreflexivity, disjoint roles | [[OWL]] 2 DL |\n\nThe letters encode specific constructor sets: **S** = ALC with transitive roles, **H** = role hierarchy, **R** = complex role inclusions, **O** = nominals (enumerated classes), **I** = inverse roles, **Q** = qualified cardinality restrictions, **D** = concrete datatypes.\n\n## DL Syntax Notation\n\nDL has its own compact notation distinct from [[OWL]] Manchester syntax or [[RDF]] Turtle:\n\n```\n# Concept inclusion (TBox)\nDog ⊑ Animal                      -- every Dog is an Animal\nDog ⊑ ¬Cat                        -- Dogs and Cats are disjoint\nParent ≡ ∃hasChild.Person          -- A Parent is someone who has a child\n\n# Qualified cardinality restriction\n∃hasChild.⊤ ⊑ Parent              -- anything with a child is a Parent\nPerson ⊑ ≤1 hasBiologicalMother.Person  -- at most one biological mother\n\n# ABox assertions\nDog(fido)                          -- fido is a Dog\nhasOwner(fido, alice)              -- fido is owned by alice\nPerson(alice)                      -- alice is a Person\n```\n\nThese axioms correspond to [[OWL]] class axioms and [[Class and Property|property]] restrictions, but the DL notation makes the logical structure explicit in a way that [[RDFS]] or Manchester syntax can obscure.\n\n## TBox and ABox in Practice\n\nIn a running [[Ontology]], the TBox is usually defined once by ontology engineers — it captures the domain's conceptual structure. The ABox grows dynamically as instance data is loaded. A DL reasoner performs **classification** over the TBox (ordering all classes by subsumption) and **realisation** over the ABox (assigning each individual to its most specific classes). This separation also matters for [[Inference and Reasoning]] performance: TBox reasoning can be pre-computed and cached, while ABox queries are answered incrementally.\n\nWhen combined with [[RDFS]] vocabularies in an [[OWL]] knowledge base, the TBox corresponds to the class/property definitions in the schema graph, and the ABox corresponds to the data graph of [[Triple|triples]] about individuals. [[SPARQL]] queries against such a knowledge base may activate entailment regimes that invoke a DL reasoner before returning results.\n\n## Reasoner Implementations\n\n- **HermiT** — tableau-based OWL 2 DL reasoner; highly expressive, used in Protégé\n- **Pellet** — OWL 2 DL reasoner with explanation support; SPARQL-DL query answering\n- **FaCT++** — tableau reasoner for SROIQ(D); historically influential\n- **ELK** — optimised for OWL EL profile (polynomial-time reasoning); scales to very large [[Ontology|ontologies]] such as SNOMED CT\n- **Openllet** — maintained fork of Pellet\n\n## Relationships\n\n- **Is-a:** Fragment of first-order logic; formal foundation for [[Ontology]] languages\n- **Has-part:** TBox, ABox, concept constructors, role constructors, reasoning procedures\n- **Related:** [[OWL]], [[Ontology]], [[Class and Property]], [[Inference and Reasoning]], [[RDFS]]\n- **Used-by:** [[OWL]] specification; automated reasoners; [[Ontology]] design tools (Protégé); biomedical ontologies (SNOMED CT, Gene Ontology)\n\n## Sources\n\n- [needs-source]\n\n## See Also\n\n- [[OWL]]\n- [[Ontology]]\n- [[Inference and Reasoning]]\n- [[Class and Property]]\n- [[RDFS]]\n- [[RDF]]\n- [[Triple]]\n- [[SPARQL]]\n" },
    { id: "Financial Identifier", category: "concepts", definition: "A standardized code assigned to a [[Financial Instrument]], [[Legal Entity]], or trading venue to enable unambiguous identification across systems, jurisdictions, and time — serving as the [[URI and IRI]] anchor in financial [[Knowledge Graph]]s.", content: "# Financial Identifier\n\n**Definition:** A standardized code assigned to a [[Financial Instrument]], [[Legal Entity]], or trading venue to enable unambiguous identification across systems, jurisdictions, and time — serving as the [[URI and IRI]] anchor in financial [[Knowledge Graph]]s.\n\n**Also known as:** Security identifier, instrument code, reference identifier.\n\n## Overview\n\nFinancial identifiers are the glue between operational data systems and ontological representations. Every node in a [[Financial Knowledge Graph]] that represents a real-world financial object — a bond, a company, an exchange — must be linked to one or more authoritative identifier systems to enable federation with external datasets, regulatory reporting, and cross-system data integration. The major identifier families cover three target entity types: instruments, entities, and venues.\n\nFor instruments, the primary identifiers are ISIN (ISO 6166 — 12-character global security identifier), CUSIP (ANSI X9.6 — 9-character North American code), SEDOL (7-character London Stock Exchange code), and [[FIGI]] (ANSI X9.145 — 12-character open identifier covering all asset classes). These systems are partially overlapping but not redundant: ISIN identifies a security globally but is exchange-agnostic, while [[FIGI]] assigns separate codes to each listing venue for the same instrument, providing granularity that ISIN cannot. For [[Legal Entity]] identification, the LEI (ISO 17442, maintained by [[GLEIF]]) is the global standard — a 20-character code that uniquely identifies any organization participating in financial transactions. For trading venues, the MIC (ISO 10383) is a 4-character code used throughout [[FIBO]] and regulatory reporting to identify exchanges, MTFs, and dark pools.\n\nIn ontology and [[Linked Data]] contexts, financial identifiers are represented as datatype properties on instrument or entity nodes, or as typed [[URI and IRI]] identifiers that enable `owl:sameAs` federation with Wikidata (P946 for ISIN, P1278 for LEI, P3950 for [[FIGI]]), DBpedia (`dbo:isin`), and PermID. The [[Triple]] pattern `<instrument_uri> hasISIN \"US0378331005\"^^xsd:string` grounds an ontological individual in the operational identifier space, making it resolvable across systems via [[SPARQL]] federation. [[SKOS]] is used by bodies such as ANNA to publish identifier code lists as linked-data concept schemes.\n\n## Key Properties\n\n- ISIN (ISO 6166): 2-char country + 9-char national ID + 1 check digit\n- CUSIP (ANSI X9.6): 9 characters, US/Canadian scope\n- SEDOL: 7 characters, UK/Irish scope, London Stock Exchange\n- MIC (ISO 10383): 4 characters, trading venues\n- LEI (ISO 17442): 20 characters, [[Legal Entity]] identification\n- [[FIGI]] (ANSI X9.145): 12 characters, all asset classes, open data\n\n## Relationships\n\n- **Is-a:** Reference data, controlled vocabulary term\n- **Has-part:** Instrument identifiers (ISIN, CUSIP, SEDOL, [[FIGI]]), entity identifiers (LEI), venue identifiers (MIC)\n- **Related:** [[URI and IRI]], [[Linked Data]], [[FIGI]], [[GLEIF]], [[FIBO]], [[Triple]]\n- **Used-by:** Trading systems, regulatory reporting, [[Knowledge Graph]] node identification, Wikidata federation\n\n## Examples\n\n- Apple Inc. common stock: ISIN `US0378331005`, CUSIP `037833100`, FIGI `BBG000B9XRY4`, MIC `XNAS`\n- Goldman Sachs: LEI `784F5XWPLTWKTBV3E584`, Wikidata Q193326, linked via `owl:sameAs`\n- NYSE exchange: MIC `XNYS`, referenced in FIBO as `fibo-fbc-fi-fi:NewYorkStockExchange`\n\n## Sources\n\n- `sources/web-clips/financial-identifier-standards.md`\n- `sources/articles/figi-financial-instrument-identifier.md`\n- `sources/articles/gleif-legal-entity-identifier.md`\n- `sources/articles/iso-10962-cfi-classification.md`\n\n## See Also\n\n- [[URI and IRI]], [[FIGI]], [[GLEIF]], [[FIBO]], [[Linked Data]]\n- [[Financial Instrument]], [[Legal Entity]], [[ISO 10962 CFI]], [[Triple]], [[SKOS]]\n" },
    { id: "Financial Instrument", category: "concepts", definition: "Any contract or asset that can be traded, transferred, or used to raise or deploy capital, modeled in ontologies as a class hierarchy with typed properties and formal identifier linkages.", content: "# Financial Instrument\n\n**Definition:** Any contract or asset that can be traded, transferred, or used to raise or deploy capital, modeled in ontologies as a class hierarchy with typed properties and formal identifier linkages.\n\n**Also known as:** Tradeable asset, financial asset, instrument.\n\n## Overview\n\nIn ontology terms, a financial instrument is a [[Class and Property]] construct that anchors one of the richest class hierarchies in the financial domain. [[FIBO]]'s root class `FinancialInstrument` sits at the top of a deep subsumption tree: beneath it lie [[Securities]] (equities, bonds, funds), [[Derivatives]] (options, futures, swaps, forwards), loans, commodities, and currencies. Each subclass is defined with [[OWL]] restrictions that constrain which properties apply — for example, a bond must have a maturity date and a coupon type, while an equity must reference an issuing [[Legal Entity]].\n\nModeling instruments in a [[Financial Ontology]] requires balancing several concerns. Classification must be consistent with external taxonomies: [[ISO 10962 CFI]] provides a six-character code that encodes asset class and attributes in a machine-readable form directly aligned to FIBO's hierarchy via [[SKOS]] concept schemes. Identifiers must be represented as typed datatype properties or [[URI and IRI]] references: an instrument node in a [[Knowledge Graph]] may carry an ISIN, a [[FIGI]], a CUSIP, and an exchange-specific ticker simultaneously, each scoped to a different [[Financial Identifier]] standard. The [[Taxonomy]] of instrument types is not merely classificatory — it has legal and regulatory force, since MiFID II, EMIR, and Dodd-Frank apply different obligations depending on instrument type.\n\n[[FIBO]]'s ten modules include SEC (for [[Securities]]) and DER (for [[Derivatives]]) as the primary instrument-focused domains, with FBC (Financial Business and Commerce) handling the lifecycle events — issuance, trading, settlement — and IND (Indices and Indicators) covering computed reference values. FIBO publishes these as [[OWL]] 2 DL ontologies in [[RDF]]/XML and Turtle, making them directly importable into any standards-compliant reasoner.\n\n## Key Properties\n\n- `hasIdentifier` — links to [[Financial Identifier]] instances (ISIN, [[FIGI]], CUSIP)\n- `isIssuedBy` — references the issuing [[Legal Entity]]\n- `hasClassification` — links to [[ISO 10962 CFI]] code\n- `listedOn` — references [[Stock Exchange]] via MIC code\n- `hasCurrency` — denomination currency\n- Subclass-specific: maturity date (debt), strike price (options), underlying (derivatives)\n\n## Relationships\n\n- **Is-a:** Contract, asset\n- **Has-part:** [[Securities]], [[Derivatives]], fund units, loan instruments\n- **Related:** [[Financial Identifier]], [[ISO 10962 CFI]], [[FIBO]], [[Taxonomy]]\n- **Used-by:** Trading systems, regulatory reporting, risk management, [[Knowledge Graph]] platforms\n\n## Examples\n\n- `fibo-sec-eq-eq:CommonStock` — FIBO class for common equity shares, subclass of `Equity` subclass of `FinancialInstrument`\n- A UK government gilt assigned ISIN `GB00B24FF097`, CFI code `DBFTFR`, and [[FIGI]] `BBG000C05BD1`\n- An ETF node in a [[Financial Knowledge Graph]] linked to its underlying index via `tracksIndex` property\n\n## Sources\n\n- `sources/articles/fibo-financial-industry-business-ontology.md`\n- `sources/articles/iso-10962-cfi-classification.md`\n- `sources/articles/figi-financial-instrument-identifier.md`\n- `sources/web-clips/financial-identifier-standards.md`\n\n## See Also\n\n- [[Ontology]], [[FIBO]], [[Class and Property]], [[OWL]], [[Financial Identifier]]\n- [[ISO 10962 CFI]], [[Securities]], [[Derivatives]], [[Taxonomy]], [[Financial Ontology]]\n" },
    { id: "Financial Knowledge Graph", category: "concepts", definition: "A [[Knowledge Graph]] applied to the financial domain, representing entities, instruments, markets, events, and their relationships as typed [[Triple]]s queryable via [[SPARQL]] and supporting [[Inference and Reasoning]] for risk, compliance, and trading applications.", content: "# Financial Knowledge Graph\n\n**Definition:** A [[Knowledge Graph]] applied to the financial domain, representing entities, instruments, markets, events, and their relationships as typed [[Triple]]s queryable via [[SPARQL]] and supporting [[Inference and Reasoning]] for risk, compliance, and trading applications.\n\n**Also known as:** Finance KG, financial graph database, semantic financial graph.\n\n## Overview\n\nFinancial knowledge graphs extend the general [[Knowledge Graph]] paradigm into a domain where precision, temporal accuracy, and regulatory traceability are non-negotiable. Unlike general-purpose KGs such as [[Wikidata]] or [[DBpedia]], financial KGs must handle high-frequency updates (market prices change by the millisecond), strict data provenance requirements (regulatory audit trails), and complex relationship types (ownership chains, derivative underliers, index constituents). The [[RDF]] + [[SPARQL]] stack inherited from the [[Semantic Web]] provides the interoperability layer, while property graph databases (Neo4j, TigerGraph) are often preferred in production for traversal performance.\n\nKey application areas include credit risk modeling (traversing [[Legal Entity]] ownership graphs to compute consolidated exposure), compliance monitoring (mapping transactions to [[Financial Instrument]] classes and checking against regulatory obligation rules from [[FIBO]] or [[FinRegOnt]]), fraud detection (anomaly detection over transaction networks), and investment research (correlating company events with instrument price movements). Three research projects illustrate the state of the art: **FinDKG** constructs a temporally-resolved KG from 400,000 Wall Street Journal articles spanning 24 years, with 12 entity types and 15 relation types enabling link prediction across time windows — demonstrating how news-derived [[Triple]]s can capture evolving market relationships. **FinKario** (2025) uses a dual-structure design separating a static attribute subgraph (company fundamentals, instrument listings) from a dynamic event subgraph (earnings, M&A, analyst actions) extracted from equity research reports via LLM-assisted extraction, achieving an 18.81% improvement in stock prediction tasks when used for retrieval-augmented generation. **FinReflectKG** demonstrates a reflection-based construction pipeline for self-correcting financial graph extraction.\n\n[[FIBO]] is the dominant ontological backbone for financial KGs: its [[OWL]] class hierarchy provides the schema layer, its [[RDF]] serializations are the data interchange format, and its [[Inference and Reasoning]] axioms enable automated classification of instruments and entities. The choice between [[RDF]] triplestores and property graph databases typically reflects the tension between semantic interoperability (favoring [[RDF]]) and query performance at scale (favoring property graphs).\n\n## Key Properties\n\n- Nodes: [[Financial Instrument]], [[Legal Entity]], [[Stock Exchange]], [[Market Data]], persons, events\n- Edges: issues, trades, owns, regulates, underlies, tracks, correlates-with\n- Temporal triples: timestamped edges for price history, ownership changes, event sequences\n- Ontology alignment: [[FIBO]] for schema, [[GLEIF]] for entity identity, [[ISO 10962 CFI]] for instrument classification\n- Query layer: [[SPARQL]] for [[RDF]] graphs; Cypher/GSQL for property graphs\n\n## Relationships\n\n- **Is-a:** [[Knowledge Graph]]\n- **Has-part:** Entity graph, instrument graph, transaction graph, event graph, [[Market Data]] graph\n- **Related:** [[RDF]], [[SPARQL]], [[FIBO]], [[Triple]], [[Inference and Reasoning]], [[Linked Data]]\n- **Used-by:** Investment banks, hedge funds, regulatory bodies, fintech platforms, financial LLM applications\n\n## Examples\n\n- FinDKG: 400,000 WSJ articles → temporally-resolved KG with 12 entity types and 15 relation types\n- FinKario: 305,000+ entities, dual attribute/event subgraph, FIBO-aligned, RAG-enabled for stock prediction\n- A compliance KG linking transaction [[Triple]]s to [[FIBO]] instrument classes and [[LKIF]] regulatory obligation nodes\n\n## Sources\n\n- `sources/papers/findkg-dynamic-knowledge-graph.md`\n- `sources/papers/finkario-dual-structure-financial-kg.md`\n- `sources/articles/fibo-financial-industry-business-ontology.md`\n\n## See Also\n\n- [[Knowledge Graph]], [[RDF]], [[SPARQL]], [[FIBO]], [[Triple]]\n- [[Inference and Reasoning]], [[Financial Ontology]], [[Linked Data]], [[Wikidata]], [[DBpedia]]\n" },
    { id: "Financial Ontology", category: "concepts", definition: "A formal, machine-readable [[Ontology]] that models the concepts, relationships, and rules of the financial services domain using standards such as [[OWL]] and [[RDF]].", content: "# Financial Ontology\n\n**Definition:** A formal, machine-readable [[Ontology]] that models the concepts, relationships, and rules of the financial services domain using standards such as [[OWL]] and [[RDF]].\n\n**Also known as:** Finance ontology, financial domain ontology.\n\n## Overview\n\nFinancial ontologies occupy a uniquely demanding corner of knowledge engineering. The financial domain combines extreme terminological precision (legal and regulatory definitions must be unambiguous), global scope (instruments, entities, and transactions cross jurisdictions), and rapid evolution (new products, regulations, and market structures emerge continuously). These pressures mean financial ontologies must satisfy both human-readable clarity for domain experts and machine-readable rigor for automated reasoning via [[Inference and Reasoning]] engines grounded in [[Description Logic]].\n\nThe anchor of the modern financial ontology landscape is [[FIBO]] — the Financial Industry Business Ontology — maintained by the EDM Council and published as an [[OWL]] 2 DL ontology across 10 domain modules covering everything from foundational primitives to [[Derivatives]], [[Securities]], and [[Market Data]]. FIBO defines over 2,400 [[Class and Property]] axioms and serves as the shared semantic backbone for interoperability between institutions, regulators, and data vendors. Alongside FIBO, [[GLEIF]] publishes a 7-ontology suite for [[Legal Entity]] identification under ISO 17442, while XBRL provides a taxonomy layer for financial reporting. [[FinRegOnt]] combines [[FIBO]] with [[LKIF]] to cover regulatory compliance obligations.\n\nWhat makes financial ontologies particularly complex is the interplay between operational identifier systems and semantic representations. Every [[Financial Instrument]] may carry multiple identifiers — ISIN, CUSIP, SEDOL, [[FIGI]] — each scoped to different contexts, yet an ontology must relate these as co-referential [[URI and IRI]] patterns within a unified [[Knowledge Graph]]. Standards such as [[ISO 20022]] and [[ISO 10962 CFI]] provide structural scaffolding that financial ontologies align against, enabling mapping between message-level data and ontological representations without loss of semantics.\n\n## Key Properties\n\n- Grounded in [[OWL]] 2 DL for decidable [[Inference and Reasoning]]\n- Published in [[RDF]]-based serializations (Turtle, RDF/XML, JSON-LD)\n- Aligns to regulatory standards: [[ISO 20022]], MiFID II, Dodd-Frank, EMIR\n- Covers instruments ([[Financial Instrument]], [[Securities]], [[Derivatives]]), entities ([[Legal Entity]]), markets ([[Stock Exchange]]), and processes\n- Uses [[SKOS]] for thesaurus and glossary representations alongside formal axioms\n- Maintained under governance bodies (EDM Council, GLEIF, ISO TC68)\n\n## Relationships\n\n- **Is-a:** [[Ontology]], domain ontology\n- **Has-part:** [[FIBO]], [[GLEIF]], XBRL taxonomy, [[FinRegOnt]], [[LKIF]]\n- **Related:** [[Knowledge Graph]], [[Description Logic]], [[Class and Property]], [[Inference and Reasoning]], [[Linked Data]]\n- **Used-by:** Financial regulators, investment banks, data vendors, compliance platforms\n\n## Examples\n\n- [[FIBO]] SEC module defines `Equity` as a subclass of `FinancialInstrument` with OWL restrictions on issuing [[Legal Entity]]\n- [[GLEIF]] L2 ontology represents parent-subsidiary ownership chains as [[RDF]] triples queryable via [[SPARQL]]\n- [[FinRegOnt]] combines [[LKIF]] obligation classes with [[FIBO]] instrument classes to encode MiFID II reporting rules\n\n## Sources\n\n- `sources/articles/fibo-financial-industry-business-ontology.md`\n- `sources/articles/gleif-legal-entity-identifier.md`\n- `sources/web-clips/lkif-legal-knowledge-interchange.md`\n\n## See Also\n\n- [[FIBO]], [[GLEIF]], [[OWL]], [[RDF]], [[Knowledge Graph]], [[Description Logic]]\n- [[Class and Property]], [[Inference and Reasoning]], [[Financial Instrument]]\n- [[Securities]], [[Derivatives]], [[Legal Entity]], [[ISO 20022]], [[XBRL]], [[FinRegOnt]]\n" },
    { id: "Inference and Reasoning", category: "concepts", definition: "The process of deriving new facts, class memberships, or property assertions that are logically entailed by — but not explicitly stated in — an [[RDF]] graph, [[Ontology]], or [[Knowledge Graph]].", content: "# Inference and Reasoning\n\n**Definition:** The process of deriving new facts, class memberships, or property assertions that are logically entailed by — but not explicitly stated in — an [[RDF]] graph, [[Ontology]], or [[Knowledge Graph]].\n\n**Also known as:** Automated reasoning, ontological inference, entailment, deductive inference, logical inference.\n\n## Overview\n\nInference is what distinguishes a semantically rich [[Knowledge Graph]] from a plain database. When you assert that `ex:fido rdf:type ex:Dog` and the [[Ontology]] states `ex:Dog rdfs:subClassOf ex:Mammal`, a reasoner can *infer* `ex:fido rdf:type ex:Mammal` without you ever writing that [[Triple]]. This derived fact is *entailed* — it follows necessarily from the axioms in the [[RDFS]] or [[OWL]] schema. Inference automates the propagation of such consequences across potentially millions of [[Triple|triples]] in a [[Knowledge Graph]].\n\nThe scope and computational cost of inference depend heavily on the expressive power of the [[Ontology]] language. [[RDFS]] inference is simple and cheap: it follows a small set of rules (subclass propagation, domain/range typing) and runs in polynomial time. [[OWL]] [[Description Logic]] inference is much richer but potentially expensive: it involves checking consistency, satisfiability, and class membership under the full SROIQ(D) logic (see [[Description Logic]]). Practical systems often choose an [[OWL]] profile — OWL EL, OWL QL, or OWL RL — that constrains the logic to a tractable subset while retaining useful expressivity. The ELK reasoner, for instance, handles OWL EL in polynomial time and is used for SNOMED CT, a clinical [[Ontology]] with hundreds of thousands of [[Class and Property|classes]].\n\nA critical design principle in [[OWL]]-based reasoning is the **open-world assumption** (OWA), which contrasts sharply with the **closed-world assumption** (CWA) used in relational databases and most logic programming. This distinction has deep practical consequences for how [[Ontology|ontologies]] are designed and queried, and is one of the first conceptual hurdles for practitioners moving from SQL or Prolog to [[OWL]] and [[SPARQL]].\n\n## Key Properties\n\n- **Entailment regimes:** RDFS, OWL Direct Semantics, OWL RL, RIF; define what a compliant reasoner must derive\n- **Classification:** ordering all [[Class and Property|classes]] in the [[Ontology]] by subsumption (`rdfs:subClassOf` hierarchy)\n- **Realisation:** assigning each individual to its most specific inferred classes\n- **Consistency checking:** detecting logical contradictions in the [[Ontology]] (e.g., an individual that is both `Cat` and `Dog` when those classes are declared `owl:disjointWith`)\n- **Conjunctive query answering:** answering [[SPARQL]]-style queries under an entailment regime, including inferred facts\n- **Rule-based inference:** using rule languages (SWRL, RIF, Datalog) to express inference patterns beyond what [[OWL]] axioms can capture\n\n## Open-World vs Closed-World Assumption\n\nThe **closed-world assumption** (CWA) — used in SQL, Prolog, and SHACL validation — says: *if something is not known to be true, it is false*. A SQL query for employees earning over $100k returns only those with explicit salary records exceeding that value; absence of a record means the salary is not over $100k.\n\nThe **open-world assumption** (OWA) — used in [[OWL]] reasoning — says: *if something is not known to be true, it may still be true*. The [[Ontology]] is an incomplete description of the world. A reasoner will never conclude that `ex:alice` does *not* have a child simply because no `ex:hasChild` [[Triple]] for Alice appears in the [[RDF]] graph. This makes [[OWL]] unsuitable for integrity constraint checking (where you *want* closed-world behaviour) — that role belongs to [[SHACL]], which explicitly adopts a closed-world stance over the data graph.\n\n| | Open World (OWL/RDFS) | Closed World (SQL/SHACL) |\n|---|---|---|\n| Missing fact means | \"Unknown\" | \"False\" |\n| Use case | Incomplete knowledge bases | Data validation, querying known data |\n| Example | Alice *may* have children (no assertion) | Alice has *no* children (no record) |\n\n## Forward and Backward Chaining\n\n**Forward chaining** (also called *data-driven* reasoning) applies all applicable inference rules to the current fact base, generating new facts, until no new facts can be derived. The result is the complete **materialized closure** of the [[RDF]] graph under the entailment regime. This approach is used by triple stores that pre-compute inferred triples and store them alongside asserted [[Triple|triples]]. Queries then run against the enriched graph without invoking the reasoner at query time — fast for reads, expensive on ingestion.\n\n**Backward chaining** (also called *goal-driven* reasoning) starts from a query goal and works backwards, seeking facts that would satisfy it. This is the approach used by Prolog and some [[SPARQL]] entailment engines. It avoids materialising all inferences upfront but may re-derive the same facts repeatedly.\n\n**Tableau algorithms** are the dominant approach for [[Description Logic]] reasoning. They systematically attempt to construct a *model* of the [[Ontology]] — a concrete world satisfying all axioms — by expanding a tree of constraints. If no consistent model can be found, the [[Ontology]] is inconsistent. HermiT, Pellet, and FaCT++ all implement tableau-based procedures for OWL 2 DL (SROIQ(D)).\n\n## Entailment in RDFS\n\n[[RDFS]] defines thirteen entailment rules. A subset of the most important:\n\n```\n# If C rdfs:subClassOf D, and x rdf:type C, then x rdf:type D\n?x rdf:type ?C .\n?C rdfs:subClassOf ?D .\n=> ?x rdf:type ?D .\n\n# If P rdfs:domain C, and x P y, then x rdf:type C\n?x ?P ?y .\n?P rdfs:domain ?C .\n=> ?x rdf:type ?C .\n\n# If P rdfs:range C, and x P y, then y rdf:type C\n?x ?P ?y .\n?P rdfs:range ?C .\n=> ?y rdf:type ?C .\n\n# Transitivity of rdfs:subClassOf\n?A rdfs:subClassOf ?B .\n?B rdfs:subClassOf ?C .\n=> ?A rdfs:subClassOf ?C .\n```\n\nThese rules are the basis of [[RDFS]] inference support in triple stores. [[SPARQL]] queries against an [[RDFS]]-entailment-aware endpoint will see the derived [[Triple|triples]] as if they were asserted.\n\n## OWL Reasoning Example\n\nGiven the [[OWL]] [[Ontology]]:\n\n```manchester\n# Class axioms (TBox)\nParent EquivalentTo: Person and (hasChild some Person)\nGrandParent EquivalentTo: Person and (hasChild some Parent)\nDog DisjointWith: Cat\n```\n\nAnd the instance data (ABox):\n\n```turtle\nex:alice  ex:hasChild ex:bob .\nex:bob    ex:hasChild ex:carol .\nex:alice  a ex:Person .\nex:bob    a ex:Person .\nex:carol  a ex:Person .\n```\n\nA [[Description Logic]] reasoner will infer:\n- `ex:bob rdf:type ex:Parent` (because bob has a child who is a Person)\n- `ex:alice rdf:type ex:Parent` (because alice has a child who is a Person — bob)\n- `ex:alice rdf:type ex:GrandParent` (because alice has a child who is a Parent — bob)\n\nNo explicit `rdf:type` assertions for `Parent` or `GrandParent` were needed. A [[SPARQL]] query under OWL Direct Semantics entailment would return these individuals in a `?x rdf:type ex:GrandParent` pattern.\n\n## Reasoner Implementations\n\n- **HermiT** — tableau OWL 2 DL reasoner; integrated in Protégé; supports full SROIQ(D)\n- **Pellet / Openllet** — OWL 2 DL with SPARQL-DL, incremental reasoning, and explanation\n- **FaCT++** — tableau reasoner for SROIQ; widely used in benchmarks\n- **ELK** — concurrent, polynomial-time OWL EL reasoner; handles very large [[Ontology|ontologies]]\n- **Apache Jena Rules** — forward-chaining rule engine for [[RDFS]] and custom rules over [[RDF]] graphs\n\n## Relationships\n\n- **Is-a:** Core function of [[Ontology]]-based [[Knowledge Graph]] systems\n- **Has-part:** Forward chaining, backward chaining, tableau algorithms, entailment rules, materialisation\n- **Related:** [[OWL]], [[Description Logic]], [[RDFS]], [[Ontology]], [[Knowledge Graph]], [[Triple]], [[SPARQL]], [[SHACL]]\n- **Used-by:** Semantic reasoners (HermiT, Pellet, ELK); triple stores with entailment regimes (GraphDB, Stardog); biomedical [[Knowledge Graph|knowledge graphs]]; enterprise [[Ontology]] management\n\n## Sources\n\n- [needs-source]\n\n## See Also\n\n- [[OWL]]\n- [[Description Logic]]\n- [[RDFS]]\n- [[Ontology]]\n- [[Knowledge Graph]]\n- [[Triple]]\n- [[SPARQL]]\n- [[SHACL]]\n- [[Class and Property]]\n" },
    { id: "Knowledge Graph", category: "concepts", definition: "A graph-structured knowledge base that represents real-world entities and the relationships between them, enabling both human understanding and machine reasoning.", content: "# Knowledge Graph\n\n**Definition:** A graph-structured knowledge base that represents real-world entities and the relationships between them, enabling both human understanding and machine reasoning.\n\n**Also known as:** KG, semantic network, entity graph.\n\n## Overview\n\nA knowledge graph encodes facts as a network of nodes (entities) and edges (relationships). Each node represents a thing — a person, place, concept, or event — and each edge represents a named relationship between two things. This structure makes it possible to traverse, query, and reason over large bodies of interlinked information in ways that flat tables or documents cannot easily support. The core atomic unit is the [[Triple]]: a subject–predicate–object statement such as `(Marie Curie, bornIn, Warsaw)`.\n\nThe term \"knowledge graph\" entered mainstream technology vocabulary in 2012 when Google announced its Knowledge Graph feature, which powers the information panels on the right side of search results. But the ideas behind knowledge graphs are much older, rooted in the [[Semantic Web]] vision articulated by Tim Berners-Lee, and before that in semantic networks and frame-based knowledge representation from 1960s AI research. Today, major knowledge graphs include Wikidata (open, community-maintained), DBpedia (extracted from Wikipedia), Freebase (now folded into Wikidata), Google's proprietary graph, and the Microsoft Satori graph behind Bing.\n\nThe power of a knowledge graph goes beyond simple storage. When a graph is paired with an [[Ontology]] that defines classes, properties, and logical constraints, a reasoner can derive new facts that were never explicitly stated — a process called [[Inference and Reasoning]]. A graph might not explicitly say that Marie Curie is a scientist, but if it knows she was a professor of physics and the ontology says all physics professors are scientists, the reasoner can conclude it automatically.\n\n## Key Properties\n\n- **Entity-centric:** Information is organized around entities, each given a stable [[URI and IRI|URI]] identifier.\n- **Schema-optional:** Many KGs operate with a loose or implicit schema, while others enforce a strict [[Ontology]].\n- **Queryable:** [[SPARQL]] is the standard query language for RDF-based KGs; Cypher is common for property graphs.\n- **Open-world assumption:** The absence of a fact does not mean it is false — there may simply be missing data.\n- **Linkable:** KGs designed under [[Linked Data]] principles connect to other graphs via shared [[URI and IRI|URIs]].\n\n## RDF Graphs vs Property Graphs\n\nKnowledge graphs come in two main technical flavors:\n\n- **RDF graphs:** Built from [[Triple|triples]], using [[RDF]] as the data model and [[URI and IRI|URIs]] as identifiers. Queryable with [[SPARQL]]. Can be annotated with [[OWL]] or [[RDFS]] schemas. Native format for the [[Semantic Web]]. Wikidata exports RDF; DBpedia is natively RDF.\n- **Property graphs:** Nodes and edges can each carry arbitrary key-value properties directly on the edge or node, without reification. Used by databases such as Neo4j (Cypher query language) and Amazon Neptune. More ergonomic for certain traversal patterns; less interoperable by default.\n\nThe two models are converging: W3C's RDF-star extension allows attaching metadata to [[Triple|triples]] similarly to property graph edges.\n\n## Relationships\n\n- **Is-a:** Graph database, knowledge base, semantic network\n- **Has-part:** [[Triple]], entities, relationships, [[Ontology]] (schema layer)\n- **Related:** [[RDF]], [[SPARQL]], [[Linked Data]], [[URI and IRI]], [[Inference and Reasoning]], [[Ontology]]\n- **Used-by:** Search engines (Google, Bing), question answering systems, recommendation engines, biomedical research\n\n## Examples\n\nA small RDF knowledge graph in Turtle syntax:\n\n```turtle\n@prefix ex:   <http://example.org/> .\n@prefix schema: <https://schema.org/> .\n\nex:MarieCurie a schema:Person ;\n    schema:name \"Marie Curie\" ;\n    schema:birthPlace ex:Warsaw ;\n    ex:wonAward ex:NobelPrizePhysics1903 ,\n                ex:NobelPrizeChemistry1911 .\n\nex:Warsaw a schema:City ;\n    schema:name \"Warsaw\" ;\n    schema:containedInPlace ex:Poland .\n```\n\nThis small fragment already forms a traversable graph: from Marie Curie you can reach Warsaw, which leads to Poland, and from there to any other entity linked to Poland.\n\n## Sources\n\n- [needs-source]\n\n## See Also\n\n- [[Ontology]]\n- [[Triple]]\n- [[RDF]]\n- [[SPARQL]]\n- [[Linked Data]]\n- [[URI and IRI]]\n- [[Inference and Reasoning]]\n- [[Semantic Web]]\n" },
    { id: "Legal Entity", category: "concepts", definition: "Any organization — corporation, partnership, trust, government body, or fund — that has legal standing to enter into contracts, modeled in ontologies via [[FIBO]]'s BE module and identified globally through the [[GLEIF]] LEI system.", content: "# Legal Entity\n\n**Definition:** Any organization — corporation, partnership, trust, government body, or fund — that has legal standing to enter into contracts, modeled in ontologies via [[FIBO]]'s BE module and identified globally through the [[GLEIF]] LEI system.\n\n**Also known as:** Juridical person, legal person, organization, counterparty.\n\n## Overview\n\nLegal entities are fundamental nodes in every [[Financial Ontology]]: they are the issuers of [[Financial Instrument]]s, the parties to contracts, the operators of [[Stock Exchange]]s, and the subjects of regulatory obligations. In [[FIBO]], the BE (Business Entities) module provides a rich [[OWL]] class hierarchy distinguishing corporations, partnerships, trusts, government bodies, sole proprietorships, and special-purpose vehicles — each with formal [[Class and Property]] restrictions encoding jurisdiction of incorporation, legal form, and registration status.\n\nThe global identification layer for legal entities is the LEI (Legal Entity Identifier) system maintained by [[GLEIF]]. A LEI is a 20-character ISO 17442 code assigned by accredited Local Operating Units (LOUs) and recorded in the Global LEI Index. [[GLEIF]] publishes this data as a 7-ontology [[OWL]] suite: the L1 ontology (Who is Who) captures identity attributes — name, address, legal form, registration authority — while the L2 ontology (Who Owns Whom) captures ownership and control relationships between entities. These [[RDF]] graphs are directly queryable via [[SPARQL]] and link naturally to [[FIBO]]'s `LegalEntity` class hierarchy through shared [[URI and IRI]] patterns.\n\nThe power of modeling legal entities as [[Linked Data]] becomes clear in regulatory contexts: ownership chains that span dozens of jurisdictions can be traversed in a single [[SPARQL]] query over the GLEIF L2 [[RDF]] graph, enabling beneficial ownership analysis, sanctions screening, and systemic risk mapping. [[FIBO]]'s `LegalEntity` individuals can carry `owl:sameAs` links to [[GLEIF]] ontology instances, [[Wikidata]] items, and DBpedia resources, making entity resolution across heterogeneous data sources tractable. The `schema:leiCode` property from Schema.org further bridges ontological representations to web-scale entity data.\n\n## Key Properties\n\n- `hasLEI` — ISO 17442 Legal Entity Identifier (20 characters)\n- `hasLegalName` — official registered name\n- `hasLegalForm` — LLC, PLC, GmbH, SA, etc. (from [[GLEIF]] EntityLegalForm ontology)\n- `isIncorporatedIn` — jurisdiction of incorporation\n- `hasRegistrationAuthority` — business registry reference\n- `isUltimateParentOf` / `isDirectParentOf` — ownership chain relations (GLEIF L2)\n\n## Relationships\n\n- **Is-a:** [[Ontology]] individual, named entity\n- **Has-part:** Corporate subsidiaries, branches, special-purpose vehicles\n- **Related:** [[GLEIF]], [[FIBO]], [[Financial Identifier]], [[Financial Instrument]], [[Linked Data]]\n- **Used-by:** Regulatory reporting (MiFID II, EMIR, Dodd-Frank), KYC/AML systems, trade repositories, [[Financial Knowledge Graph]]\n\n## Examples\n\n- Goldman Sachs Group Inc.: LEI `784F5XWPLTWKTBV3E584`, modeled as `fibo-be-le-cb:PubliclyHeldCompany` in FIBO\n- A German GmbH with LEI linking to its ultimate parent via GLEIF L2 `RelationshipRecord`, traversable as an [[RDF]] path\n- A central counterparty clearing house (CCP) modeled as a `LegalEntity` with `hasRole` pointing to a `ClearingRole` individual in FIBO FBC\n\n## Sources\n\n- `sources/articles/gleif-legal-entity-identifier.md`\n- `sources/articles/fibo-financial-industry-business-ontology.md`\n- `sources/web-clips/financial-identifier-standards.md`\n\n## See Also\n\n- [[Ontology]], [[FIBO]], [[GLEIF]], [[OWL]], [[Class and Property]]\n- [[Linked Data]], [[URI and IRI]], [[Financial Identifier]], [[Financial Ontology]]\n" },
    { id: "Linked Data", category: "concepts", definition: "A set of best practices for publishing and connecting structured data on the web using [[URI and IRI|URIs]] and [[RDF]], so that data from different sources can be discovered, accessed, and merged automatically.", content: "# Linked Data\n\n**Definition:** A set of best practices for publishing and connecting structured data on the web using [[URI and IRI|URIs]] and [[RDF]], so that data from different sources can be discovered, accessed, and merged automatically.\n\n**Also known as:** LOD (Linked Open Data), Web of Data, 5-star data.\n\n## Overview\n\nLinked Data is the practical implementation arm of the [[Semantic Web]] vision. While the Semantic Web is a grand architectural vision, Linked Data is a specific, actionable methodology: a set of four principles, first articulated by Tim Berners-Lee in a 2006 design note, for publishing data on the web in a way that makes it inherently linkable to other data. The idea is that if everyone follows the same rules for naming and publishing data, the result is a self-organizing global graph of interlinked facts — much like the hypertext web connects documents, but at the level of individual data items.\n\nThe Linked Open Data (LOD) Cloud is the most visible result of the Linked Data movement. Starting with a small cluster of datasets in 2007, it has grown to include thousands of datasets spanning government statistics, scientific data, cultural heritage, geographic information, bibliographic data, and encyclopedic knowledge. Central hubs in this cloud include DBpedia (which extracts structured data from Wikipedia and publishes it as [[RDF]]), Wikidata (a freely editable multilingual knowledge base maintained by the Wikimedia Foundation), GeoNames (geographic entities), and the Library of Congress Subject Headings. These datasets cross-link to each other using shared [[URI and IRI|URIs]], allowing a query that starts at one dataset to traverse to another seamlessly via [[SPARQL]] federation.\n\nWhat distinguishes Linked Data from simply publishing data files is the insistence on [[URI and IRI|URIs]] as global identifiers and [[RDF]] as the data model. A CSV file can describe entities with local IDs that mean nothing outside that file. A Linked Data resource uses an HTTP [[URI and IRI|URI]] that anyone on the web can dereference — look up — to get a description of that entity in [[RDF]], which in turn contains links to related entities, possibly in entirely different datasets. The \"follow your nose\" discovery pattern this enables is qualitatively different from downloading data dumps and manually integrating them.\n\n## The Four Principles\n\nTim Berners-Lee's four rules for Linked Data, as stated in his 2006 design note:\n\n1. **Use [[URI and IRI|URIs]] as names for things** — not just documents, but real-world entities and abstract concepts.\n2. **Use HTTP [[URI and IRI|URIs]]** — so that people and machines can look up those names on the web.\n3. **When someone looks up a URI, provide useful information** — using [[RDF]] and [[SPARQL]] standards.\n4. **Include links to other [[URI and IRI|URIs]]** — so that machines can discover more related things.\n\nThese four principles are deliberately minimal. They do not mandate [[OWL]] ontologies, specific serialization formats, or any particular vocabulary. They establish only the baseline needed for data to be \"linked.\"\n\n## The 5-Star Deployment Scheme\n\nBerners-Lee later extended the principles into a five-star rating scheme for open data quality:\n\n| Stars | Requirement | Example |\n|---|---|---|\n| ★ | Published on the web (any format) with an open license | A PDF report |\n| ★★ | Available as machine-readable structured data | An Excel spreadsheet |\n| ★★★ | Non-proprietary format | A CSV file |\n| ★★★★ | Uses [[URI and IRI|URIs]] to identify things (W3C open standards like [[RDF]]) | [[RDF]] published on the web |\n| ★★★★★ | Links to other data sources | [[RDF]] with `owl:sameAs` links to Wikidata |\n\nMost government open data portals sit at 3 stars. True Linked Data starts at 4 stars. The LOD Cloud datasets are predominantly 4–5 star.\n\n## Key Properties\n\n- **Decentralized:** No central authority; anyone can publish and link.\n- **Self-describing:** [[RDF]] vocabularies are dereferenceable, so processors can learn what predicates mean on the fly.\n- **Interoperable:** Shared [[URI and IRI|URIs]] and [[RDF]] make datasets mergeable without prior coordination.\n- **Discoverable:** Following links from one resource leads to related resources across the web.\n- **Open-world:** New data can be added at any time without breaking existing consumers.\n\n## Relationships\n\n- **Is-a:** Data publishing methodology, web architecture pattern\n- **Has-part:** [[URI and IRI|URI]] naming, [[RDF]] encoding, HTTP content negotiation, cross-dataset links\n- **Related:** [[Semantic Web]], [[RDF]], [[SPARQL]], [[Knowledge Graph]], [[URI and IRI]], [[OWL]]\n- **Used-by:** DBpedia, Wikidata, GeoNames, Europeana, data.gov, BBC programmes, British Museum collection\n\n## Examples\n\nLinking a local dataset to Wikidata using `owl:sameAs`:\n\n```turtle\n@prefix ex:  <http://example.org/people/> .\n@prefix owl: <http://www.w3.org/2002/07/owl#> .\n@prefix wd:  <https://www.wikidata.org/entity/> .\n\nex:MarieCurie owl:sameAs wd:Q7186 .\n```\n\nThis single [[Triple]] connects a local entity to the global Wikidata [[Knowledge Graph]], enabling any consumer of this data to follow the link and retrieve all Wikidata knows about Marie Curie — birthdate, awards, publications, family relationships — without any manual data import.\n\nA [[SPARQL]] federated query that reaches across two Linked Data endpoints:\n\n```sparql\nSELECT ?name ?cityLabel WHERE {\n  SERVICE <https://query.wikidata.org/sparql> {\n    ?person wdt:P19 ?city .\n    ?city rdfs:label ?cityLabel .\n    FILTER(LANG(?cityLabel) = \"en\")\n  }\n  ?person schema:name ?name .\n}\n```\n\n## Sources\n\n- [needs-source]\n\n## See Also\n\n- [[URI and IRI]]\n- [[RDF]]\n- [[SPARQL]]\n- [[Semantic Web]]\n- [[Knowledge Graph]]\n- [[OWL]]\n- [[Ontology]]\n" },
    { id: "Lkif", category: "concepts", definition: "Legal Knowledge Interchange Format — an [[OWL]] ontology of approximately 200 legal concept classes developed under the EU Estrella project, providing a formal upper ontology for legal rules, legislation, and normative positions.", content: "# LKIF\n\n**Definition:** Legal Knowledge Interchange Format — an [[OWL]] ontology of approximately 200 legal concept classes developed under the EU Estrella project, providing a formal upper ontology for legal rules, legislation, and normative positions.\n\n**Also known as:** Legal Knowledge Interchange Format, LKIF Core.\n\n## Overview\n\nLKIF is one of the most influential legal ontologies in the European knowledge engineering tradition. Developed under the EU Estrella research project (2006–2008), its goal was to establish a common interchange format enabling different legal knowledge systems across EU member states to share and reason over legal content without losing semantic precision. The result is an [[OWL]] ontology of roughly 200 classes organized into modules covering legal rules, legislation, normative positions (permissions, obligations, prohibitions), legal acts, and the sources from which legal authority derives — statutes, directives, case law, and regulations.\n\nLKIF's relevance to financial ontologies stems from [[FinRegOnt]] — the Financial Regulation Ontology — which combines LKIF as its legal upper layer with [[FIBO]] as its financial domain layer. This pairing captures something neither ontology can model alone: the specific regulatory obligations that apply to specific instrument types traded by specific entity types. In [[FinRegOnt]], an LKIF `Obligation` individual can be linked via [[OWL]] property chains to a FIBO `FinancialInstrument` subclass and a FIBO `LegalEntity` subclass, enabling automated inference of which reporting requirements apply to which transactions. This is the foundation of semantic compliance checking — a [[Financial Knowledge Graph]] that can answer \"which EMIR obligations apply to this OTC derivative trade?\" by traversing [[FIBO]] instrument classifications and LKIF obligation rules.\n\nThe LKIF rule representation uses a Horn-clause style encoding in [[OWL]], making it compatible with rule-based [[Inference and Reasoning]] engines. The legislation module treats statutes and directives as first-class [[OWL]] individuals with properties for jurisdiction, effective date, and hierarchical structure — enabling a knowledge graph to represent \"MiFID II Article 26 requires transaction reporting for instruments in class X.\" LKIF's normative position module (permissions, obligations, prohibitions) provides the deontic logic vocabulary that pure [[Description Logic]] ontologies like [[FIBO]] deliberately omit. The EU Estrella project's institutional backing gives LKIF recognized standing in European regulatory contexts.\n\n## Key Properties\n\n- ~200 legal concept classes in [[OWL]]\n- `lkif:Rule` — legal rule as a first-class entity\n- `lkif:Legislation` — statute or directive individual with jurisdiction and effectivity\n- `lkif:Obligation` / `lkif:Permission` / `lkif:Prohibition` — deontic positions\n- `lkif:LegalAct` — performative act with legal consequence\n- `lkif:Source` — legal authority from which a rule derives\n\n## Relationships\n\n- **Is-a:** [[OWL]] ontology, legal upper ontology\n- **Has-part:** Rule module, legislation module, normative position module, legal act module\n- **Related:** [[FinRegOnt]], [[FIBO]], [[Legal Entity]], [[Class and Property]], [[Ontology]]\n- **Used-by:** [[FinRegOnt]] (financial regulation compliance), EU legal informatics research, regulatory knowledge systems\n\n## Examples\n\n- MiFID II transaction reporting obligation modeled as `lkif:Obligation` linked to FIBO `ListedSecurity` via [[OWL]] property chain in [[FinRegOnt]]\n- An EU Directive individual in the legislation module with `effectiveDate`, `jurisdictionCoverage`, and `implements` properties\n- EMIR clearing obligation: `lkif:Obligation` with `appliesTo` pointing to FIBO `OTCDerivative` class, queryable via [[SPARQL]] over a [[Financial Knowledge Graph]]\n\n## Sources\n\n- `sources/web-clips/lkif-legal-knowledge-interchange.md`\n- `sources/articles/fibo-financial-industry-business-ontology.md`\n\n## See Also\n\n- [[OWL]], [[Ontology]], [[FinRegOnt]], [[FIBO]], [[Legal Entity]], [[Class and Property]]\n- [[Inference and Reasoning]], [[Financial Ontology]], [[Financial Knowledge Graph]]\n" },
    { id: "Market Data", category: "concepts", definition: "Time-stamped prices, rates, quotes, and indices associated with [[Financial Instrument]]s and markets, modeled in [[FIBO]]'s MD (Market Data) domain module as [[OWL]] classes with temporal and provenance properties.", content: "# Market Data\n\n**Definition:** Time-stamped prices, rates, quotes, and indices associated with [[Financial Instrument]]s and markets, modeled in [[FIBO]]'s MD (Market Data) domain module as [[OWL]] classes with temporal and provenance properties.\n\n**Also known as:** Reference data, pricing data, real-time data, financial time series.\n\n## Overview\n\nMarket data occupies a distinct position in [[Financial Ontology]] modeling because it combines the static world of reference data (what instrument is this? who issues it?) with the dynamic world of continuously updating values (what is its price right now?). [[FIBO]]'s MD module addresses this by defining classes for `PriceQuote`, `MarketRate`, `InterestRateBenchmark`, and `Index` alongside the temporal and provenance properties needed to situate each value in time and attribute it to a source. The module covers spot prices, bid/ask quotes, settlement prices, index levels, and benchmark rates such as SOFR, EURIBOR, and SONIA — all of which have regulatory significance as reference rates for [[Derivatives]] contracts.\n\nThe temporal dimension is the most challenging aspect of market data in [[Knowledge Graph]]s. A price observation is not simply a triple `<instrument> hasPrice <value>` — it must carry a timestamp, a source (exchange feed, data vendor, central bank), a currency, and sometimes a bid/ask spread. [[RDF]] representations use named graphs or reification to attach these metadata properties to individual [[Triple]]s. The FinDKG project demonstrates a temporally-resolved triple pattern where each edge carries a time range, enabling [[SPARQL]] queries that reconstruct the state of the graph at any historical point. [[FIBO]]
