FND (Foundations) provides the date/time and quantity primitives that MD builds upon.\n\nMarket data is also the bridge between [[FIBO]]'s ontological layer and operational data pipelines. A [[Financial Knowledge Graph]] that combines FIBO instrument and entity nodes with live market data feeds becomes a real-time semantic layer: [[SPARQL]] queries can join instrument classification, issuer identity, ownership structure, and current pricing in a single traversal. [[Stock Exchange]] nodes provide venue context for price observations, while [[Securities]] and [[Derivatives]] nodes supply the instrument identity. Index-linked [[Derivatives]] require `tracksIndex` relationships from instruments to benchmark index nodes, which themselves carry historical level data as timestamped [[Triple]]s.\n\n## Key Properties\n\n- `hasPrice` — numeric value with currency and timestamp\n- `hasBidPrice` / `hasAskPrice` — two-sided quote\n- `hasSource` — data vendor or exchange feed attribution\n- `asOfDate` — observation timestamp\n- `tracksIndex` — links index-linked instruments to their reference index\n- `hasBenchmarkRate` — links floating-rate instruments to reference rates (SOFR, EURIBOR)\n\n## Relationships\n\n- **Is-a:** Reference data, time series observation\n- **Has-part:** Spot prices, benchmark rates, index levels, volatility surfaces\n- **Related:** [[Financial Instrument]], [[Securities]], [[Derivatives]], [[Stock Exchange]], [[FIBO]]\n- **Used-by:** Trading systems, risk engines, [[Financial Knowledge Graph]] platforms, regulatory valuation reports\n\n## Examples\n\n- A FIBO `PriceQuote` individual: Apple stock at USD 185.42 bid / 185.43 ask on 2025-04-04 via XNAS feed\n- SOFR rate observation: `fibo-ind-ir-ir:SOFR hasValue \"5.31\"^^xsd:decimal asOfDate \"2025-04-04\"`\n- S&P 500 index level triple stored as a named graph with provenance pointing to S&P Global as data source\n\n## Sources\n\n- `sources/articles/fibo-financial-industry-business-ontology.md`\n- `sources/papers/findkg-dynamic-knowledge-graph.md`\n\n## See Also\n\n- [[FIBO]], [[Financial Instrument]], [[Knowledge Graph]], [[Triple]], [[SPARQL]]\n- [[Securities]], [[Derivatives]], [[Stock Exchange]], [[Financial Knowledge Graph]]\n" },
    { id: "Ontology", category: "concepts", definition: "A formal, explicit specification of a shared conceptualization — a structured vocabulary of terms, their definitions, and the relationships between them within a domain.", content: "# Ontology\n\n**Definition:** A formal, explicit specification of a shared conceptualization — a structured vocabulary of terms, their definitions, and the relationships between them within a domain.\n\n**Also known as:** Formal ontology, domain ontology, conceptual model.\n\n## Overview\n\nThe word \"ontology\" originates in philosophy, where it names the branch of metaphysics concerned with the nature of being and existence. In computer science and knowledge engineering, the term was deliberately borrowed to describe something more practical: a machine-readable model of what exists in a domain, and how those things relate to each other. When researchers talk about \"an ontology\" (with the indefinite article), they almost always mean the computational artifact, not the philosophical discipline.\n\nA well-constructed ontology does several things at once. It defines the classes of things in a domain (e.g., `Person`, `Organization`, `Publication`), the properties that describe them (e.g., `hasName`, `foundedIn`), the relationships that connect them (e.g., `worksFor`, `authorOf`), and the axioms or rules that constrain how those pieces fit together. This formal structure is what distinguishes an ontology from a loose glossary or a simple [[Taxonomy]]: an ontology is designed to be processed by machines and to support [[Inference and Reasoning]].\n\nOntologies are foundational to the [[Semantic Web]] and to [[Knowledge Graph]] construction. Without a shared ontology, two systems cannot reliably exchange meaning — they can exchange strings, but not semantics. In practice, ontologies range from lightweight schemas (a handful of classes and properties) to sprawling formal systems like SNOMED CT in medicine or the Gene Ontology in biology.\n\n## Key Properties\n\n- **Explicit:** Every concept and relationship is named and defined unambiguously.\n- **Formal:** Definitions use a logic-based language (often [[Description Logic]]) that admits automated reasoning.\n- **Shared:** An ontology is intended to capture consensus understanding within a community, not an individual's private model.\n- **Domain-scoped:** Most ontologies cover a specific subject area, though upper ontologies like DOLCE attempt broader coverage.\n- **Reusable:** A well-designed ontology can be imported and extended by other ontologies.\n\n## TBox and ABox\n\nOne of the most important structural distinctions in ontology engineering comes from [[Description Logic]]:\n\n- **TBox (Terminological Box):** The schema layer — definitions of classes, properties, and axioms. Statements like \"every `Professor` is a `Person`\" live here. This is the ontology itself.\n- **ABox (Assertional Box):** The data layer — assertions about specific individuals. Statements like \"`ex:Alice` is a `Professor`\" live here. In an [[RDF]] [[Knowledge Graph]], the ABox is usually the instance data.\n\nThe TBox and ABox together constitute a [[Knowledge Graph]]'s full knowledge base.\n\n## Formal vs Informal Ontologies\n\nOntologies exist on a spectrum of expressivity:\n\n- **Informal / lightweight:** Controlled vocabularies, thesauri, [[Taxonomy|taxonomies]] — useful for humans, limited machine reasoning.\n- **Semi-formal:** [[RDFS]] schemas — support basic subclass/subproperty hierarchies and type inference.\n- **Fully formal:** [[OWL]] ontologies — support rich axioms, disjointness, cardinality restrictions, inverse properties, and full automated reasoning via [[Description Logic]] reasoners.\n\n## Relationships\n\n- **Is-a:** Conceptual model, knowledge representation artifact\n- **Has-part:** [[Class and Property]], [[Taxonomy]], axioms, individuals (instances)\n- **Related:** [[Knowledge Graph]], [[Description Logic]], [[Inference and Reasoning]], [[RDFS]]\n- **Used-by:** [[OWL]], [[RDF]], [[Semantic Web]] standards, biomedical informatics, enterprise data integration\n\n## Examples\n\nA minimal ontology fragment in [[OWL]] Manchester syntax:\n\n```manchester\nClass: Person\nClass: Employee\n  SubClassOf: Person\n  SubClassOf: worksFor some Organization\n\nObjectProperty: worksFor\n  Domain: Employee\n  Range: Organization\n```\n\nThe same fragment expressed as [[RDF]] [[Triple|triples]] in Turtle:\n\n```turtle\n@prefix owl: <http://www.w3.org/2002/07/owl#> .\n@prefix ex:  <http://example.org/> .\n\nex:Employee rdfs:subClassOf ex:Person .\nex:worksFor rdfs:domain ex:Employee ;\n            rdfs:range  ex:Organization .\n```\n\nWell-known public ontologies include: FOAF (Friend of a Friend), Dublin Core, Schema.org, Gene Ontology, and the OBO Foundry suite.\n\n## Sources\n\n- [needs-source]\n\n## See Also\n\n- [[Knowledge Graph]]\n- [[Taxonomy]]\n- [[OWL]]\n- [[RDF]]\n- [[RDFS]]\n- [[Description Logic]]\n- [[Class and Property]]\n- [[Semantic Web]]\n- [[Inference and Reasoning]]\n" },
    { id: "OWL", category: "concepts", definition: "The Web Ontology Language — a W3C standard for authoring rich, formal [[Ontology|ontologies]] on the [[Semantic Web]], built on top of [[RDF]] and grounded in [[Description Logic]].", content: "# OWL\n\n**Definition:** The Web Ontology Language — a W3C standard for authoring rich, formal [[Ontology|ontologies]] on the [[Semantic Web]], built on top of [[RDF]] and grounded in [[Description Logic]].\n\n**Also known as:** OWL 2, Web Ontology Language, DAML+OIL (predecessor).\n\n## Overview\n\nOWL is the language of choice when you need to express not just what things exist, but what must be true about them and what can be inferred from those truths. Where [[RDF]] lets you assert facts and [[RDFS]] lets you declare basic class hierarchies, OWL gives you a full logical vocabulary: disjoint classes, cardinality constraints, inverse properties, transitive relationships, and more. All of this expressivity is grounded in [[Description Logic]], which guarantees that automated reasoning is both sound (everything inferred is true) and, for appropriate OWL profiles, decidable (the reasoner always terminates).\n\nOWL 1 was standardized by the W3C in 2004. OWL 2, which introduced new profiles and extended the property axiom vocabulary, was published in 2009. OWL 2 is the current standard. Every OWL ontology is also a valid [[RDF]] graph — OWL constructs are expressed using specific RDF predicates in the `owl:` namespace, making OWL ontologies storable in any [[RDF]] triplestore and queryable with [[SPARQL]].\n\nThe practical use of OWL spans biomedical ontologies (SNOMED CT, the Gene Ontology in OWL form, the Human Phenotype Ontology), enterprise data integration, and ontology-driven [[Knowledge Graph]] construction. OWL works closely with [[SHACL]] — while OWL defines what can be inferred (open-world reasoning), SHACL defines what data shapes must be conformed to (closed-world validation). The two are complementary.\n\n## Key Properties\n\n- **Expressive:** Supports class definitions, property restrictions, cardinality, disjointness, inverse and transitive properties.\n- **Grounded in [[Description Logic]]:** Ensures formal semantics and tractable reasoning for appropriate profiles.\n- **RDF-compatible:** An OWL ontology serializes as [[RDF]] [[Triple|triples]].\n- **Open-world assumption:** Absence of information is not treated as falsehood — unlike databases.\n- **Supports [[Inference and Reasoning]]:** OWL reasoners (HermiT, Pellet, ELK) can classify ontologies and check consistency.\n\n## OWL Profiles\n\nOWL 2 defines several profiles trading off expressivity against computational complexity:\n\n| Profile | Logic fragment | Reasoning complexity | Best for |\n|---|---|---|---|\n| OWL 2 Full | Full OWL | Undecidable | Maximum expressivity, no guarantees |\n| OWL 2 DL | SROIQ(D) | ExpTime-complete | Standard use; decidable |\n| OWL 2 EL | EL++ | PTime | Large biomedical ontologies (SNOMED CT) |\n| OWL 2 QL | DL-Lite | NLogSpace | Query rewriting over relational databases |\n| OWL 2 RL | Description Logic Programs | PTime | Rule-based reasoning over [[RDF]] data |\n\nEarlier OWL 1 had three species: OWL Lite (simple hierarchies and constraints), OWL DL (full [[Description Logic]], decidable), and OWL Full (no computational guarantees).\n\n## Key OWL Constructs\n\n- `owl:Class` — declares a class (analogous to a type in an [[Ontology]])\n- `owl:ObjectProperty` — a property whose range is an individual (a [[URI and IRI|URI]])\n- `owl:DatatypeProperty` — a property whose range is a literal (string, integer, date, etc.)\n- `owl:subClassOf` — class subsumption (inherits from [[RDFS]])\n- `owl:equivalentClass` — two class expressions define exactly the same set of individuals\n- `owl:disjointWith` — no individual can belong to both classes\n- `owl:inverseOf` — relates two properties as inverses\n- `owl:TransitiveProperty` — if A→B and B→C then A→C\n- `owl:Restriction` — constrains a class by a property (e.g., `worksFor exactly 1 Organization`)\n\n## Manchester Syntax Examples\n\nManchester Syntax is a human-friendly surface notation for OWL, commonly used in tools like Protégé:\n\n```manchester\nClass: Researcher\n  SubClassOf: Person\n  SubClassOf: affiliatedWith some Organization\n\nClass: Professor\n  SubClassOf: Researcher\n  SubClassOf: teaches min 1 Course\n\nClass: EmeritusProfessor\n  EquivalentTo: Professor and (retiredFrom some University)\n\nObjectProperty: teaches\n  Domain: Instructor\n  Range: Course\n\nObjectProperty: supervisedBy\n  InverseOf: supervises\n  Domain: PhDStudent\n  Range: Professor\n```\n\nThese axioms allow an OWL reasoner to automatically classify any individual declared as a `Professor` as also being a `Researcher` and a `Person`, and to flag inconsistencies if someone is declared to belong to two disjoint classes.\n\n## Relationships\n\n- **Is-a:** Knowledge representation language, W3C standard\n- **Has-part:** Class axioms, property axioms, individual assertions, [[Description Logic]] constructors\n- **Related:** [[RDF]], [[RDFS]], [[Description Logic]], [[Ontology]], [[Class and Property]], [[SHACL]], [[Inference and Reasoning]]\n- **Used-by:** Protégé (ontology editor), HermiT/Pellet/ELK (reasoners), SNOMED CT, Gene Ontology, FIBO (financial ontology)\n\n## Sources\n\n- [needs-source]\n\n## See Also\n\n- [[RDF]]\n- [[RDFS]]\n- [[Description Logic]]\n- [[Ontology]]\n- [[Class and Property]]\n- [[Inference and Reasoning]]\n- [[SHACL]]\n- [[SPARQL]]\n" },
    { id: "RDF", category: "concepts", definition: "The Resource Description Framework — a W3C standard data model for representing information on the web as a graph of subject–predicate–object [[Triple|triples]].", content: "# RDF\n\n**Definition:** The Resource Description Framework — a W3C standard data model for representing information on the web as a graph of subject–predicate–object [[Triple|triples]].\n\n**Also known as:** Resource Description Framework, RDF 1.1.\n\n## Overview\n\nRDF is the foundational data model of the [[Semantic Web]]. Developed by the W3C and first standardized in 1999 (with major revisions in 2004 and 2014), RDF provides a universal, graph-based way to express any statement about any resource. Every statement in RDF takes the form of a [[Triple]]: a subject (the thing being described), a predicate (the property or relationship), and an object (the value or related thing). For example: `(ex:Marie_Curie, schema:birthPlace, ex:Warsaw)`.\n\nWhat makes RDF powerful for the web is its use of [[URI and IRI|URIs]] as identifiers for subjects, predicates, and object resources. Because URIs are global and dereferenceable, any two datasets that use the same URI for a concept are automatically talking about the same thing. This is what makes [[Linked Data]] possible: data published by different organizations can be merged and queried together without prior coordination, as long as they share vocabulary terms (predicates) defined by common [[Ontology|ontologies]] such as [[RDFS]], [[OWL]], or Schema.org.\n\nRDF graphs are naturally combinable. You can merge two RDF graphs by taking the union of their [[Triple|triples]] — something not possible with relational tables without knowing the schema in advance. This composability, combined with the expressivity of [[OWL]] axioms layered on top of RDF, makes RDF the backbone of large-scale [[Knowledge Graph]] initiatives such as Wikidata and DBpedia. The standard query language for RDF is [[SPARQL]], which allows selecting, filtering, and aggregating over triple patterns.\n\n## Key Properties\n\n- **Graph-based:** An RDF dataset is a directed, labeled multigraph.\n- **URI-identified:** Subjects and predicates must be [[URI and IRI|IRIs]]; objects can be IRIs, literals, or blank nodes.\n- **Interoperable:** Shared vocabularies allow merging datasets from different sources.\n- **Extensible:** RDF is the substrate on which [[RDFS]], [[OWL]], and [[SPARQL]] are built.\n- **Open-world:** No [[Triple]] is assumed false just because it is absent from the dataset.\n\n## Serialization Formats\n\nRDF is a data model, not a file format. The same graph can be serialized in several syntaxes:\n\n- **Turtle (.ttl):** Human-friendly, compact prefix notation. The preferred format for hand-authoring.\n- **N-Triples (.nt):** One triple per line, no prefixes. Easy to stream and diff.\n- **JSON-LD (.jsonld):** RDF expressed as JSON with a `@context` block. Friendly for web developers and APIs.\n- **RDF/XML (.rdf):** The original serialization, verbose but widely supported.\n- **TriG / N-Quads:** Extensions of Turtle and N-Triples that support named graphs (adding a fourth element — the graph name — to each statement).\n\n## Turtle Syntax Examples\n\nDeclaring a resource with multiple properties using `;` shorthand:\n\n```turtle\n@prefix ex:     <http://example.org/> .\n@prefix schema: <https://schema.org/> .\n@prefix xsd:    <http://www.w3.org/2001/XMLSchema#> .\n\nex:Marie_Curie\n    a schema:Person ;\n    schema:name \"Marie Curie\"@en ;\n    schema:birthDate \"1867-11-07\"^^xsd:date ;\n    schema:birthPlace ex:Warsaw ;\n    ex:fieldOfStudy ex:Physics , ex:Chemistry .\n```\n\nThe `a` keyword is shorthand for `rdf:type`. The `^^xsd:date` suffix is a datatype annotation. The `@en` tag marks the string as English.\n\n## Blank Nodes\n\nNot every node in an RDF graph needs a global [[URI and IRI|URI]]. Blank nodes (written `_:label` in Turtle) are locally-scoped anonymous resources, useful when an intermediate entity has no natural identifier. However, blank nodes complicate merging and querying, so they should be used sparingly.\n\n## Relationships\n\n- **Is-a:** Data model, W3C standard, graph model\n- **Has-part:** [[Triple]], [[URI and IRI]], literals, blank nodes\n- **Related:** [[RDFS]], [[OWL]], [[SPARQL]], [[Linked Data]], [[Semantic Web]], [[Knowledge Graph]]\n- **Used-by:** Wikidata, DBpedia, Schema.org, biomedical ontologies, library cataloging (BIBFRAME)\n\n## Examples\n\nThe same fact in three serialization formats:\n\n```turtle\n# Turtle\nex:Paris a ex:City ; ex:locatedIn ex:France .\n```\n\n```json\n// JSON-LD\n{\n  \"@context\": {\"ex\": \"http://example.org/\"},\n  \"@id\": \"ex:Paris\",\n  \"@type\": \"ex:City\",\n  \"ex:locatedIn\": {\"@id\": \"ex:France\"}\n}\n```\n\n```ntriples\n# N-Triples\n<http://example.org/Paris> <http://www.w3.org/1999/02/22-rdf-syntax-ns#type> <http://example.org/City> .\n<http://example.org/Paris> <http://example.org/locatedIn> <http://example.org/France> .\n```\n\n## Sources\n\n- [needs-source]\n\n## See Also\n\n- [[Triple]]\n- [[URI and IRI]]\n- [[RDFS]]\n- [[OWL]]\n- [[SPARQL]]\n- [[Linked Data]]\n- [[Semantic Web]]\n- [[Knowledge Graph]]\n" },
    { id: "RDFS", category: "concepts", definition: "A semantic extension of [[RDF]] that provides a vocabulary for describing classes, properties, and their relationships in an [[Ontology]].", content: "# RDF Schema (RDFS)\n\n**Definition:** A semantic extension of [[RDF]] that provides a vocabulary for describing classes, properties, and their relationships in an [[Ontology]].\n\n**Also known as:** RDFS, RDF Schema, RDF Vocabulary Description Language.\n\n## Overview\n\nRDF Schema builds directly on top of [[RDF]] by adding a layer of vocabulary that lets you describe the structure and meaning of your data, not just the data itself. While [[RDF]] gives you [[Triple|triples]] to make statements about resources, RDFS gives you the vocabulary to say what *kinds* of things those resources are and what *kinds* of relationships connect them.\n\nThink of RDFS as a lightweight schema language. If [[RDF]] is the raw assertion layer, RDFS is the first rung of semantic structure — it introduces concepts like classes and subclass hierarchies, property domains and ranges, and human-readable labels. It sits below [[OWL]] in expressive power but is far simpler and more universally supported. Many [[Knowledge Graph]] deployments use RDFS as their primary schema layer when full [[OWL]] reasoning is unnecessary.\n\nRDFS is defined in the `rdfs:` namespace (`http://www.w3.org/2000/01/rdf-schema#`) and is itself expressed as [[RDF]] triples, which means any [[RDF]] parser can read it without special tooling. This bootstrapping property — using [[RDF]] to describe [[RDF]] vocabularies — is one of the elegant design choices that makes the Semantic Web stack coherent. [[Inference and Reasoning]] engines can use RDFS axioms to derive implicit facts, such as inferring that an individual belongs to a superclass because it belongs to a declared subclass.\n\n## Key Properties\n\n- **`rdfs:Class`** — Declares a resource as a class; analogous to a type or category. Every [[OWL]] class is also an `rdfs:Class`.\n- **`rdfs:subClassOf`** — States that one class is a specialisation of another, enabling hierarchical [[Taxonomy|taxonomies]] of classes.\n- **`rdfs:subPropertyOf`** — States that one [[Class and Property|property]] is a specialisation of another, inheriting its semantics.\n- **`rdfs:domain`** — Declares that subjects of a [[Class and Property|property]] must belong to a given class.\n- **`rdfs:range`** — Declares that objects of a [[Class and Property|property]] must belong to a given class or datatype.\n- **`rdfs:label`** — Attaches a human-readable name to any resource; supports multiple languages via `@lang` tags.\n- **`rdfs:comment`** — Attaches a free-text description to a resource.\n- **`rdfs:seeAlso`** — Points to related resources with no formal semantic implication.\n- **`rdfs:isDefinedBy`** — Links a resource to the [[Ontology]] that defines it.\n\n## Relationships\n\n- **Is-a:** Vocabulary layer built on [[RDF]]; a subset of the features provided by [[OWL]]\n- **Has-part:** `rdfs:Class`, `rdfs:subClassOf`, `rdfs:domain`, `rdfs:range`, `rdfs:label`, `rdfs:comment`\n- **Related:** [[OWL]], [[Ontology]], [[Taxonomy]], [[Description Logic]], [[Triple]]\n- **Used-by:** [[SPARQL]] queries that pattern-match on class hierarchies; [[Inference and Reasoning]] engines that apply RDFS entailment rules; [[Linked Data]] vocabularies such as FOAF, Dublin Core, and Schema.org\n\n## Examples\n\nThe following examples use Turtle syntax, a concise serialisation of [[RDF]] triples.\n\n**Declaring a class hierarchy:**\n\n```turtle\n@prefix rdfs: <http://www.w3.org/2000/01/rdf-schema#> .\n@prefix ex:   <http://example.org/> .\n\nex:Animal  a rdfs:Class ;\n           rdfs:label \"Animal\"@en ;\n           rdfs:comment \"Any living organism that is not a plant.\"@en .\n\nex:Mammal  a rdfs:Class ;\n           rdfs:subClassOf ex:Animal ;\n           rdfs:label \"Mammal\"@en .\n\nex:Dog     a rdfs:Class ;\n           rdfs:subClassOf ex:Mammal ;\n           rdfs:label \"Dog\"@en .\n```\n\n**Declaring a property with domain and range:**\n\n```turtle\nex:hasPet  a rdf:Property ;\n           rdfs:domain ex:Person ;\n           rdfs:range  ex:Animal ;\n           rdfs:label  \"has pet\"@en .\n```\n\nHere, any [[Triple]] using `ex:hasPet` as its predicate implies that its subject is an `ex:Person` and its object is an `ex:Animal`. An [[Inference and Reasoning]] engine applying RDFS entailment rules will derive these type assertions automatically — even if they were never stated explicitly in the [[RDF]] graph.\n\n**`rdfs:subPropertyOf` example:**\n\n```turtle\nex:hasDog  a rdf:Property ;\n           rdfs:subPropertyOf ex:hasPet ;\n           rdfs:range ex:Dog .\n```\n\nAny fact stated with `ex:hasDog` is now also implicitly asserted with `ex:hasPet`, which is how [[Inference and Reasoning]] propagates through property hierarchies.\n\nRDFS vocabulary is frequently combined with [[OWL]] when richer axioms — such as cardinality restrictions or disjointness — are needed. For validation of the resulting [[RDF]] graph, see [[SHACL]], which operates independently of entailment.\n\n## Sources\n\n- [needs-source]\n\n## See Also\n\n- [[RDF]]\n- [[OWL]]\n- [[Class and Property]]\n- [[Triple]]\n- [[Ontology]]\n- [[Taxonomy]]\n- [[SPARQL]]\n- [[Inference and Reasoning]]\n- [[SHACL]]\n" },
    { id: "Securities", category: "concepts", definition: "Fungible, tradeable [[Financial Instrument]]s representing ownership (equities), debt obligations (bonds), or pooled investment interests (funds), formally modeled in [[FIBO]]'s SEC domain module.", content: "# Securities\n\n**Definition:** Fungible, tradeable [[Financial Instrument]]s representing ownership (equities), debt obligations (bonds), or pooled investment interests (funds), formally modeled in [[FIBO]]'s SEC domain module.\n\n**Also known as:** Listed securities, transferable securities, investment securities.\n\n## Overview\n\nSecurities form the core of most [[Financial Ontology]] work because they are the most heavily regulated, most data-rich, and most widely traded category of [[Financial Instrument]]. In [[FIBO]], the SEC module is one of the largest and most mature domain areas, covering equities (common stock, preferred stock, depositary receipts), debt instruments (government bonds, corporate bonds, notes, commercial paper), funds (ETFs, mutual funds, money market funds), and structured products (mortgage-backed securities, CDOs). Each of these maps to a named [[OWL]] class with formal restrictions encoding the definitional properties that distinguish them.\n\nFrom an ontology modeling perspective, securities present a layered identification challenge. A single equity may exist as a legal concept (the share class, identified by ISIN under ISO 6166), as a listing on a specific [[Stock Exchange]] (identified by a venue-scoped [[FIGI]] and a MIC code from [[Financial Identifier]] standards), and as a position in a portfolio (identified by internal account references). [[FIBO]] handles this by distinguishing `ListedSecurity` from the underlying instrument class: a `CommonStock` is an [[OWL]] individual of the instrument class, while its listing on the NYSE is a separate `ListedSecurity` instance related via `isListedAs`. This layering is critical for [[Inference and Reasoning]] — a reasoner can infer that any `ListedSecurity` traded on a venue with a particular MIC is subject to that venue's regulatory regime.\n\n[[SPARQL]] queries over [[RDF]] representations of securities data enable cross-referencing between [[FIBO]] class assertions and external datasets such as Wikidata (which uses property P946 for ISIN) and DBpedia. The [[Class and Property]] hierarchy in FIBO SEC is published as [[OWL]] 2 DL, meaning any OWL-DL reasoner can compute inferred class memberships — for example, inferring that a convertible bond satisfies both debt and equity instrument restrictions under certain conditions.\n\n## Key Properties\n\n- `hasISIN` — ISO 6166 identifier (12 characters)\n- `isListedAs` — links instrument to `ListedSecurity` instance on a [[Stock Exchange]]\n- `hasMIC` — Market Identifier Code (ISO 10383) for trading venue\n- `hasCFICode` — [[ISO 10962 CFI]] classification code\n- `isIssuedBy` — reference to issuing [[Legal Entity]]\n- `hasFIGI` — open [[Financial Identifier]] for cross-system lookup\n\n## Relationships\n\n- **Is-a:** [[Financial Instrument]]\n- **Has-part:** Equities (common stock, preferred stock), debt instruments (bonds, notes), ETFs, structured products\n- **Related:** [[Financial Identifier]], [[Stock Exchange]], [[Derivatives]], [[FIBO]], [[ISO 10962 CFI]]\n- **Used-by:** Trading platforms, regulatory reporting (MiFID II, SEC filings), portfolio management systems, [[Financial Knowledge Graph]]\n\n## Examples\n\n- Apple Inc. common stock: ISIN `US0378331005`, CFI `ESVUFR`, listed on NASDAQ (MIC: `XNAS`)\n- A 10-year US Treasury Note modeled as `fibo-sec-dbt:GovernmentBond` in FIBO with maturity date and coupon rate restrictions\n- An S&P 500 ETF node in a [[Knowledge Graph]] linked to its index via `tracksIndex` and to constituent equities via `hasConstituent`\n\n## Sources\n\n- `sources/articles/fibo-financial-industry-business-ontology.md`\n- `sources/web-clips/financial-identifier-standards.md`\n- `sources/articles/iso-10962-cfi-classification.md`\n\n## See Also\n\n- [[Financial Instrument]], [[FIBO]], [[Ontology]], [[Class and Property]], [[Financial Identifier]]\n- [[Stock Exchange]], [[Derivatives]], [[OWL]], [[Financial Ontology]], [[ISO 10962 CFI]]\n" },
    { id: "Semantic Web", category: "concepts", definition: "An extension of the World Wide Web in which data is given well-defined meaning through standard formats and [[Ontology|ontologies]], enabling machines to interpret and reason over web content automatically.", content: "# Semantic Web\n\n**Definition:** An extension of the World Wide Web in which data is given well-defined meaning through standard formats and [[Ontology|ontologies]], enabling machines to interpret and reason over web content automatically.\n\n**Also known as:** Web of Data, Web 3.0 (loosely), Giant Global Graph.\n\n## Overview\n\nTim Berners-Lee, the inventor of the World Wide Web, introduced the Semantic Web vision in a 2001 Scientific American article co-authored with James Hendler and Ora Lassila. The core idea is simple but ambitious: the web as it existed was a web of documents for humans to read; the Semantic Web would be a web of data for machines to process. Instead of web pages containing text marked up with presentational HTML, resources would be described with structured, linked data using [[RDF]], typed by [[Ontology|ontologies]] expressed in [[RDFS]] and [[OWL]], and queryable via [[SPARQL]].\n\nThe practical realization of the Semantic Web proceeded in layers, famously depicted as the \"Semantic Web Stack\" or \"Layer Cake\" — a diagram showing each technology building on those below it. At the base sit Unicode and [[URI and IRI|URIs]] (the universal naming and character infrastructure), then [[RDF]] (the data model), then [[RDFS]] and [[OWL]] (the schema and ontology languages), then [[SPARQL]] (query), then logic and proof layers, and finally trust and digital signatures at the top. The full stack has never been uniformly deployed across the open web, but its lower layers — [[RDF]], [[OWL]], and [[SPARQL]] — are now mature, widely implemented standards used daily in enterprise data integration, library systems, biomedical research, and [[Knowledge Graph]] construction.\n\nThe Semantic Web's most concrete practical achievement is [[Linked Data]]: the publication of structured [[RDF]] data on the web using dereferenceable [[URI and IRI|URIs]], linked across datasets. The Linked Open Data (LOD) Cloud grew from a handful of datasets in 2007 to thousands today. Projects like DBpedia (structured data from Wikipedia), Wikidata (a freely editable knowledge base), and GeoNames demonstrate what interconnected open data looks like at scale. Meanwhile, Schema.org — a vocabulary for embedding structured data in HTML pages, supported by Google, Microsoft, Yahoo, and Yandex — brought Semantic Web ideas into mainstream web publishing without requiring publishers to adopt full [[RDF]] tooling.\n\n## The Semantic Web Stack\n\nThe layer cake organizes the technologies from infrastructure to application:\n\n| Layer | Technologies |\n|---|---|\n| Trust | Digital signatures, provenance |\n| Proof | Formal proofs, verification |\n| Logic | Rule languages (SWRL), [[Inference and Reasoning]] |\n| Ontology | [[OWL]], [[RDFS]] |\n| Query | [[SPARQL]] |\n| Data | [[RDF]], [[Triple|triples]] |\n| Syntax | [[RDF]]/XML, Turtle, JSON-LD |\n| Identifiers | [[URI and IRI|URI/IRI]] |\n| Characters | Unicode |\n\nIn practice, the logic, proof, and trust layers remain research areas rather than deployed infrastructure. The real-world Semantic Web operates primarily at the data, query, and ontology layers.\n\n## Key Properties\n\n- **Machine-readable:** Data carries explicit semantics interpretable by software without human mediation.\n- **Decentralized:** No single authority controls the web of data; anyone can publish and link.\n- **Open standards:** All core technologies are W3C recommendations, royalty-free.\n- **Linked:** Datasets reference each other via shared [[URI and IRI|URIs]], forming a global graph.\n- **Inferential:** [[OWL]] ontologies and rule languages allow [[Inference and Reasoning|deriving new facts]] from existing ones.\n\n## Relationships\n\n- **Is-a:** Vision for the future web, data ecosystem, W3C standards family\n- **Has-part:** [[RDF]], [[OWL]], [[RDFS]], [[SPARQL]], [[Linked Data]], [[URI and IRI]], [[Ontology]]\n- **Related:** [[Knowledge Graph]], [[Linked Data]], [[Inference and Reasoning]]\n- **Used-by:** DBpedia, Wikidata, Schema.org, library catalog systems, pharmaceutical data integration, government open data portals\n\n## Examples\n\nA web page author embedding Semantic Web data using JSON-LD (Schema.org vocabulary):\n\n```html\n<script type=\"application/ld+json\">\n{\n  \"@context\": \"https://schema.org\",\n  \"@type\": \"Person\",\n  \"name\": \"Marie Curie\",\n  \"birthDate\": \"1867-11-07\",\n  \"birthPlace\": {\n    \"@type\": \"City\",\n    \"name\": \"Warsaw\"\n  },\n  \"award\": \"Nobel Prize in Physics\"\n}\n<\/script>\n```\n\nThis snippet, embedded in an HTML page, is valid [[RDF]] data that search engines and other automated processors can extract and use — the Semantic Web operating inside ordinary web publishing.\n\n## Sources\n\n- [needs-source]\n\n## See Also\n\n- [[RDF]]\n- [[OWL]]\n- [[RDFS]]\n- [[SPARQL]]\n- [[Linked Data]]\n- [[URI and IRI]]\n- [[Ontology]]\n- [[Knowledge Graph]]\n- [[Inference and Reasoning]]\n" },
    { id: "SHACL", category: "concepts", definition: "A W3C standard language for validating [[RDF]] graphs against a set of conditions (shapes), used to enforce data quality and structural integrity in [[Knowledge Graph|knowledge graphs]].", content: "# SHACL (Shapes Constraint Language)\n\n**Definition:** A W3C standard language for validating [[RDF]] graphs against a set of conditions (shapes), used to enforce data quality and structural integrity in [[Knowledge Graph|knowledge graphs]].\n\n**Also known as:** SHACL, Shapes Constraint Language, SHACL Core, SHACL-SPARQL.\n\n## Overview\n\nSHACL (pronounced \"shackle\") is the W3C standard for expressing constraints over [[RDF]] data. Where [[OWL]] and [[Description Logic]] are concerned with what can be *inferred* from a graph, SHACL is concerned with what the graph *must look like* to be valid. This distinction is fundamental: [[OWL]] uses an open-world assumption and cannot flag a missing triple as an error, whereas SHACL explicitly adopts a closed-world stance and reports constraint violations when expected data is absent or malformed.\n\nA SHACL **shapes graph** is itself an [[RDF]] graph written in [[Triple|triples]] — typically serialised in Turtle — and is validated against a separate **data graph**. The SHACL processor applies each shape to the nodes it targets, evaluates all declared constraints, and produces a **validation report** (also an [[RDF]] graph) listing any violations. This design makes SHACL natively interoperable with the rest of the Semantic Web stack: shapes are [[RDF]], reports are [[RDF]], and [[SPARQL]] can query both.\n\nSHACL comes in two flavours. **SHACL Core** provides a declarative constraint vocabulary — property shapes, node shapes, cardinality, value types, string patterns — sufficient for most data validation tasks without any SPARQL knowledge. **SHACL-SPARQL** extends Core by letting constraint authors embed [[SPARQL]] SELECT or ASK queries directly in shapes, enabling arbitrary graph-pattern constraints. This layered design means simple teams can use Core while advanced users exploit the full power of [[SPARQL]] for complex cross-graph constraints.\n\nSHACL's main competitor is **ShEx** (Shape Expressions), developed by a separate community. Both languages describe the expected structure of [[RDF]] graphs, but they differ in syntax philosophy, validation semantics (particularly around recursion), and ecosystem adoption. SHACL is the W3C Recommendation and has broader triple-store support; ShEx is preferred in some biomedical data communities.\n\n## Key Properties\n\n- **Shapes graph:** an [[RDF]] graph containing `sh:NodeShape` and `sh:PropertyShape` declarations\n- **Data graph:** the [[RDF]] graph (or [[Knowledge Graph]]) being validated\n- **Targets:** mechanisms for selecting which nodes a shape applies to — `sh:targetClass`, `sh:targetNode`, `sh:targetSubjectsOf`, `sh:targetObjectsOf`\n- **Constraints:** conditions a target node must satisfy — type, cardinality, value range, pattern, `sh:in`, `sh:hasValue`, `sh:equals`, `sh:lessThan`\n- **Severity levels:** `sh:Violation`, `sh:Warning`, `sh:Info`\n- **Validation report:** an [[RDF]] graph with `sh:ValidationReport` and `sh:ValidationResult` nodes\n- **SHACL-SPARQL:** `sh:sparql` constraint attaches a [[SPARQL]] query that must return no results for the data to be valid\n- **SHACL Advanced Features:** `sh:rule` for inference-like derivation (not validation); `sh:target` for custom target declarations\n\n## Shapes, Targets, and Constraints\n\nA **node shape** (`sh:NodeShape`) declares constraints that apply to an entire node. A **property shape** (`sh:PropertyShape`) declares constraints that apply to the values of a specific property. Property shapes are nested inside node shapes via `sh:property`.\n\n**Targets** determine which nodes in the data graph are checked by a shape:\n\n| Target Declaration | Selects |\n|---|---|\n| `sh:targetClass ex:Person` | All `rdf:type ex:Person` instances |\n| `sh:targetNode ex:alice` | Exactly the node `ex:alice` |\n| `sh:targetSubjectsOf ex:worksFor` | All nodes that appear as subject of `ex:worksFor` |\n| `sh:targetObjectsOf ex:hasChild` | All nodes that appear as object of `ex:hasChild` |\n\nThis targeting mechanism means SHACL shapes work independently of [[OWL]] class definitions — you can validate a plain [[RDF]] graph without any [[Ontology]], or combine SHACL with an [[OWL]] [[Ontology]] and target shapes at [[OWL]] classes simultaneously.\n\n## SHACL vs OWL / RDFS\n\n| Aspect | SHACL | [[OWL]] / [[RDFS]] |\n|---|---|---|\n| World assumption | Closed-world | Open-world |\n| Missing triple is | A violation (if required) | Simply unknown |\n| Primary purpose | Data validation | [[Inference and Reasoning]] and knowledge modelling |\n| Output | Validation report ([[RDF]]) | Inferred triples |\n| [[SPARQL]] integration | SHACL-SPARQL constraints | Entailment regimes |\n| Reasoning required | No | Yes (for full [[OWL]]) |\n\nSHACL and [[OWL]] are **complementary**: [[OWL]] defines what things *mean* and enables [[Inference and Reasoning|inference]], SHACL defines what data *must look like* and enables validation. Many production [[Knowledge Graph]] pipelines use both — [[OWL]] for semantic enrichment and SHACL for data quality gates.\n\n## SHACL vs ShEx\n\n| Aspect | SHACL | ShEx |\n|---|---|---|\n| Specification body | W3C Recommendation | W3C Community Group |\n| Syntax | [[RDF]]/Turtle (plus SHACL-SPARQL) | ShExC (compact) or ShExJ (JSON) |\n| Semantics | Partition-based | Shape maps |\n| Recursive shapes | Limited | Full support |\n| Triple store support | Broad (GraphDB, Stardog, Apache Jena) | Narrower |\n| Adoption | Enterprise, government data | Biomedical (e.g., Wikidata ShEx schemas) |\n\n## Examples in Turtle\n\n### Basic node and property shapes\n\n```turtle\n@prefix sh:   <http://www.w3.org/ns/shacl#> .\n@prefix ex:   <http://example.org/> .\n@prefix xsd:  <http://www.w3.org/2001/XMLSchema#> .\n@prefix foaf: <http://xmlns.com/foaf/0.1/> .\n\n# Node shape: validates all ex:Person instances\nex:PersonShape\n    a sh:NodeShape ;\n    sh:targetClass ex:Person ;\n\n    # Must have exactly one foaf:name, which must be a string\n    sh:property [\n        sh:path     foaf:name ;\n        sh:minCount 1 ;\n        sh:maxCount 1 ;\n        sh:datatype xsd:string ;\n        sh:message  \"A Person must have exactly one foaf:name string.\"@en ;\n    ] ;\n\n    # Must have at least one ex:email matching a pattern\n    sh:property [\n        sh:path    ex:email ;\n        sh:minCount 1 ;\n        sh:pattern \"^[\\\\w.]+@[\\\\w.]+\\\\.[a-z]{2,}$\" ;\n        sh:flags   \"i\" ;\n        sh:message \"A Person must have a valid email address.\"@en ;\n    ] ;\n\n    # Age, if present, must be a non-negative integer\n    sh:property [\n        sh:path    ex:age ;\n        sh:maxCount 1 ;\n        sh:datatype xsd:integer ;\n        sh:minInclusive 0 ;\n        sh:maxInclusive 150 ;\n    ] .\n```\n\n### Value type constraint — object property must point to an [[OWL]] class instance\n\n```turtle\nex:EmploymentShape\n    a sh:NodeShape ;\n    sh:targetClass ex:Employment ;\n\n    sh:property [\n        sh:path  ex:employee ;\n        sh:class ex:Person ;        # object must be rdf:type ex:Person\n        sh:minCount 1 ;\n        sh:maxCount 1 ;\n    ] ;\n\n    sh:property [\n        sh:path  ex:employer ;\n        sh:class ex:Organisation ;\n        sh:minCount 1 ;\n    ] .\n```\n\n### `sh:or` — disjunctive constraint\n\n```turtle\nex:ContactShape\n    a sh:NodeShape ;\n    sh:targetClass ex:Contact ;\n    sh:or (\n        [ sh:property [ sh:path ex:email   ; sh:minCount 1 ] ]\n        [ sh:property [ sh:path ex:phone   ; sh:minCount 1 ] ]\n    ) ;\n    sh:message \"A Contact must have at least an email or a phone number.\"@en .\n```\n\n### SHACL-SPARQL constraint — cross-node validation using [[SPARQL]]\n\n```turtle\nex:UniqueNameShape\n    a sh:NodeShape ;\n    sh:targetClass ex:Person ;\n    sh:sparql [\n        a sh:SPARQLConstraint ;\n        sh:message \"Two persons share the same foaf:name value.\" ;\n        sh:prefixes ex: ;\n        sh:select \"\"\"\n            PREFIX foaf: <http://xmlns.com/foaf/0.1/>\n            SELECT $this ?other\n            WHERE {\n                $this foaf:name ?name .\n                ?other foaf:name ?name .\n                FILTER ($this != ?other)\n            }\n        \"\"\" ;\n    ] .\n```\n\nThis constraint embeds a [[SPARQL]] SELECT query; any non-empty result set triggers a violation. This is impossible to express in SHACL Core alone, demonstrating how SHACL-SPARQL extends the base language using the full power of [[Triple]] pattern matching.\n\n### Validation report structure\n\nWhen a SHACL processor finds violations, it produces an [[RDF]] report:\n\n```turtle\n[] a sh:ValidationReport ;\n   sh:conforms false ;\n   sh:result [\n       a sh:ValidationResult ;\n       sh:focusNode ex:bob ;\n       sh:resultPath foaf:name ;\n       sh:resultSeverity sh:Violation ;\n       sh:sourceConstraintComponent sh:MinCountConstraintComponent ;\n       sh:resultMessage \"A Person must have exactly one foaf:name string.\"@en ;\n   ] .\n```\n\nThe report is itself queryable with [[SPARQL]], enabling automated data quality dashboards and pipeline gating.\n\n## Relationships\n\n- **Is-a:** [[RDF]] graph validation language; W3C Recommendation (2017)\n- **Has-part:** Shapes graph, node shapes, property shapes, targets, constraints, validation report, SHACL-SPARQL\n- **Related:** [[RDF]], [[OWL]], [[Knowledge Graph]], [[Triple]], [[SPARQL]], [[RDFS]], [[Inference and Reasoning]]\n- **Used-by:** Data quality pipelines (Apache Jena, TopBraid SHACL, pySHACL, RDF4J, GraphDB, Stardog); government open data publishing; biomedical [[Knowledge Graph|knowledge graphs]]; enterprise data governance\n\n## Sources\n\n- [needs-source]\n\n## See Also\n\n- [[RDF]]\n- [[OWL]]\n- [[RDFS]]\n- [[Triple]]\n- [[Knowledge Graph]]\n- [[SPARQL]]\n- [[Inference and Reasoning]]\n- [[Class and Property]]\n- [[Ontology]]\n" },
    { id: "Skos", category: "concepts", definition: "Simple Knowledge Organization System — a W3C [[RDF]] vocabulary for representing taxonomies, thesauri, classification schemes, and controlled vocabularies as [[Linked Data]].", content: "# SKOS\n\n**Definition:** Simple Knowledge Organization System — a W3C [[RDF]] vocabulary for representing taxonomies, thesauri, classification schemes, and controlled vocabularies as [[Linked Data]].\n\n**Also known as:** Simple Knowledge Organization System, SKOS Core.\n\n## Overview\n\nSKOS is the W3C standard vocabulary for publishing knowledge organization systems — taxonomies, thesauri, glossaries, and classification schemes — as [[RDF]] graphs. Where [[OWL]] provides the full expressivity of [[Description Logic]] for formal ontologies, SKOS occupies a pragmatic middle ground: it is rich enough to capture hierarchical and associative relationships between concepts, simple enough to be adopted by information professionals without ontology engineering expertise, and fully compatible with the [[Semantic Web]] stack. SKOS concepts are [[RDF]] resources identified by [[URI and IRI]]s, organized into `skos:ConceptScheme` containers, and related through `skos:broader`, `skos:narrower`, and `skos:related` properties.\n\nIn financial standards, SKOS is the primary vehicle for publishing code lists and classification schemes as [[Linked Data]]. [[ISO 10962 CFI]] uses SKOS to represent its six-character instrument classification hierarchy: the top-level category codes (E for equities, D for debt, O for options, etc.) become `skos:Concept` instances in a `skos:ConceptScheme`, with attribute value codes linked via `skos:narrower`. This makes CFI codes directly integrable into [[SPARQL]] queries over [[FIBO]] and [[Financial Knowledge Graph]] environments. Similarly, [[GLEIF]] uses SKOS-style concept schemes for its EntityLegalForm and RegistrationAuthority code lists, ensuring that the thousands of jurisdiction-specific legal form codes are consistently identified and interoperable across systems.\n\n[[FIBO]] itself publishes a SKOS glossary at `https://spec.edmcouncil.org/fibo/glossary` — a human-browsable thesaurus representation of FIBO's [[OWL]] class hierarchy that exposes definitions, synonyms, and related terms using `skos:prefLabel`, `skos:altLabel`, and `skos:definition`. This dual publication (OWL for reasoning, SKOS for browsing) is a common pattern in enterprise ontology deployment where both machine inference and human navigation are required. [[RDFS]] label properties and SKOS annotation properties are often used together: `rdfs:label` for basic RDF tooling, `skos:prefLabel` for terminology management systems.\n\n## Key Properties\n\n- `skos:ConceptScheme` — container for a set of concepts (e.g., a classification system)\n- `skos:Concept` — a unit of thought in the scheme, identified by a [[URI and IRI]]\n- `skos:prefLabel` — preferred human-readable label (one per language)\n- `skos:altLabel` — synonyms and alternative labels\n- `skos:broader` / `skos:narrower` — hierarchical relationships\n- `skos:related` — associative (non-hierarchical) relationships\n- `skos:definition` — formal definition text\n- `skos:notation` — code or symbol (e.g., CFI code string)\n\n## Relationships\n\n- **Is-a:** [[RDF]] vocabulary, W3C standard\n- **Has-part:** ConceptScheme, Concept, Collection, OrderedCollection\n- **Related:** [[RDF]], [[RDFS]], [[OWL]], [[Taxonomy]], [[Linked Data]]\n- **Used-by:** [[ISO 10962 CFI]] code lists, [[GLEIF]] code lists, [[FIBO]] glossary, library catalogues, government vocabularies\n\n## Examples\n\n- ISO 10962 CFI category `E` (Equities) published as `skos:Concept` with `skos:narrower` links to share-type attribute codes\n- GLEIF EntityLegalForm `skos:ConceptScheme` with 3,000+ jurisdiction-specific legal form concepts\n- FIBO glossary: `fibo-be-le-cb:Corporation` as `skos:Concept` with `skos:definition` drawn from the OWL class annotation\n\n## Sources\n\n- `sources/articles/fibo-financial-industry-business-ontology.md`\n- `sources/articles/iso-10962-cfi-classification.md`\n- `sources/articles/gleif-legal-entity-identifier.md`\n\n## See Also\n\n- [[RDF]], [[RDFS]], [[OWL]], [[Taxonomy]], [[W3C]], [[Linked Data]]\n- [[ISO 10962 CFI]], [[GLEIF]], [[Financial Ontology]], [[FIBO]]\n" },
    { id: "SPARQL", category: "concepts", definition: "A declarative query language and protocol for retrieving and manipulating data stored in [[RDF]] graphs and [[Knowledge Graph|knowledge graphs]].", content: "# SPARQL Query Language\n\n**Definition:** A declarative query language and protocol for retrieving and manipulating data stored in [[RDF]] graphs and [[Knowledge Graph|knowledge graphs]].\n\n**Also known as:** SPARQL (recursive acronym: SPARQL Protocol and RDF Query Language), SPARQL 1.0, SPARQL 1.1.\n\n## Overview\n\nSPARQL is to [[RDF]] what SQL is to relational databases: the standard way to ask questions of a graph-structured dataset. A SPARQL query describes a pattern of [[Triple|triples]] — some slots filled with known [[URI and IRI|URIs]] or literals, others left as variables — and the query engine finds every combination of values for those variables that makes the pattern hold true in the target graph.\n\nBecause [[RDF]] data is stored as [[Triple|subject-predicate-object triples]], SPARQL queries are themselves composed of triple patterns that mirror that structure. Variables are prefixed with `?` (or `$`). The engine performs a graph-pattern match: it finds subgraphs in the [[RDF]] dataset that are isomorphic to the query pattern, then binds variables to the matched nodes and edges. This graph-centric model makes SPARQL naturally suited to traversing [[Linked Data]] endpoints, federated [[Knowledge Graph|knowledge graphs]], and [[RDFS]]/[[OWL]]-described vocabularies.\n\nSPARQL 1.1 (W3C Recommendation, 2013) added aggregates, subqueries, property paths, federated queries via `SERVICE`, and an update language (SPARQL Update). It has four query forms — SELECT, CONSTRUCT, ASK, and DESCRIBE — each returning results in a different shape. Understanding when to use each form is central to working with any [[Knowledge Graph]] or [[Linked Data]] system built on [[RDF]].\n\n## Key Properties\n\n- **Query forms:** SELECT, CONSTRUCT, ASK, DESCRIBE\n- **Graph patterns:** basic triple patterns, optional patterns (`OPTIONAL`), alternatives (`UNION`), negation (`FILTER NOT EXISTS`, `MINUS`)\n- **Filters:** `FILTER` with expressions — string functions, numeric comparisons, regex, `LANG()`, `DATATYPE()`\n- **Aggregates:** `COUNT`, `SUM`, `AVG`, `MIN`, `MAX` with `GROUP BY` and `HAVING`\n- **Property paths:** regex-like traversal syntax for navigating multi-hop paths without specifying each [[Triple]] step\n- **Federation:** `SERVICE` keyword queries remote SPARQL endpoints, enabling [[Linked Data]] federation\n- **SPARQL Update:** `INSERT DATA`, `DELETE DATA`, `INSERT/DELETE WHERE` for modifying [[RDF]] graphs\n- **Entailment regimes:** query engines may apply [[RDFS]] or [[OWL]] [[Inference and Reasoning]] before answering\n\n## Relationships\n\n- **Is-a:** Query language; W3C standard\n- **Has-part:** SELECT, CONSTRUCT, ASK, DESCRIBE query forms; FILTER, OPTIONAL, UNION, MINUS clauses; SPARQL Update; SPARQL Protocol (HTTP interface)\n- **Related:** [[RDF]], [[Triple]], [[URI and IRI]], [[Linked Data]], [[Knowledge Graph]], [[RDFS]], [[OWL]], [[SHACL]]\n- **Used-by:** [[Knowledge Graph]] query interfaces (Wikidata Query Service, DBpedia, bio2RDF); triple stores (Apache Jena, Virtuoso, GraphDB, Stardog, Amazon Neptune); [[Ontology]] browsers\n\n## Examples\n\n### Sample data (Turtle)\n\n```turtle\n@prefix ex:  <http://example.org/> .\n@prefix foaf: <http://xmlns.com/foaf/0.1/> .\n\nex:alice  a foaf:Person ;\n          foaf:name \"Alice\" ;\n          foaf:knows ex:bob ;\n          ex:age 30 .\n\nex:bob    a foaf:Person ;\n          foaf:name \"Bob\" ;\n          ex:age 25 .\n```\n\n### SELECT — retrieve variable bindings\n\n```sparql\nPREFIX foaf: <http://xmlns.com/foaf/0.1/>\nPREFIX ex:   <http://example.org/>\n\nSELECT ?name ?age\nWHERE {\n  ?person a foaf:Person ;\n          foaf:name ?name ;\n          ex:age    ?age .\n  FILTER (?age > 20)\n}\nORDER BY ?name\n```\n\nReturns a table of `?name` and `?age` for all persons older than 20 — analogous to a SQL SELECT with a WHERE clause.\n\n### CONSTRUCT — return a new [[RDF]] graph\n\n```sparql\nPREFIX foaf: <http://xmlns.com/foaf/0.1/>\nPREFIX ex:   <http://example.org/>\n\nCONSTRUCT {\n  ?a ex:friendOf ?b .\n}\nWHERE {\n  ?a foaf:knows ?b .\n}\n```\n\nTransforms `foaf:knows` [[Triple|triples]] into `ex:friendOf` triples, constructing a new [[RDF]] graph as the result.\n\n### ASK — boolean existence check\n\n```sparql\nPREFIX foaf: <http://xmlns.com/foaf/0.1/>\n\nASK {\n  ?person foaf:name \"Alice\" .\n}\n```\n\nReturns `true` if any [[Triple]] in the graph matches this pattern.\n\n### DESCRIBE — return a graph description\n\n```sparql\nDESCRIBE <http://example.org/alice>\n```\n\nReturns an [[RDF]] graph describing `ex:alice` — the exact content is implementation-defined but typically includes all [[Triple|triples]] where the resource appears as subject or object.\n\n### OPTIONAL and UNION\n\n```sparql\nSELECT ?name ?email\nWHERE {\n  ?p foaf:name ?name .\n  OPTIONAL { ?p foaf:mbox ?email . }\n}\n```\n\n`OPTIONAL` is a left outer join: persons without a `foaf:mbox` [[Triple]] still appear in results, with `?email` unbound.\n\n```sparql\nSELECT ?contact\nWHERE {\n  { ?p foaf:mbox ?contact . }\n  UNION\n  { ?p foaf:phone ?contact . }\n}\n```\n\n`UNION` merges solutions from two alternative graph patterns.\n\n### Property path (multi-hop)\n\n```sparql\nPREFIX foaf: <http://xmlns.com/foaf/0.1/>\n\nSELECT ?indirect\nWHERE {\n  ex:alice foaf:knows+ ?indirect .\n}\n```\n\nThe `+` path operator matches one or more `foaf:knows` hops, traversing a social network without stating every [[Triple]] step. This is particularly powerful in [[Knowledge Graph]] exploration and is related to how [[Inference and Reasoning]] walks class hierarchies defined in [[RDFS]].\n\n## Sources\n\n- [needs-source]\n\n## See Also\n\n- [[RDF]]\n- [[Triple]]\n- [[URI and IRI]]\n- [[Knowledge Graph]]\n- [[Linked Data]]\n- [[RDFS]]\n- [[OWL]]\n- [[SHACL]]\n- [[Inference and Reasoning]]\n" },
    { id: "Stock Exchange", category: "concepts", definition: "A regulated marketplace where [[Securities]] and other [[Financial Instrument]]s are listed and traded, modeled in ontologies as a [[Legal Entity]] subclass with venue-specific properties including MIC codes and trading rules.", content: "# Stock Exchange\n\n**Definition:** A regulated marketplace where [[Securities]] and other [[Financial Instrument]]s are listed and traded, modeled in ontologies as a [[Legal Entity]] subclass with venue-specific properties including MIC codes and trading rules.\n\n**Also known as:** Securities exchange, trading venue, bourse, equity market.\n\n## Overview\n\nStock exchanges are a critical node type in any [[Financial Ontology]] because they sit at the intersection of instrument, entity, and regulatory modeling. In [[FIBO]], the `StockExchange` class is a subclass of `FinancialMarket`, which is itself situated in the FBC (Financial Business and Commerce) module. An exchange is simultaneously a [[Legal Entity]] (with a LEI, a jurisdiction, a registered name), an operational venue (with trading hours, listed instruments, clearing relationships), and a regulatory subject (licensed by a national securities regulator). This multi-role nature requires careful [[Class and Property]] design using [[OWL]] to avoid conflating the institution with the trading venue — FIBO distinguishes `Exchange` from `ExchangeOperator` for precisely this reason.\n\nThe primary identifier for trading venues is the MIC (Market Identifier Code) under ISO 10383 — a 4-character code maintained by ISO and referenced throughout [[FIBO]], [[Financial Identifier]] standards, and regulatory reporting frameworks. MIC codes appear in [[FIGI]] assignments (every exchange-specific FIGI references its MIC), in MiFID II transaction reports, and in [[SPARQL]] queries over [[Financial Knowledge Graph]] data. A single exchange group (e.g., Euronext) may operate multiple trading venues, each with its own MIC — FIBO's `ExchangeGroup` class captures this hierarchical relationship.\n\nExchanges are also major nodes in knowledge enrichment via [[Wikidata]] and [[DBpedia]]. Wikidata items for major exchanges carry MIC codes, LEIs, Wikidata entity IDs, and links to listed companies — making them useful federation targets when building a [[Financial Knowledge Graph]]. A [[SPARQL]] federated query can join FIBO's exchange ontology with Wikidata's exchange items using `owl:sameAs` or shared MIC literals, enriching the graph with historical founding dates, regulatory authority links, and index associations that FIBO does not model directly.\n\n## Key Properties\n\n- `hasMIC` — ISO 10383 Market Identifier Code (4 characters)\n- `hasLEI` — ISO 17442 identifier as a [[Legal Entity]]\n- `hasJurisdiction` — country/region of regulatory oversight\n- `operatesUnderRegulator` — links to national securities regulator\n- `lists` — links to `ListedSecurity` instances traded on the venue\n- `operatesAs` — distinguishes operating entity from market facility\n\n## Relationships\n\n- **Is-a:** [[Legal Entity]], financial market, trading venue\n- **Has-part:** Trading segments, listing segments, clearing arrangements\n- **Related:** [[Financial Instrument]], [[Securities]], [[Market Data]], [[Financial Identifier]], [[FIBO]]\n- **Used-by:** [[Financial Knowledge Graph]] platforms, regulatory reporting, index construction, [[FIGI]] assignment\n\n## Examples\n\n- NYSE: MIC `XNYS`, LEI `549300BNPPIFNRG5MY62`, modeled as `fibo-fbc-fi-fi:NewYorkStockExchange`\n- London Stock Exchange: MIC `XLON`, Wikidata Q171240, DBpedia `dbr:London_Stock_Exchange`\n- Euronext Paris: MIC `XPAR`, part of Euronext group modeled as `ExchangeGroup` with multiple venue MICs\n\n## Sources\n\n- `sources/articles/fibo-financial-industry-business-ontology.md`\n- `sources/web-clips/financial-identifier-standards.md`\n- `sources/papers/finkario-dual-structure-financial-kg.md`\n\n## See Also\n\n- [[FIBO]], [[Financial Instrument]], [[Securities]], [[Market Data]], [[Wikidata]]\n- [[DBpedia]], [[Financial Identifier]], [[Knowledge Graph]], [[Legal Entity]], [[Financial Knowledge Graph]]\n" },
    { id: "Taxonomy", category: "concepts", definition: "A hierarchical classification system that organises concepts into a tree of parent-child (broader-narrower) relationships, typically using a single inheritance structure.", content: "# Taxonomy\n\n**Definition:** A hierarchical classification system that organises concepts into a tree of parent-child (broader-narrower) relationships, typically using a single inheritance structure.\n\n**Also known as:** Classification scheme, controlled vocabulary, subject hierarchy, thesaurus (partial overlap).\n\n## Overview\n\nA taxonomy is the simplest form of structured knowledge organisation: a tree in which every node (concept) has exactly one parent, except the root. The word comes from the Greek *taxis* (arrangement) and *nomos* (law). Taxonomies have been used for millennia — Aristotle's division of living things into genera and species is an early example — and remain the backbone of library catalogues, biological classification, e-commerce product categories, and enterprise content management systems.\n\nCompared to an [[Ontology]], a taxonomy is deliberately constrained. It captures only one kind of relationship — the hierarchical \"is a kind of\" or `rdfs:subClassOf` link that [[RDFS]] and [[OWL]] also use — and says nothing about properties, cardinality restrictions, or cross-cutting relationships between branches. This simplicity is both a limitation and a strength: taxonomies are easy for non-specialists to understand, browse, and maintain. Many organisations start with a taxonomy and evolve it toward a richer [[Ontology]] as their modelling needs grow. The relationship between taxonomy and [[Ontology]] is therefore often developmental: a taxonomy is a proto-ontology, or an [[Ontology]] skeleton stripped of everything except the class hierarchy.\n\nFrom a Semantic Web perspective, a taxonomy expressed in [[RDFS]] using `rdfs:subClassOf` can be queried with [[SPARQL]], navigated using property paths, and integrated into a [[Knowledge Graph]] as the backbone classification layer. Tools like SKOS (Simple Knowledge Organization System) provide an [[RDF]]-based vocabulary specifically designed for taxonomies and thesauri, adding concepts like `skos:broader`, `skos:narrower`, and `skos:related` that are less formal than [[OWL]] class axioms but sufficient for most classification use cases.\n\n## Key Properties\n\n- **Single inheritance:** each concept has at most one parent (contrasted with the multiple inheritance permitted in [[OWL]] and [[RDFS]] class hierarchies)\n- **Transitive subsumption:** if B is a kind of A, and C is a kind of B, then C is also a kind of A — the same entailment as `rdfs:subClassOf` in [[Inference and Reasoning]]\n- **No property definitions:** a pure taxonomy says nothing about the attributes or relationships of instances, unlike an [[Ontology]]\n- **Controlled vocabulary:** every term has an authoritative label and a unique identifier, often a [[URI and IRI]]\n- **Faceted taxonomies:** some systems allow multiple independent taxonomic axes (e.g., by material, by function, by audience) that together constitute a faceted classification\n\n## Contrasting Taxonomy with Ontology\n\n| Dimension | Taxonomy | [[Ontology]] |\n|---|---|---|\n| Relationship types | `is-a` only | `is-a`, `part-of`, `has-property`, arbitrary roles |\n| Inheritance | Single | Multiple (in [[OWL]]/[[RDFS]]) |\n| Property restrictions | None | Cardinality, domain/range via [[Class and Property]] |\n| Reasoning support | Basic subsumption | Full [[Description Logic]] reasoning |\n| Formalism | Informal to semi-formal | Formal (e.g., [[OWL]], [[RDFS]]) |\n| Typical size | Thousands of terms | Hundreds to millions of axioms |\n\n## Relationships\n\n- **Is-a:** A restricted form of [[Ontology]]; a type of controlled vocabulary\n- **Has-part:** Concept nodes, parent-child (broader-narrower) links, root concept, leaf concepts\n- **Related:** [[Ontology]], [[Class and Property]], [[RDFS]], [[Knowledge Graph]], [[RDF]], [[Inference and Reasoning]]\n- **Used-by:** Library classification (Dewey Decimal, Library of Congress Subject Headings); biological nomenclature (Linnaean taxonomy, NCBI Taxonomy); e-commerce product catalogs; enterprise information architecture; SKOS vocabularies in [[Linked Data]]\n\n## Examples\n\n### Linnaean biological taxonomy (informal)\n\n```\nLife\n└── Animalia\n    └── Chordata\n        └── Mammalia\n            └── Carnivora\n                └── Canidae\n                    └── Canis\n                        └── Canis lupus familiaris  (domestic dog)\n```\n\nEach node is strictly more specific than its parent. A domestic dog *is a* Canis, *is a* Canidae, *is a* Mammalia, and so on up the tree.\n\n### Expressed in [[RDFS]] (Turtle)\n\n```turtle\n@prefix rdfs: <http://www.w3.org/2000/01/rdf-schema#> .\n@prefix tax:  <http://example.org/taxonomy/> .\n\ntax:Animalia   a rdfs:Class ; rdfs:label \"Animalia\" .\ntax:Mammalia   a rdfs:Class ; rdfs:subClassOf tax:Animalia ; rdfs:label \"Mammalia\" .\ntax:Canidae    a rdfs:Class ; rdfs:subClassOf tax:Mammalia ; rdfs:label \"Canidae\" .\ntax:Dog        a rdfs:Class ; rdfs:subClassOf tax:Canidae  ; rdfs:label \"Dog\" .\n```\n\nAn [[Inference and Reasoning]] engine applying [[RDFS]] entailment rules will automatically derive that `tax:Dog rdfs:subClassOf tax:Animalia`, even though that triple was never stated explicitly.\n\n### SKOS taxonomy (Turtle)\n\n```turtle\n@prefix skos: <http://www.w3.org/2004/02/skos/core#> .\n@prefix lib:  <http://example.org/library/> .\n\nlib:Science      a skos:Concept ; skos:prefLabel \"Science\"@en .\nlib:Biology      a skos:Concept ; skos:prefLabel \"Biology\"@en ;\n                 skos:broader lib:Science .\nlib:Zoology      a skos:Concept ; skos:prefLabel \"Zoology\"@en ;\n                 skos:broader lib:Biology .\n```\n\nSKOS `skos:broader` is the standard [[RDF]] predicate for expressing taxonomic hierarchy in [[Linked Data]] and [[Knowledge Graph]] publishing contexts.\n\n### Library of Congress Subject Headings (excerpt)\n\n```\nTechnology\n└── Engineering\n    └── Civil engineering\n        └── Bridge engineering\n            └── Suspension bridges\n```\n\nEach heading is a unique, curated term assigned to library resources — a classic [[Knowledge Graph]] node with a canonical [[URI and IRI]].\n\n## Sources\n\n- [needs-source]\n\n## See Also\n\n- [[Ontology]]\n- [[Class and Property]]\n- [[RDFS]]\n- [[RDF]]\n- [[Knowledge Graph]]\n- [[Inference and Reasoning]]\n- [[Linked Data]]\n- [[OWL]]\n" },
    { id: "Triple", category: "concepts", definition: "The atomic unit of knowledge in [[RDF]]: a three-part statement composed of a subject, a predicate, and an object, encoding a single fact about the world.", content: "# Triple\n\n**Definition:** The atomic unit of knowledge in [[RDF]]: a three-part statement composed of a subject, a predicate, and an object, encoding a single fact about the world.\n\n**Also known as:** RDF triple, subject–predicate–object (SPO), statement, proposition.\n\n## Overview\n\nEverything in an [[RDF]] [[Knowledge Graph]] ultimately reduces to triples. A triple makes one claim: the subject has the predicate relationship with the object. For example, the fact \"Marie Curie was born in Warsaw\" becomes the triple `(ex:MarieCurie, schema:birthPlace, ex:Warsaw)`. Chain thousands or millions of such statements together and you get a rich, traversable knowledge graph.\n\nThe elegance of the triple is its simplicity and universality. Any fact that can be stated in natural language as a sentence with a subject, verb, and object can be expressed as a triple. The predicate is always a [[URI and IRI|URI]] drawn from some vocabulary or [[Ontology]] — this is what gives the relationship a precise, machine-readable meaning rather than just a label. The subject is always a [[URI and IRI|URI]] or blank node. The object can be a [[URI and IRI|URI]], a blank node, or a literal (a typed value such as a string, integer, or date).\n\nBecause every [[RDF]] triple uses [[URI and IRI|URIs]] for its predicate (and usually for its subject), triples from completely different datasets can be merged without ambiguity. If two datasets both use `schema:birthPlace` as a predicate, a processor knows they mean the same thing — the property defined at `https://schema.org/birthPlace`. This global agreement on identifiers is the key mechanism enabling [[Linked Data]] and the broader [[Semantic Web]].\n\n## Anatomy of a Triple\n\n| Component | What it is | Allowed types |\n|---|---|---|\n| Subject | The thing being described | [[URI and IRI\\|IRI]], blank node |\n| Predicate | The property or relationship | [[URI and IRI\\|IRI]] only |\n| Object | The value or related resource | [[URI and IRI\\|IRI]], blank node, literal |\n\nLiterals carry optional type annotations using XML Schema datatypes (e.g., `\"42\"^^xsd:integer`, `\"2024-01-01\"^^xsd:date`) or language tags (e.g., `\"Paris\"@fr`).\n\n## Triples in Turtle Syntax\n\nTurtle provides convenient shorthand for writing multiple triples about the same subject:\n\n```turtle\n@prefix ex:     <http://example.org/> .\n@prefix schema: <https://schema.org/> .\n@prefix xsd:    <http://www.w3.org/2001/XMLSchema#> .\n\n# Three separate triples, all sharing the same subject:\nex:MarieCurie schema:name        \"Marie Curie\"@en ;\n              schema:birthPlace  ex:Warsaw ;\n              schema:birthDate   \"1867-11-07\"^^xsd:date .\n\n# A fourth triple linking two URI resources:\nex:Warsaw schema:containedInPlace ex:Poland .\n```\n\nThe semicolon (`;`) repeats the subject. The comma (`,`) would repeat both subject and predicate. Each terminating period ends a group of triples about one subject.\n\n## Named Graphs and Quads\n\nA plain [[RDF]] dataset is a set of triples with no built-in way to track provenance — where did this triple come from, and when was it asserted? Named graphs solve this by adding a fourth component: a graph name ([[URI and IRI|URI]] or blank node) that scopes a set of triples together. A four-element statement is called a **quad**.\n\n```turtle\n# TriG syntax (Turtle extended with named graphs):\n<http://example.org/graph/wikidata> {\n    ex:MarieCurie schema:birthPlace ex:Warsaw .\n    ex:MarieCurie ex:wonAward ex:NobelPrizeChemistry1911 .\n}\n```\n\nNamed graphs are important for [[Knowledge Graph]] provenance tracking, trust management, and versioning. [[SPARQL]] can query across named graphs using the `GRAPH` keyword.\n\n## Reification\n\nSometimes you need to make a statement about a statement — for example, to record the source, confidence, or time period of a triple. Classical [[RDF]] reification wraps a triple in four additional triples using `rdf:Statement`, `rdf:subject`, `rdf:predicate`, and `rdf:object`. This is verbose. The newer **RDF-star** (RDF 1.2) proposal allows triples as subjects directly: `<<ex:MarieCurie schema:birthPlace ex:Warsaw>> ex:assertedBy ex:Wikidata .`\n\n## Relationships\n\n- **Is-a:** Atomic knowledge statement, RDF data unit\n- **Has-part:** Subject, predicate, object; optionally a graph name (quad)\n- **Related:** [[RDF]], [[Knowledge Graph]], [[URI and IRI]], [[SPARQL]], [[Ontology]]\n- **Used-by:** All [[RDF]] triplestores (Apache Jena, Virtuoso, Blazegraph, GraphDB), [[SPARQL]] engines\n\n## Examples\n\nReal triples from Wikidata (simplified):\n\n```turtle\nwd:Q7186 wdt:P31  wd:Q5 .           # Marie Curie  instanceOf  human\nwd:Q7186 wdt:P19  wd:Q270 .         # Marie Curie  placeOfBirth  Warsaw\nwd:Q7186 wdt:P166 wd:Q37922 .       # Marie Curie  award  Nobel Prize in Physics\nwd:Q7186 wdt:P166 wd:Q44585 .       # Marie Curie  award  Nobel Prize in Chemistry\n```\n\nEach Wikidata item (`wd:`) and property (`wdt:`) is a [[URI and IRI|URI]] dereferenceable to a real web page.\n\n## Sources\n\n- [needs-source]\n\n## See Also\n\n- [[RDF]]\n- [[Knowledge Graph]]\n- [[URI and IRI]]\n- [[SPARQL]]\n- [[Ontology]]\n- [[Linked Data]]\n" },
    { id: "URI and IRI", category: "concepts", definition: "Uniform Resource Identifiers (URIs) and Internationalized Resource Identifiers (IRIs) are globally unique strings used to identify resources — the naming backbone of the [[Semantic Web]] and [[RDF]].", content: "# URI and IRI\n\n**Definition:** Uniform Resource Identifiers (URIs) and Internationalized Resource Identifiers (IRIs) are globally unique strings used to identify resources — the naming backbone of the [[Semantic Web]] and [[RDF]].\n\n**Also known as:** URI, URL, URN, IRI, web identifier, resource identifier.\n\n## Overview\n\nIn the [[Semantic Web]] and [[RDF]] world, every meaningful thing must have a name that is globally unique and persistent. URIs serve this role. A URI like `https://schema.org/Person` unambiguously identifies the class \"Person\" as defined by Schema.org — any dataset that uses this URI as a type is referring to exactly that concept, not some locally defined homonym. This global naming is what makes [[Linked Data]] work: disparate datasets can be merged meaningfully because they share common identifiers.\n\nA URI (Uniform Resource Identifier) is the general category. URLs (Uniform Resource Locators) are URIs that also specify how to retrieve the resource — typically via HTTP. URNs (Uniform Resource Names) are URIs that name resources persistently without implying retrieval (e.g., `urn:isbn:9780521865715`). In the [[Semantic Web]], HTTP URIs are strongly preferred over URNs because they are dereferenceable: following the link returns useful information about the resource, a principle called the \"follow your nose\" design of [[Linked Data]].\n\nAn IRI (Internationalized Resource Identifier) is the Unicode generalization of the ASCII-only URI. IRIs allow non-ASCII characters directly in the identifier string — for example, Wikidata uses IRIs that include characters from many scripts. In [[RDF]] 1.1, IRIs are the official identifier type; the spec still colloquially uses \"URI\" in many contexts, and the two terms are often used interchangeably in practice.\n\n## Namespaces and Prefixes\n\nBecause [[RDF]] URIs tend to be long, both [[RDF]] serializations and [[SPARQL]] support prefix declarations that abbreviate common base URIs:\n\n```turtle\n@prefix rdf:    <http://www.w3.org/1999/02/22-rdf-syntax-ns#> .\n@prefix rdfs:   <http://www.w3.org/2000/01/rdf-schema#> .\n@prefix owl:    <http://www.w3.org/2002/07/owl#> .\n@prefix xsd:    <http://www.w3.org/2001/XMLSchema#> .\n@prefix schema: <https://schema.org/> .\n@prefix ex:     <http://example.org/> .\n\nex:Alice a schema:Person ;\n    schema:name \"Alice\" .\n```\n\nAfter declaring `@prefix schema: <https://schema.org/>`, writing `schema:Person` is equivalent to the full IRI `<https://schema.org/Person>`. The angle-bracket form (`<...>`) is always valid for absolute IRIs when no prefix is declared.\n\n## Blank Nodes\n\nNot every node in an [[RDF]] graph needs a global identifier. Blank nodes (bnode, written `_:label` in Turtle) are locally-scoped anonymous resources. They are useful for intermediate structures that have no natural global name:\n\n```turtle\nex:Alice ex:hasAddress _:addr1 .\n_:addr1 ex:street \"123 Main St\" ;\n        ex:city   ex:Springfield .\n```\n\nHere `_:addr1` is an anonymous address node. Blank nodes cannot be referenced from outside the document and complicate federated querying; best practice is to mint a URI for entities that matter across dataset boundaries.\n\n## URI Design Principles\n\nGood URI design for [[Linked Data]] follows several conventions:\n\n- **Persistent:** The URI should not change when the underlying system changes. Use domain names you control long-term.\n- **Opaque:** The URI should not embed implementation details (database row IDs, internal codes) that might change.\n- **Dereferenceable:** An HTTP GET on the URI should return a useful description of the resource (HTML for browsers, [[RDF]] for machines — this is called content negotiation).\n- **Distinct from document URIs:** Use hash URIs (`#`) or 303-redirect patterns to distinguish the resource (e.g., a person) from the document describing it.\n\n## Relationships\n\n- **Is-a:** Web identifier, string, resource name\n- **Has-part:** Scheme, authority, path, query, fragment; namespace prefix (abbreviated form)\n- **Related:** [[RDF]], [[Triple]], [[Linked Data]], [[Semantic Web]], blank nodes\n- **Used-by:** Every [[RDF]] triple, [[SPARQL]] queries, [[OWL]] ontologies, [[Knowledge Graph]] entity identifiers\n\n## Examples\n\nCommon URI patterns in the wild:\n\n```\n# Schema.org vocabulary term:\nhttps://schema.org/Person\n\n# Wikidata entity (Marie Curie):\nhttps://www.wikidata.org/entity/Q7186\n\n# DBpedia resource:\nhttp://dbpedia.org/resource/Marie_Curie\n\n# OWL ontology URI:\nhttp://www.w3.org/2002/07/owl#Class\n\n# A hash URI for a named individual in a local ontology:\nhttp://example.org/ontology#Alice\n```\n\nIn [[SPARQL]]:\n\n```sparql\nPREFIX schema: <https://schema.org/>\nSELECT ?name WHERE {\n    <https://www.wikidata.org/entity/Q7186> schema:name ?name .\n}\n```\n\n## Sources\n\n- [needs-source]\n\n## See Also\n\n- [[RDF]]\n- [[Triple]]\n- [[Linked Data]]\n- [[Semantic Web]]\n- [[SPARQL]]\n- [[Ontology]]\n" },

    { id: "DBpedia", category: "entities", definition: "", content: "# DBpedia\n\n**Type:** Knowledge graph extracted from Wikipedia\n**Operator:** DBpedia Association (community-driven)\n**Launched:** 2007\n**License:** Creative Commons Attribution-ShareAlike / GNU Free Documentation License\n\n## Overview\n\nDBpedia is a crowd-sourced community effort to extract structured information from Wikipedia and make it freely available on the web as a [[Knowledge Graph]]. By parsing the infoboxes, categories, and links embedded in Wikipedia articles, DBpedia transforms unstructured encyclopedia content into machine-readable [[RDF]] triples that can be queried, downloaded, and interlinked with other datasets.\n\nDBpedia was one of the earliest and most influential hubs in the [[Linked Data]] cloud. Its decision to assign stable [[URI and IRI|URIs]] to Wikipedia concepts — such as `dbpedia.org/resource/Berlin` — gave external datasets a common reference point, enabling cross-dataset links that form the connective tissue of the broader Semantic Web. This hub role helped establish [[Linked Data]] as a practical publishing paradigm rather than a purely academic vision.\n\nThe dataset covers millions of entities across domains including people, places, organizations, music, film, science, and more. Each entity is described using the DBpedia [[Ontology]], a manually curated schema that provides consistent [[Class and Property|classes and properties]] across the extracted data.\n\n## Data Model and Access\n\nDBpedia publishes its data in [[RDF]] using standard serializations including Turtle and RDF/XML. The [[SPARQL]] endpoint at `dbpedia.org/sparql` allows users to query the live dataset using the full expressiveness of [[SPARQL]] 1.1, including federated queries that join DBpedia data with other endpoints such as [[Wikidata]].\n\nThe DBpedia [[Ontology]] defines a class hierarchy rooted at `owl:Thing` and branching into domain-specific subtypes. This [[Ontology]] was built using [[OWL]] and aligns with concepts from schema.org and other vocabularies, improving interoperability across the [[Linked Data]] ecosystem.\n\n## Relationship to Wikipedia and Wikidata\n\nDBpedia extracts data from Wikipedia's semi-structured infoboxes using a mapping layer that translates Wikipedia templates to DBpedia [[Ontology]] properties. As Wikipedia evolves, DBpedia releases updated dataset dumps. [[Wikidata]] has increasingly taken on the role of canonical structured data source for Wikimedia projects, and modern DBpedia versions incorporate Wikidata identifiers as cross-references, linking the two [[Knowledge Graph|knowledge graphs]].\n\n## Significance for Ontology Learning\n\nBecause DBpedia was constructed by mapping natural-language Wikipedia content to a formal [[Ontology]], it is a frequently used benchmark in ontology learning research. Studies in [[Ontology]] population, [[Class and Property|property]] extraction, and [[Inference and Reasoning|relation inference]] routinely evaluate methods against DBpedia's large, heterogeneous, real-world graph.\n\n## See Also\n\n- [[Knowledge Graph]]\n- [[RDF]]\n- [[SPARQL]]\n- [[Linked Data]]\n- [[Ontology]]\n- [[Triple]]\n- [[URI and IRI]]\n- [[Wikidata]]\n- [[OWL]]\n- [[W3C]]\n" },
    { id: "Fdc3", category: "entities", definition: "Financial Desktop Connectivity and Collaboration Consortium — an open standard maintained by FINOS for interoperability between financial desktop applications, defining a common API, Intent system, Channel model, and 22 JSON Schema context data types including `fdc3.instrument` with [[FIGI]], ISIN, CUSIP, and other [[Financial Identifier]] support.", content: "# FDC3\n\n**Type:** Standard / Interoperability Protocol\n\n**Definition:** Financial Desktop Connectivity and Collaboration Consortium — an open standard maintained by FINOS for interoperability between financial desktop applications, defining a common API, Intent system, Channel model, and 22 JSON Schema context data types including `fdc3.instrument` with [[FIGI]], ISIN, CUSIP, and other [[Financial Identifier]] support.\n\n## Overview\n\nFDC3 solves the desktop integration problem in financial services: trading terminals, research tools, order management systems, CRM platforms, and analytics dashboards have historically operated as siloed applications requiring custom point-to-point integrations for each pair. FDC3 defines a common language and JavaScript/TypeScript API — exposed by an FDC3 Desktop Agent from platform vendors such as OpenFin or Glue42 — so that any FDC3-compliant application can broadcast context, raise intents, and receive data from any other compliant application without bespoke wiring. FDC3 2.2, the current version, is maintained by FINOS (Fintech Open Source Foundation, a Linux Foundation project) under Apache 2.0.\n\nThe architecture has four core concepts. The **App Directory** is a registry of FDC3-compliant applications and their supported intents and context types, enabling dynamic discovery. **Intents** are standardized action requests — `ViewChart`, `ViewInstrument`, `CreateOrder`, `ViewOrders`, `ViewQuote` — that one application raises for a registered handler to fulfill. **Channels** are named broadcast streams (system color-
